<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EFF5F1">
<title>Learning Quest — Math, Science, Coding and Many More</title>
<meta name="description" content="An offline, mobile-friendly learning game for kids ages 5-7 covering Math, Science, Coding, Reading, Social Studies and Arts.">

<style>
  /* ====================================================================
     TOKENS
     ==================================================================== */
  :root{
    --ink:#1B2A4A;
    --ink-soft:#54607A;
    --paper:#EFF5F1;
    --card:#FFFFFF;
    --line:#DCE6E0;

    --teal:#1FA391;     --teal-dark:#147F71;
    --amber:#F4A828;    --amber-dark:#D1860E;
    --coral:#FF6B5B;    --coral-dark:#E14E3D;
    --violet:#7A6FCB;   --violet-dark:#5C50A8;

    --success:#2FAE66;  --success-bg:#E3F6EA;
    --danger:#E14E3D;   --danger-bg:#FDEAE7;
    --retry-bg:#FFF3DC; --retry-ink:#8A5A00;

    --radius-lg:24px;
    --radius-md:16px;
    --radius-sm:10px;
    --shadow-card:0 10px 28px -10px rgba(27,42,74,.20);
    --shadow-soft:0 4px 12px -4px rgba(27,42,74,.14);

    --font-display: ui-rounded, "SF Pro Rounded", "Segoe UI Rounded", "Segoe UI", system-ui, -apple-system, sans-serif;
    --font-body: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace;

    --accent: var(--teal);
    --accent-dark: var(--teal-dark);
  }

  [data-accent="amber"]  { --accent:var(--amber);  --accent-dark:var(--amber-dark); }
  [data-accent="violet"] { --accent:var(--violet); --accent-dark:var(--violet-dark); }
  [data-accent="teal"]   { --accent:var(--teal);   --accent-dark:var(--teal-dark); }
  [data-accent="coral"]  { --accent:var(--coral);  --accent-dark:var(--coral-dark); }

  /* ====================================================================
     RESET & BASE
     ==================================================================== */
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; overflow-x:hidden; width:100%; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    height:100vh;
    height:100dvh;
    line-height:1.4;
    overscroll-behavior-y:none;
  }
  h1,h2,h3{ margin:0; font-family:var(--font-display); }
  p{ margin:0; }
  button{ font-family:inherit; cursor:pointer; }
  img,svg{ max-width:100%; }
  :focus-visible{ outline:3px solid var(--accent-dark); outline-offset:2px; border-radius:6px; }

  .app{
    max-width:720px; margin:0 auto; height:100vh; height:100dvh;
    display:flex; flex-direction:column; position:relative; overflow:hidden;
  }
  .screen{
    flex:1; display:flex; flex-direction:column; min-height:0;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    padding-top:calc(14px + env(safe-area-inset-top));
    animation:fadeUp .35s ease both; overflow-x:hidden;
  }
  /* Screens that have no sticky footer can scroll vertically if their content
     genuinely exceeds the viewport (e.g. home grid on a tiny phone). */
  .screen.scrollable{ overflow-y:auto; -webkit-overflow-scrolling:touch; }

  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes pop{ 0%{ transform:scale(.85); opacity:0; } 60%{ transform:scale(1.06); opacity:1; } 100%{ transform:scale(1); } }
  @keyframes shakeKf{
    10%,90%{ transform:translateX(-1px); } 20%,80%{ transform:translateX(2px); }
    30%,50%,70%{ transform:translateX(-5px); } 40%,60%{ transform:translateX(5px); }
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
  }

  /* ====================================================================
     BUTTONS
     ==================================================================== */
  .btn{
    min-height:48px; padding:12px 22px; border-radius:999px; border:none;
    font-family:var(--font-display); font-weight:800; font-size:16px;
    letter-spacing:.01em; transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{ transform:translateY(1px) scale(.98); }
  .btn-primary{ background:var(--accent); color:#fff; box-shadow:var(--shadow-soft); }
  .btn-primary:hover{ box-shadow:0 6px 16px -4px var(--accent); }
  .btn-secondary{ background:#fff; color:var(--ink); border:2px solid var(--line); }
  .btn-ghost{ background:transparent; color:var(--ink-soft); border:2px dashed var(--line); }
  .btn-danger{ background:var(--danger); color:#fff; box-shadow:var(--shadow-soft); }
  .btn-danger:disabled{ background:var(--line); color:var(--ink-soft); box-shadow:none; cursor:not-allowed; }
  .skip-replay-btn { display: block; margin: 8px auto 0; padding: 6px 14px; font-size: 12px; border-radius: var(--radius-sm); width: fit-content; }

  .report-inprogress-note { font-size:11px; color:var(--amber-dark); font-weight:700; margin-top:4px; }

  .report-danger-zone {
    margin-top:24px; padding-top:16px; border-top:2px dashed var(--line);
    text-align:center; display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .report-reset-btn { color:var(--danger); border-color:var(--danger); font-size:14px; }
  .report-danger-hint { font-size:11px; color:var(--ink-soft); max-width:280px; line-height:1.4; }

  .reset-modal-overlay {
    position:fixed; inset:0; background:rgba(20,20,30,.55); z-index:10000;
    display:flex; align-items:center; justify-content:center; padding:20px;
    animation: fadeIn .15s ease both;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .reset-modal {
    background:#fff; border-radius:var(--radius-lg); padding:22px 20px; max-width:320px; width:100%;
    box-shadow:0 20px 50px -10px rgba(0,0,0,.35); text-align:center; animation: pop .25s ease both;
  }
  .reset-modal-icon { font-size:36px; margin-bottom:6px; }
  .reset-modal-title { font-family:var(--font-display); font-size:19px; color:var(--ink); margin-bottom:8px; }
  .reset-modal-body { font-size:13px; color:var(--ink-soft); line-height:1.5; margin-bottom:12px; }
  .reset-modal-instruction { font-size:13px; color:var(--ink); margin-bottom:8px; }
  .reset-modal-input {
    width:100%; box-sizing:border-box; padding:10px 14px; border-radius:12px; border:2px solid var(--line);
    font-family:var(--font-display); font-weight:700; font-size:16px; text-align:center; letter-spacing:.05em;
    margin-bottom:14px; text-transform:uppercase;
  }
  .reset-modal-input:focus { outline:none; border-color:var(--danger); }
  .reset-modal-actions { display:flex; gap:10px; }
  .reset-modal-actions .btn { flex:1; min-height:44px; font-size:14px; padding:10px 14px; }
  .icon-btn{
    width:44px; height:44px; border-radius:50%; border:2px solid var(--line);
    background:#fff; font-size:18px; color:var(--ink); display:flex; align-items:center; justify-content:center;
  }

  /* ====================================================================
     HOME SCREEN
     ==================================================================== */
  .home-screen{ position:relative; align-items:stretch; overflow-x:hidden; background: linear-gradient(160deg,#D6EAFF 0%,#EEF6FF 35%,#FFF8EC 100%); }
  .home-sky-bg { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  /* CSS-only clouds — pure border-radius shapes */
  .cloud { position:absolute; background:rgba(255,255,255,0.72); border-radius:50px; }
  .cloud::before,.cloud::after { content:''; position:absolute; background:inherit; border-radius:50%; }
  .cl-1 { width:110px; height:36px; top:54px; left:-10px; animation:cloudDrift 22s ease-in-out infinite; }
  .cl-1::before { width:54px; height:52px; top:-24px; left:16px; }
  .cl-1::after  { width:66px; height:44px; top:-18px; left:48px; }
  .cl-2 { width:80px; height:28px; top:130px; right:4px; animation:cloudDrift 30s ease-in-out infinite reverse; opacity:.55; }
  .cl-2::before { width:44px; height:42px; top:-18px; left:10px; }
  .cl-2::after  { width:50px; height:36px; top:-14px; left:38px; }
  .cl-3 { width:130px; height:32px; top:210px; left:28%; animation:cloudDrift 38s ease-in-out infinite; opacity:.4; }
  .cl-3::before { width:60px; height:56px; top:-26px; left:20px; }
  .cl-3::after  { width:72px; height:46px; top:-20px; left:62px; }
  @keyframes cloudDrift { 0%,100%{ transform:translateX(0); } 50%{ transform:translateX(18px); } }

  .home-watermark{
    position:absolute; top:-40px; right:-60px; width:260px; height:260px;
    color:var(--violet); opacity:.05; pointer-events:none; transform:rotate(12deg);
    z-index:0; max-width:none;
  }
  .home-header{ text-align:center; padding:14px 0 18px; position:relative; z-index:1; }
  .logo-mark{ width:64px; height:64px; margin:0 auto 10px; color:var(--violet); }
  .logo-mark img{ width:100%; height:100%; object-fit:cover; border-radius:18px; box-shadow:var(--shadow-card); display:block; }

  /* Gradient game title — the signature element */
  .app-title{
    font-size:clamp(28px,8vw,40px); letter-spacing:-.5px;
    background: linear-gradient(135deg,#2563EB 0%,#7C3AED 45%,#DB2777 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    filter: drop-shadow(0 2px 6px rgba(99,60,200,.18));
  }
  .app-subtitle{ margin-top:6px; color:var(--ink-soft); font-size:14px; }
  .app-credit{ margin-top:4px; color:var(--ink-soft); font-size:12px; opacity:.7; }

  /* MODE GRID */
  .mode-grid{
    position:relative; z-index:1; display:grid; grid-template-columns:1fr 1fr; gap:10px 12px;
    margin-top:4px; min-width:0;
  }

  /* App-icon-style cards — coloured top banner + white body */
  .mode-card{
    background:#fff; border-radius:var(--radius-lg); padding:0;
    box-shadow: 0 6px 20px -6px rgba(27,42,74,.18), 0 1px 4px rgba(27,42,74,.08);
    border:none; text-align:left; display:flex; flex-direction:column;
    min-height:160px; min-width:0; overflow:hidden;
    animation:pop .4s ease both; cursor:pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .mode-card:hover  { transform:translateY(-4px) scale(1.01); box-shadow:0 14px 32px -8px rgba(27,42,74,.22); }
  .mode-card:active { transform:translateY(-1px) scale(0.99); }
  .mode-card .mode-icon{
    width:100%; height:72px; border-radius:0;
    display:flex; align-items:center; justify-content:center;
    font-size:32px; flex-shrink:0; margin:0;
    /* subtle inner shine */
    box-shadow: inset 0 -4px 12px rgba(0,0,0,.12);
  }
  .mode-card-body { padding:10px 12px 12px; display:flex; flex-direction:column; gap:4px; flex:1; }
  .mode-label { font-family:var(--font-display); font-weight:800; font-size:14px; color:var(--ink); overflow-wrap:break-word; line-height:1.2; }
  .mode-desc   { font-size:11px; color:var(--ink-soft); line-height:1.3; overflow-wrap:break-word; }
  .mode-progress       { font-size:11px; color:var(--accent); font-weight:700; margin-top:auto; padding-top:4px; }
  .mode-progress-partial { color:var(--amber-dark); }
  .mode-progress-empty   { color:var(--ink-soft); font-weight:600; }
  .mode-progress-locked  { color:var(--success); }

  /* Section labels — pill shape */
  .home-section-header{
    font-family:var(--font-display); font-weight:900; font-size:13px;
    color:#fff; letter-spacing:.4px;
    background: var(--accent); border-radius:999px;
    display:inline-block; padding:5px 14px; margin:14px 0 8px;
    box-shadow: var(--shadow-soft);
  }

  /* ====================================================================
     PLAY & COMPLETE UI COMPONENTS
     ==================================================================== */
  .play-screen{ padding-bottom:0 !important; position:relative; }
  .play-header{ flex-shrink:0; }
  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; gap: 8px; min-width:0; }
  .score-chip {
    background: #fff; padding: 6px 10px; border-radius: 999px; box-shadow: var(--shadow-soft);
    font-weight: bold; display: flex; gap: 8px; align-items: center; color: var(--ink);
    font-size: 13px; min-width:0; flex-shrink:1; white-space:nowrap;
  }
  .icon-btn{ flex-shrink:0; }

  /* PROGRESS BAR (replaces dot row) */
  .progress-track { width:100%; height:10px; background:#fff; border-radius:999px; box-shadow:inset 0 1px 3px rgba(27,42,74,.12); margin-bottom: 10px; overflow:hidden; position:relative; }
  .progress-fill { height:100%; border-radius:999px; background:linear-gradient(90deg, var(--accent), var(--accent-dark)); transition: width .45s cubic-bezier(.4,0,.2,1); position:relative; }
  .progress-fill::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,.35), transparent 60%); }
  .progress-label { display:flex; justify-content:space-between; gap:8px; font-size:11px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; font-family:var(--font-display); min-width:0; }
  .progress-label span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
  .progress-label .q-count { color: var(--ink); flex-shrink:0; }

  /* Scrollable middle region: holds the question card. Grows/shrinks so the
     sticky footer (numpad + check button) always stays on-screen without
     pushing content off the top, and only this region scrolls if a question
     genuinely doesn't fit a very small viewport. */
  .play-area {
    flex: 1; min-height:0; display: flex; flex-direction: column; justify-content: safe center;
    align-items: center; text-align: center; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding-bottom:6px;
  }
  .feedback { min-height: 24px; font-weight: bold; margin-bottom: 6px; font-size: 16px; transition: color 0.3s ease; flex-shrink:0; }
  .feedback.correct { color: var(--success); }
  .feedback.incorrect { color: var(--danger); }
  .feedback.retry { color: var(--retry-ink); }

  /* Sticky bottom dock: numpad + Check button live here so they're always
     reachable with a thumb and never get pushed off-screen by question content. */
  .play-footer{
    flex-shrink:0; width:100%; max-width:320px; margin:0 auto;
    padding:6px 0 calc(6px + env(safe-area-inset-bottom));
  }
  .play-footer:empty{ display:none; }
  .play-footer .btn-primary{ width:100%; max-width:none !important; margin-top:8px !important; }

  /* CARD-LEVEL FEEDBACK */
  .eq-card{
    transition: background-color .25s ease, border-color .25s ease, transform .15s ease;
    border: 3px solid transparent;
    border-radius: var(--radius-lg);
    max-width:100%; box-sizing:border-box;
  }
  .eq-card.is-correct{
    background: var(--success-bg) !important;
    border-color: var(--success);
    animation: cardPopGood .4s ease;
  }
  .eq-card.is-incorrect{
    background: var(--danger-bg) !important;
    border-color: var(--danger);
    animation: shakeKf .4s ease;
  }
  .eq-card.is-retry{
    background: var(--retry-bg) !important;
    border-color: var(--amber);
  }
  @keyframes shakeKf{ 0%{ transform:translateX(0); } 20%{ transform:translateX(-5px); } 40%{ transform:translateX(5px); } 60%{ transform:translateX(-4px); } 80%{ transform:translateX(4px); } 100%{ transform:translateX(0); } }

  .reveal-answer{
    margin-top: 10px; font-family: var(--font-display); font-weight: 800; font-size: 16px;
    color: var(--danger); background: #fff; border: 2px dashed var(--danger);
    border-radius: 12px; padding: 6px 14px; display: inline-block; animation: pop .3s ease both;
    max-width:100%; overflow-wrap:break-word;
  }
  .reveal-answer .reveal-label{ color: var(--ink-soft); font-weight:700; font-size:13px; display:block; margin-bottom:2px; font-family: var(--font-body); }

  .retry-banner{
    margin-top: 10px; font-family: var(--font-display); font-weight: 800; font-size: 15px;
    color: var(--retry-ink); display:flex; align-items:center; justify-content:center; gap:6px;
  }

  .retry-hint{
    margin-top: 10px; font-size: 13px; font-weight: 600; color: var(--retry-ink);
    background: var(--retry-bg); border-radius: 12px; padding: 8px 14px; display: inline-flex;
    align-items: flex-start; gap: 6px; text-align: left; max-width: 100%; box-sizing: border-box;
    animation: pop .3s ease both;
  }
  .retry-hint-icon{ flex-shrink: 0; }

  /* ON-SCREEN NUMPAD */
  .numpad-display{
    width: 100%; max-width: 220px; min-height: 44px; margin: 0 auto;
    font-family: var(--font-display); font-weight: 800; font-size: clamp(22px,7vw,28px); text-align:center;
    border-radius: 12px; padding: 6px 14px; box-sizing: border-box;
    display:flex; align-items:center; justify-content:center;
    color: var(--ink); background:#fff;
  }
  .numpad-display .placeholder-q{ color: var(--ink-soft); opacity:.55; }
  .numpad-display .caret{ display:inline-block; width:2px; height:22px; background:var(--accent); margin-left:3px; animation: caretBlink 1s step-end infinite; }
  @keyframes caretBlink{ 50%{ opacity:0; } }

  .numpad-wrap{ width:100%; }
  .numpad{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:6px;
    width:100%; max-width:280px; margin: 8px auto 0;
  }
  .numpad-key{
    height:clamp(40px,11vh,50px); border-radius:14px; border:none; background:#fff;
    font-family:var(--font-display); font-weight:800; font-size:18px; color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    /* 3-D press illusion: bottom-edge shadow acts as the "depth" */
    box-shadow: 0 5px 0 rgba(27,42,74,.15), 0 2px 8px rgba(27,42,74,.08);
    transition: transform .08s ease, box-shadow .08s ease;
    user-select:none;
  }
  .numpad-key:active{
    transform: translateY(4px);
    box-shadow: 0 1px 0 rgba(27,42,74,.15);
  }
  .numpad-key.key-clear{ font-size:13px; color:var(--ink-soft); }
  .numpad-key.key-back{ font-size:18px; color:var(--coral-dark); }
  .numpad-key.key-neg{ font-size:20px; color:var(--ink-soft); }
  .numpad-key:disabled{ opacity:.35; pointer-events:none; }

  /* Springy correct-answer card pop */
  @keyframes cardPopGood{
    0%   { transform:scale(1) rotate(0deg); }
    20%  { transform:scale(1.06) rotate(.4deg); }
    45%  { transform:scale(0.97) rotate(-.3deg); }
    65%  { transform:scale(1.03) rotate(.2deg); }
    100% { transform:scale(1) rotate(0deg); }
  }

  /* DIFFICULTY SELECT SCREEN */
  .difficulty-screen{ justify-content:center; align-items:center; text-align:center; position:relative; }
  .difficulty-game-label{ font-size:14px; color:var(--ink-soft); font-weight:700; margin-bottom:2px; }
  .difficulty-title{ font-size:26px; margin-bottom:6px; }
  .difficulty-sub{ color:var(--ink-soft); font-size:14px; margin-bottom:24px; }
  .difficulty-grid{ display:flex; flex-direction:column; gap:14px; width:100%; max-width:320px; margin:0 auto; }
  .difficulty-card{
    display:flex; align-items:center; gap:14px; text-align:left; width:100%;
    background:#fff; border:3px solid var(--line); border-radius:var(--radius-md);
    padding:16px 18px; box-shadow:var(--shadow-soft); transition: all .15s ease;
  }
  .difficulty-card:active{ transform: scale(.98); }
  .difficulty-icon{ width:46px; height:46px; min-width:46px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#fff; }
  .diff-easy .difficulty-icon{ background: var(--success); }
  .diff-medium .difficulty-icon{ background: var(--amber); }
  .diff-hard .difficulty-icon{ background: var(--coral); }
  .difficulty-name{ font-family:var(--font-display); font-weight:800; font-size:17px; color:var(--ink); }
  .difficulty-range{ font-size:13px; color:var(--ink-soft); margin-top:1px; }
  .diff-tier-done{ border-color: var(--success); }
  .difficulty-tier-badge{
    font-size:12px; font-weight:800; color:var(--success);
    background: var(--success-bg); padding:4px 9px; border-radius:999px;
    white-space:nowrap; flex-shrink:0;
  }
  .difficulty-back{ margin-top:24px; }

  .disc-hundreds { background: var(--violet); color: white; width: clamp(34px,9vw,44px); height: clamp(34px,9vw,44px); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; margin: 2px; flex-shrink:0; }
  .disc-tens { background: var(--amber); color: white; width: clamp(34px,9vw,44px); height: clamp(34px,9vw,44px); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; margin: 2px; flex-shrink:0; }
  .disc-ones { background: var(--teal); color: white; width: clamp(34px,9vw,44px); height: clamp(34px,9vw,44px); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; margin: 2px; flex-shrink:0; }
  .disc-controls { display:flex; align-items:center; gap:6px; margin-top: 8px; justify-content: center; flex-wrap:wrap; }
  .round-btn { width:32px; height:32px; min-width:32px; border-radius:50%; border: none; background: #fff; box-shadow: var(--shadow-soft); font-weight: bold; font-size: 18px; color: var(--ink); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .round-btn:active { transform: scale(0.95); }

  .money-bill { background:var(--accent); color:#fff; min-width:0; width:clamp(78px,24vw,104px); height:40px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; font-weight:bold; font-size:clamp(11px,3vw,14px); padding:0 6px; box-shadow: var(--shadow-soft); flex-shrink:0; }

  /* PLACE VALUE: readBlocks mode (count the blocks, type the number) */
  .pv-blocks-row { display:flex; justify-content:center; align-items:flex-start; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  .pv-block-group { display:flex; flex-direction:column; align-items:center; gap:4px; min-width:0; }
  .pv-block-stack { display:flex; flex-wrap:wrap; justify-content:center; gap:2px; max-width:90px; }
  .pv-block-stack .disc-hundreds, .pv-block-stack .disc-tens, .pv-block-stack .disc-ones {
    width:clamp(22px,6vw,28px); height:clamp(22px,6vw,28px); font-size:9px; margin:1px;
  }
  .pv-block-label { font-size:11px; color:var(--ink-soft); font-weight:700; font-family:var(--font-display); }
  .pv-block-zero {
    width:clamp(22px,6vw,28px); height:clamp(22px,6vw,28px); border-radius:50%;
    border:2px dashed var(--line); display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:bold; color:var(--ink-soft); margin:1px;
  }

  /* PLACE VALUE: digitValue mode (highlight a digit, pick its value) */
  .pv-number-display { display:flex; justify-content:center; gap:2px; margin:6px 0; }
  .pv-digit {
    font-family:var(--font-display); font-weight:800; font-size:clamp(32px,10vw,44px); color:var(--ink-soft);
    padding:2px 4px; border-radius:8px;
  }
  .pv-digit-highlight { color:var(--accent-dark); background:var(--success-bg); }

  .skip-row { display:flex; align-items:center; gap:4px; flex-wrap:wrap; justify-content:center; margin-top:12px; row-gap:8px; }
  .skip-box { min-width:clamp(42px,12vw,60px); height:clamp(42px,12vw,60px); padding:0 4px; border:3px solid var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:clamp(15px,4.5vw,20px); font-weight:bold; background:#fff; color:var(--ink); font-family:var(--font-display); flex-shrink:0; }
  .skip-input { border:3px dashed var(--accent); background:#fff; -moz-appearance:textfield; }
  .skip-arrow { font-size:clamp(14px,4vw,18px); color:var(--ink-soft); flex-shrink:0; }

  .compare-row { display:flex; align-items:center; gap:8px; justify-content:center; margin-top:8px; flex-wrap:wrap; }
  .compare-symbol { min-width:clamp(44px,13vw,60px); height:clamp(44px,13vw,60px); border:3px dashed var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:clamp(20px,6vw,28px); font-weight:bold; color:var(--ink); background:#fff; flex-shrink:0; }
  .compare-options { display:flex; gap:8px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
  .symbol-btn { width:clamp(46px,14vw,60px); height:clamp(46px,14vw,60px); border-radius:14px; border:3px solid var(--line); background:#fff; font-size:clamp(20px,6vw,26px); font-weight:bold; color:var(--ink); display:flex; align-items:center; justify-content:center; transition:all .15s ease; flex-shrink:0; }
  .symbol-btn.selected { border-color:var(--accent); background:var(--accent); color:#fff; }
  .symbol-btn:active { transform:scale(0.95); }

  .time-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; max-width:280px; margin:12px auto 0; }
  .time-option-btn { padding:12px 6px; border-radius:12px; border:3px solid var(--line); background:#fff; font-weight:bold; font-size:15px; color:var(--ink); font-family:var(--font-display); }
  .time-option-btn.selected { border-color:var(--accent); background:var(--accent); color:#fff; }
  .time-option-btn:active { transform:scale(0.98); }

  .number-bond { display: flex; flex-direction: column; align-items: center; gap: 12px; width:100%; }
  .bond-circle { width: clamp(56px,16vw,80px); height: clamp(56px,16vw,80px); border: 3px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: clamp(17px,5vw,24px); font-weight: bold; background: white; color: var(--ink); flex-shrink:0; }
  .bond-parts { display: flex; gap: clamp(16px,8vw,40px); }
  .bond-input { width: 80px; text-align: center; font-size: 24px; border: 2px dashed var(--line); padding: 8px; border-radius: 12px; font-family: var(--font-display); font-weight: bold; color: var(--ink); }
  .bond-input:focus { border-color: var(--accent); outline: none; background: #fff; }

  .bar-model { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; overflow: visible; }
  .bar { fill: var(--accent); }
  .bar-total { fill: var(--violet); }
  .bar-text { fill: white; font-weight: bold; text-anchor: middle; dominant-baseline: middle; font-size: 16px; font-family: var(--font-display); }

  .complete-screen { text-align: center; justify-content: center; position: relative; }
  .complete-mark { margin: 0 auto 16px; color: var(--success); font-size: clamp(48px,14vw,70px); animation: pop 0.5s ease; }
  .complete-title { font-size: clamp(24px,7vw,32px); margin-bottom: 8px; color: var(--ink); }
  .complete-score { font-size: 16px; color: var(--ink-soft); margin-bottom: 12px; font-weight: bold; }
  .stars { font-size: clamp(32px,9vw,44px); margin-bottom: 12px; letter-spacing: 4px; }
  .complete-streak { font-size: 16px; font-weight: bold; color: var(--coral); margin-bottom: 18px; }
  .all-tiers-done-banner {
    background: var(--success-bg); color: var(--success);
    border-radius: var(--radius-md); padding: 12px 16px;
    font-size: 13px; font-weight: 700; line-height: 1.4;
    text-align: center; margin: 0 auto 16px; max-width: 320px;
  }
  .complete-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; margin: 0 auto; }

  /* PATCH GROUP L — MISSED QUESTION RECAP */
  .missed-recap { width: 100%; max-width: 360px; margin: 0 auto 18px; background: var(--retry-bg); border-radius: var(--radius-md); padding: 14px 16px; text-align: left; box-shadow: var(--shadow-soft); }
  .mode-review-badge { font-size: 11px; font-weight: 700; color: #8A4B00; background: #FFE8B8; border-radius: 8px; padding: 4px 8px; margin: 4px 0; display: inline-block; }
  .play-pet-companion { font-size: 22px; line-height: 1; margin: 0 4px; display: inline-block; }
  @keyframes petReactHappy { 0% { transform: translateY(0) scale(1); } 30% { transform: translateY(-8px) scale(1.25); } 60% { transform: translateY(0) scale(1.1); } 100% { transform: translateY(0) scale(1); } }
  @keyframes petReactSad { 0% { transform: rotate(0deg) scale(1); } 25% { transform: rotate(-8deg) scale(0.92); } 50% { transform: rotate(6deg) scale(0.92); } 75% { transform: rotate(-4deg) scale(0.95); } 100% { transform: rotate(0deg) scale(1); } }
  .pet-react-happy { animation: petReactHappy 0.7s ease; filter: drop-shadow(0 0 6px gold); }
  .pet-react-sad { animation: petReactSad 0.6s ease; filter: grayscale(0.4) brightness(0.9); }
  .difficulty-recommended-badge { font-size: 10px; font-weight: 800; color: #fff; background: #4CAF50; border-radius: 8px; padding: 3px 7px; margin-left: 6px; white-space: nowrap; }
  .home-banner-block { margin: 0 16px 12px; display: flex; flex-direction: column; gap: 6px; }
  .home-streak-banner { background: linear-gradient(135deg,#FF6B35,#FFB347); color: #fff; border-radius: 12px; padding: 10px 14px; font-size: 13px; font-weight: 700; text-align: center; box-shadow: 0 2px 8px rgba(255,107,53,0.3); }
  .home-review-nudge { background: #FFF8E7; border: 2px solid #FFD580; color: #7A5500; border-radius: 12px; padding: 8px 14px; font-size: 12px; font-weight: 600; text-align: center; }
  .boss-unlock-banner { background: linear-gradient(135deg,#1a0533,#3a0a6e); border-radius: 16px; padding: 16px; margin: 12px 0; text-align: center; color: #fff; box-shadow: 0 4px 16px rgba(100,0,200,0.4); }
  .boss-unlock-icon { font-size: 36px; margin-bottom: 6px; }
  .boss-unlock-text { font-size: 13px; margin-bottom: 12px; line-height: 1.4; }
  .btn-boss { background: linear-gradient(135deg,#FF6B35,#FFD700); color: #1a0533; font-weight: 900; font-size: 15px; border: none; border-radius: 12px; padding: 12px 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(255,107,53,0.5); }
  .boss-complete-screen { background: linear-gradient(160deg,#1a0533 0%,#3a0a6e 60%,#0a1a3e 100%); color: #fff; position: relative; overflow: hidden; }
  .boss-complete-confetti { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
  .confetti-piece { position: absolute; top: -20px; border-radius: 3px; animation: confettiFall 2s ease-in forwards; }
  @keyframes confettiFall { 0% { top: -20px; transform: rotate(0deg) translateX(0); opacity: 1; } 100% { top: 110%; transform: rotate(720deg) translateX(40px); opacity: 0; } }
  .boss-complete-icon { font-size: 48px; margin: 24px 0 8px; text-align: center; }
  .boss-complete-title { font-size: 28px; font-weight: 900; text-align: center; letter-spacing: 2px; text-shadow: 0 0 20px gold; margin: 0 0 4px; }
  .boss-complete-sub { font-size: 15px; text-align: center; opacity: 0.9; margin: 0 0 16px; }

  /* ── Multiplication renderer ── */
  .mult-card { padding: 14px 12px 6px; }
  .mult-prompt { font-size: 17px; font-weight: 800; color: var(--ink); text-align: center; margin: 0 0 10px; }
  .mult-sub { font-size: 12px; color: var(--ink-soft); text-align: center; margin: -6px 0 8px; }
  .mult-groups-wrap { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 0 0 12px; }
  .mult-groups-small .mult-group-box { padding: 5px 6px; }
  .mult-group-box { background: var(--surface); border: 2px solid var(--border); border-radius: 10px; padding: 8px 10px; display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; max-width: 120px; }
  .mult-group-sm { max-width: 80px; }
  .mult-emoji-item { font-size: 20px; line-height: 1; }
  .mult-dot-grid { display: grid; gap: 5px; margin: 0 auto 10px; width: fit-content; }
  .mult-dot { width: 16px; height: 16px; border-radius: 50%; }
  .mult-dot.row-0 { background: var(--indigo, #7A6FCB); }
  .mult-dot.row-1 { background: var(--coral, #FF6B5B); }
  .mult-array-label { text-align: center; font-size: 18px; font-weight: 700; margin: 6px 0 10px; }
  .mult-equation-strip { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 26px; font-weight: 900; margin: 8px 0; flex-wrap: wrap; }
  .mult-eq-large .mult-factor { font-size: 32px; }
  .mult-factor { color: var(--ink); }
  .mult-product { color: var(--teal, #1FA391); }
  .mult-op { color: var(--ink-soft); font-size: 22px; }
  .mult-blank-box { min-width: 40px; padding: 2px 8px; background: #EDE9FC; border: 2px dashed var(--indigo, #7A6FCB); border-radius: 8px; text-align: center; color: var(--indigo, #7A6FCB); font-weight: 900; transition: background 0.3s; }
  .mult-blank-box.mult-missing { font-size: 28px; min-width: 52px; }
  .mult-ans-correct { background: #D4EDDA !important; border-color: #28a745 !important; color: #28a745 !important; }
  .mult-ans-wrong   { background: #FDECEA !important; border-color: #e74c3c !important; color: #e74c3c !important; }
  .mult-repeated-add-wrap { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 4px; margin: 8px 0 6px; }
  .mult-addend-chip { background: var(--indigo, #7A6FCB); color: #fff; font-size: 22px; font-weight: 900; border-radius: 8px; padding: 4px 10px; }
  .mult-plus-sign { font-size: 22px; font-weight: 700; color: var(--ink-soft); }
  .mult-equals-sign { font-size: 22px; font-weight: 700; color: var(--ink-soft); }
  .mult-answer-blank { font-size: 24px; font-weight: 900; color: var(--indigo, #7A6FCB); }
  .mult-connection-note { text-align: center; font-size: 13px; color: var(--ink-soft); margin: 0 0 8px; }
  .mult-hint-bar { background: #EDE9FC; border-radius: 8px; padding: 7px 12px; font-size: 12px; color: #4A3F8C; text-align: center; margin: 6px 0; }
  .mult-missing-visual { display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap; margin: 4px 0 8px; }
  .mult-missing-x { font-size: 18px; font-weight: 800; color: var(--indigo, #7A6FCB); margin-left: 6px; }
  .mult-commute-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 8px 0; flex-wrap: wrap; }
  .mult-commute-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .mult-commute-label { font-size: 15px; font-weight: 700; color: var(--ink); }
  .mult-commute-eq { font-size: 22px; font-weight: 900; color: var(--teal, #1FA391); }
  .mult-commute-opts { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
  .mult-commute-btn { font-size: 22px; font-weight: 900; width: 56px; height: 56px; border-radius: 12px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; color: var(--ink); transition: background 0.15s; }
  .mult-commute-btn:hover:not(:disabled) { background: #EDE9FC; }
  .mult-btn-correct { background: #D4EDDA !important; border-color: #28a745 !important; color: #28a745 !important; }
  .mult-btn-wrong   { background: #FDECEA !important; border-color: #e74c3c !important; color: #e74c3c !important; }
  .mult-story { font-size: 15px; font-weight: 600; color: var(--ink); text-align: center; line-height: 1.5; margin: 0 0 10px; padding: 10px 12px; background: #F9F5FF; border-radius: 10px; }
  .mult-hint-toggle { font-size: 12px; color: var(--indigo, #7A6FCB); text-align: center; cursor: pointer; margin: 6px 0 2px; text-decoration: underline; }
  .mult-hint-box { background: #EDE9FC; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #4A3F8C; margin: 4px 0; }
  .mult-fact-bubble { background: #E8F9F5; border-left: 3px solid var(--teal, #1FA391); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #0D6E57; margin: 8px 0 4px; }
  .missed-recap-title { font-weight: bold; color: var(--retry-ink); margin-bottom: 8px; font-size: 14px; }
  .missed-recap-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .missed-recap-list li { display: flex; flex-direction: column; gap: 2px; border-bottom: 1px solid rgba(138,90,0,0.15); padding-bottom: 6px; }
  .missed-recap-list li:last-child { border-bottom: none; padding-bottom: 0; }
  .missed-recap-q { font-size: 13px; color: var(--ink); font-weight: 600; }
  .missed-recap-a { font-size: 12px; color: var(--retry-ink); }

  /* ====================================================================
     GAMIFICATION CSS
     ==================================================================== */
  .gamification-stats { display: flex; justify-content: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; z-index: 1; position: relative; }
  .coins-badge { background: #FFD700; color: #8A5A00; padding: 6px 14px; border-radius: 12px; font-weight: bold; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow-soft); font-size: 14px; }
  .streak-badge { background: #FF6B5B; color: #fff; padding: 6px 14px; border-radius: 12px; font-weight: bold; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow-soft); font-size: 14px; }
  .ach-badge { background: #7A6FCB; color: #fff; padding: 6px 14px; border-radius: 12px; font-weight: bold; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow-soft); font-size: 14px; }
  .clickable-badge { cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.15s ease; }
  .clickable-badge:active { transform: scale(0.95); }
  .progress-report-link { display: block; margin: 0 auto 16px; width: fit-content; font-size: 13px; padding: 8px 16px; position: relative; z-index: 1; }

  /* ====================================================================
     SPARKLE PET — full redesign
     ==================================================================== */
  .pet-preview-card {
    display: flex; align-items: center; gap: 12px; background: #fff; border-radius: var(--radius-lg);
    padding: 10px 14px; margin: 0 auto 16px; max-width: 360px; box-shadow: var(--shadow-card);
    cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform .15s ease;
    position: relative; z-index: 1;
  }
  .pet-preview-card:active { transform: scale(.98); }
  .pet-preview-info { flex: 1; min-width: 0; text-align: left; }
  .pet-preview-name { font-family: var(--font-display); font-weight: 800; font-size: 15px; color: var(--ink); }
  .pet-preview-note { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }
  .pet-preview-arrow { font-size: 22px; color: var(--ink-soft); flex-shrink: 0; }

  /* Journey Map */
  .journey-continue-card { background: linear-gradient(135deg,#7A6FCB,#A8D8F5); }
  .journey-continue-card .pet-preview-name, .journey-continue-card .pet-preview-note { color: #fff; }
  .journey-continue-icon { font-size: 30px; flex-shrink: 0; }
  .map-path { display: flex; flex-direction: column; align-items: center; padding: 16px 16px 20px; border-radius: 24px; margin: 0 10px; }
  .map-node { position: relative; }
  .map-node-current { border-width: 3px; box-shadow: 0 0 0 4px rgba(255,255,255,.6), var(--shadow-card); }
  .map-you-are-here-badge {
    position: absolute; top: -14px; left: -10px; font-size: 26px; z-index: 2;
    animation: mapPetBob 1.6s ease-in-out infinite; filter: drop-shadow(0 3px 4px rgba(0,0,0,.25));
  }
  @keyframes mapPetBob { 0%, 100% { transform: translateY(0) rotate(-6deg); } 50% { transform: translateY(-5px) rotate(6deg); } }
  .map-connector { width: 4px; height: 20px; background: repeating-linear-gradient(180deg,#C9A8F5 0 6px,transparent 6px 12px); }
  .map-node {
    display: flex; align-items: center; gap: 12px; background: #fff; border-radius: var(--radius-lg);
    padding: 12px 16px; width: 100%; max-width: 360px; box-shadow: var(--shadow-card);
    border: 2px solid var(--node-color, #ccc); cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform .15s ease;
  }
  .map-node:active { transform: scale(.98); }
  .map-node-locked { opacity: .55; filter: grayscale(.5); cursor: default; }
  .map-node-cleared { background: #FFFBEA; }
  .map-node-icon { font-size: 30px; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; background: var(--node-color, #eee); border-radius: 50%; flex-shrink: 0; color: #fff; }
  .map-node-body { flex: 1; text-align: left; min-width: 0; }
  .map-node-label { font-family: var(--font-display); font-weight: 800; font-size: 15px; color: var(--ink); }
  .map-node-sub { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .map-node-boss-ready { font-size: 12px; font-weight: 800; color: #FF6B5B; margin-top: 3px; }
  .map-side-header { text-align: center; font-family: var(--font-display); font-weight: 800; font-size: 14px; color: var(--ink-soft); margin: 18px 0 8px; }
  .map-side-row { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px 16px; -webkit-overflow-scrolling: touch; flex-shrink: 0; }
  .map-side-node {
    flex: 0 0 auto; width: 96px; display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: #fff; border-radius: var(--radius-lg); padding: 10px 8px; box-shadow: var(--shadow-card);
    border: 2px solid var(--node-color, #ccc); cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .map-side-node.map-node-locked { opacity: .55; filter: grayscale(.5); cursor: default; }
  .map-side-icon { font-size: 26px; }
  .map-side-label { font-size: 11px; font-weight: 700; text-align: center; color: var(--ink); line-height: 1.2; }

  /* World Boss card (inside World Detail screen) */
  .world-boss-card {
    display: flex; align-items: center; gap: 14px; background: #fff; border-radius: var(--radius-lg);
    padding: 14px 16px; margin: 0 16px 20px; box-shadow: var(--shadow-card); border: 2px solid #FF6B5B;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .world-boss-locked { opacity: .55; filter: grayscale(.4); cursor: default; border-color: #ccc; }
  .world-boss-cleared { border-color: gold; background: #FFFBEA; cursor: default; }
  .world-boss-icon { font-size: 30px; flex-shrink: 0; }
  .world-boss-text { font-size: 13px; color: var(--ink-soft); }
  .world-boss-text strong { color: var(--ink); }

  /* Lightweight toast for locked-node taps */
  .simple-toast {
    position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px);
    background: #333; color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 700;
    box-shadow: 0 8px 20px -6px rgba(0,0,0,.4); z-index: 9999; opacity: 0; transition: opacity .3s ease, transform .3s ease;
    max-width: 85vw; text-align: center;
  }
  .simple-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Daily Quest board */
  .daily-quest-board { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); margin: 0 16px 16px; padding: 12px 14px; }
  .daily-quest-title { font-family: var(--font-display); font-weight: 800; font-size: 14px; color: var(--ink); margin-bottom: 8px; }
  .daily-quest-row { display: flex; align-items: center; gap: 10px; padding: 6px 2px; font-size: 13px; color: var(--ink); }
  .daily-quest-row + .daily-quest-row { border-top: 1px solid #F0EEF7; }
  .daily-quest-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }
  .daily-quest-label { flex: 1; }
  .daily-quest-reward { font-weight: 800; color: #E0A400; font-size: 12px; flex-shrink: 0; }
  .daily-quest-done { opacity: .55; }
  .daily-quest-done .daily-quest-label { text-decoration: line-through; }

  .story-beat-line {
    text-align: center; font-size: 13px; font-weight: 700; color: #7A6FCB;
    background: #F5F2FF; border-radius: 999px; padding: 8px 14px; margin: 4px 16px 10px; display: block;
  }

  /* Journey Map hero (home screen primary CTA, replaces the old carousel) */
  .journey-hero {
    background: linear-gradient(135deg,#7A6FCB,#A8D8F5); border-radius: var(--radius-lg);
    margin: 0 16px 16px; padding: 16px; box-shadow: var(--shadow-card); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .journey-hero-strip { display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .hero-world-dot {
    position: relative; width: 34px; height: 34px; border-radius: 50%; background: var(--dot-color, #fff);
    display: flex; align-items: center; justify-content: center; font-size: 17px; border: 2px solid rgba(255,255,255,.8);
  }
  .hero-world-dot-locked { opacity: .5; filter: grayscale(.6); }
  .hero-world-dot-current { box-shadow: 0 0 0 4px rgba(255,255,255,.7); transform: scale(1.15); }
  .hero-world-connector { width: 10px; height: 2px; background: rgba(255,255,255,.6); }
  .hero-dot-check { position: absolute; bottom: -4px; right: -4px; background: #fff; border-radius: 50%; font-size: 9px; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; color: #2E7D5B; }
  .journey-hero-text { text-align: center; margin-bottom: 12px; }
  .journey-hero-title { font-family: var(--font-display); font-weight: 900; font-size: 16px; color: #fff; }
  .journey-hero-sub { font-size: 12px; color: rgba(255,255,255,.9); margin-top: 2px; }
  .journey-hero-btn { width: 100%; background: #fff; color: #7A6FCB; }

  .home-footer-links { display: flex; flex-direction: column; gap: 6px; padding: 0 16px 20px; }
  .home-info-footer {
    display:flex; flex-direction:column; gap:6px; padding:12px 16px calc(16px + env(safe-area-inset-bottom));
    margin-top:4px; border-top:1px dashed var(--line);
  }
  .home-info-footer p { font-size:11.5px; line-height:1.5; color:var(--ink-soft); text-align:center; }
  .home-info-footer a { color:var(--accent-dark); font-weight:700; text-decoration:none; }
  .home-info-footer a:hover { text-decoration:underline; }
  .home-browser-note { color:var(--amber-dark) !important; font-weight:600; }

  /* ====================================================================
     FLOATING DONATE BUTTON
     ==================================================================== */
  .donate-float-btn{
    position:fixed; right:calc(14px + env(safe-area-inset-right)); bottom:calc(14px + env(safe-area-inset-bottom));
    z-index:9000; display:flex; align-items:center; gap:6px;
    background:#fff; color:var(--ink); text-decoration:none;
    padding:10px 16px 10px 12px; border-radius:999px; border:2px solid var(--amber);
    box-shadow:0 8px 20px -6px rgba(27,42,74,.35);
    font-family:var(--font-display); font-weight:800; font-size:13px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .donate-float-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 24px -6px rgba(27,42,74,.4); }
  .donate-float-btn:active{ transform:translateY(0) scale(.96); }
  .donate-float-icon{ font-size:17px; line-height:1; }
  .donate-float-label{ white-space:nowrap; }
  @media (max-width:360px){
    .donate-float-label{ display:none; }
    .donate-float-btn{ padding:10px; }
  }
  /* Hide the floating Support button whenever an on-screen numpad is mounted
     (quiz/question screens) so it never overlaps the keypad's bottom row.
     Reappears automatically once the numpad unmounts (map/home/etc). */
  body:has(.numpad-wrap) .donate-float-btn{ display:none; }
  .practice-mode-link { font-size: 12px; opacity: .75; }

  .world-path-chapter-label {
    width: 100%; max-width: 360px; margin: 14px 0 6px 4px; font-family: var(--font-display); font-weight: 800;
    font-size: 13px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .03em;
  }
  .lesson-star-row { margin-top: 3px; }
  .lesson-star { font-size: 15px; opacity: .35; margin-right: 1px; }
  .lesson-star-filled { opacity: 1; }

  /* ================================================================
     WINDING CAMPAIGN TRAIL — Age-of-Empires-style map: a road snakes
     down themed terrain, each stop a medallion on a little wooden post.
  ================================================================ */
  .trail-wrap {
    position: relative; margin: 4px 10px 22px; border-radius: 20px; overflow: hidden;
    border: 7px solid #8B6A3F; flex-shrink: 0;
    box-shadow: 0 10px 24px -8px rgba(0,0,0,.35), inset 0 0 0 3px #D9BD8C, inset 0 2px 14px rgba(0,0,0,.15);
  }
  /* Distant hills for depth, sitting behind everything else in the panel */
  .trail-hill { position: absolute; border-radius: 50%; opacity: .35; filter: blur(1px); z-index: 0; pointer-events: none; }

  .trail-road-svg { position: absolute; top: 0; left: 0; z-index: 0; }
  .trail-road-shadow { fill: none; stroke: rgba(0,0,0,.18); stroke-width: 8; stroke-linecap: round; }
  .trail-road-base { fill: none; stroke: #C9A876; stroke-width: 7; stroke-linecap: round; }
  .trail-road-dash { fill: none; stroke: #8B6A3F; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 2 6; }
  .trail-scenery { position: absolute; font-size: 22px; opacity: .8; pointer-events: none; z-index: 0; transform: translate(-50%,-50%); filter: drop-shadow(0 2px 2px rgba(0,0,0,.15)); }

  /* Fog of war — territory past the current stop hasn't been "explored" yet */
  .trail-fog {
    position: absolute; left: 0; width: 100%; z-index: 4; pointer-events: none;
    background: linear-gradient(180deg, rgba(235,240,245,0) 0%, rgba(235,240,245,.55) 18%, rgba(230,235,242,.92) 45%, rgba(226,231,240,.97) 100%);
  }
  .trail-fog-cloud { position: absolute; font-size: 34px; opacity: .85; filter: drop-shadow(0 3px 3px rgba(0,0,0,.1)); }

  .trail-node {
    position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center;
    z-index: 2; cursor: pointer; -webkit-tap-highlight-color: transparent; width: 112px;
  }
  .trail-node-medallion {
    width: 62px; height: 62px; border-radius: 50%; background: radial-gradient(circle at 32% 28%, #fff, #F2EFE8 65%);
    border: 4px solid var(--node-color, #ccc); display: flex; align-items: center; justify-content: center; font-size: 30px;
    box-shadow: 0 7px 0 -1px rgba(0,0,0,.18), 0 8px 16px -4px rgba(0,0,0,.4), inset 0 2px 3px rgba(255,255,255,.8), 0 0 0 3px rgba(255,255,255,.55);
    position: relative; z-index: 2;
  }
  .trail-node-post { width: 7px; height: 16px; background: linear-gradient(180deg,#9C7A4D,#6B4E2A); margin-top: -2px; z-index: 1; border-radius: 0 0 2px 2px; }
  .trail-node-caption {
    position: relative; text-align: center; margin-top: 6px; background: linear-gradient(180deg,#FFFBF0,#FBF0D8);
    border: 1.5px solid #D9BD8C; border-radius: 8px; padding: 4px 9px; box-shadow: 0 3px 6px -2px rgba(0,0,0,.25); max-width: 112px;
  }
  .trail-node-caption::before {
    content: ""; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 6px solid #D9BD8C;
  }
  .trail-node-caption::after {
    content: ""; position: absolute; top: -4.5px; left: 50%; transform: translateX(-50%);
    border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 5px solid #FFFBF0;
  }
  .trail-node-label { font-family: var(--font-display); font-weight: 800; font-size: 11px; color: #4A3820; line-height: 1.15; }
  .trail-node-sub { font-size: 10px; color: #8A7550; margin-top: 1px; }
  .trail-node-boss-ready { font-size: 10px; font-weight: 800; color: #D1483A; margin-top: 1px; }

  .trail-node-locked .trail-node-medallion { filter: grayscale(.8) brightness(.92); opacity: .65; border-color: #a89a82; box-shadow: 0 6px 12px -4px rgba(0,0,0,.3); }
  .trail-node-locked .trail-node-caption { opacity: .65; }
  .trail-node-cleared .trail-node-medallion { border-color: #FFD700; box-shadow: 0 7px 0 -1px rgba(0,0,0,.18), 0 0 0 4px rgba(255,215,0,.4), 0 8px 16px -4px rgba(0,0,0,.4), inset 0 2px 3px rgba(255,255,255,.8); }
  .trail-node-current .trail-node-medallion { animation: trailNodePulse 1.8s ease-in-out infinite; }
  @keyframes trailNodePulse {
    0%, 100% { box-shadow: 0 7px 0 -1px rgba(0,0,0,.18), 0 0 0 0 rgba(255,255,255,.7), 0 8px 16px -4px rgba(0,0,0,.4); }
    50% { box-shadow: 0 7px 0 -1px rgba(0,0,0,.18), 0 0 0 9px rgba(255,255,255,0), 0 8px 16px -4px rgba(0,0,0,.4); }
  }
  .trail-pet-badge {
    position: absolute; top: -24px; font-size: 28px; z-index: 3;
    animation: mapPetBob 1.6s ease-in-out infinite; filter: drop-shadow(0 3px 4px rgba(0,0,0,.3));
  }
  .trail-chapter-banner {
    position: absolute; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 800;
    color: #fff; background: linear-gradient(180deg,#E0654F,#C1442F); border-radius: 999px; padding: 4px 12px;
    white-space: nowrap; z-index: 2; box-shadow: 0 3px 8px -2px rgba(0,0,0,.35);
  }


  /* Pet visual core */
  .pet-visual {
    position: relative; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .pet-visual-small { width: 52px; height: 52px; font-size: 28px; }
  .pet-visual-large { width: 150px; height: 150px; margin: 8px auto 6px; font-size: 80px; }
  .pet-emoji { line-height: 1; }
  .pet-visual-small .pet-emoji { font-size: 28px; }
  .pet-visual-large .pet-emoji { font-size: 80px; }
  .pet-accessory-overlay { position: absolute; inset: 0; pointer-events: none; }
  .pet-visual-small .pet-accessory-badge { position: absolute; top: -4px; right: -4px; font-size: 14px; }
  .pet-visual-large .pet-accessory-badge { position: absolute; top: 0; right: 4px; font-size: 28px; }
  .pet-visual-large .pet-accessory-badge:nth-child(2) { top: auto; bottom: 0; left: 4px; right: auto; }
  .pet-visual-large .pet-accessory-badge:nth-child(3) { top: 50%; left: -8px; }

  /* Aura rings — unlocked at each evolution stage */
  .pet-aura-ring {
    position: absolute; inset: -6px; border-radius: 50%; pointer-events: none;
    opacity: 0; transition: opacity .4s ease;
  }
  .pet-aura-glow  { box-shadow: 0 0 0 4px #FFB3D9, 0 0 16px 6px #C9A8F560; opacity: 1; }
  .pet-aura-rainbow { animation: auraRainbow 2s linear infinite; opacity: 1; }
  .pet-aura-legendary { animation: auraLegendary 1.5s ease-in-out infinite; opacity: 1; }
  @keyframes auraRainbow {
    0%   { box-shadow: 0 0 0 5px #FF6B5B, 0 0 18px 8px #FF6B5B44; }
    25%  { box-shadow: 0 0 0 5px #F4A828, 0 0 18px 8px #F4A82844; }
    50%  { box-shadow: 0 0 0 5px #1FA391, 0 0 18px 8px #1FA39144; }
    75%  { box-shadow: 0 0 0 5px #7A6FCB, 0 0 18px 8px #7A6FCB44; }
    100% { box-shadow: 0 0 0 5px #FF6B5B, 0 0 18px 8px #FF6B5B44; }
  }
  @keyframes auraLegendary {
    0%, 100% { box-shadow: 0 0 0 6px #FFD700, 0 0 28px 14px #FFD70055; }
    50%       { box-shadow: 0 0 0 8px #FFD700, 0 0 40px 20px #FFD70088; }
  }

  /* Pet bounce idle animation */
  .pet-bounce { animation: petBounce 2s ease-in-out infinite; }
  @keyframes petBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  /* Pet screen layout */
  .pet-name-row { display: flex; justify-content: center; margin-bottom: 4px; }
  .pet-name-input {
    text-align: center; font-family: var(--font-display); font-weight: 800; font-size: 17px;
    border: none; background: transparent; color: var(--ink); max-width: 220px; padding: 4px 8px;
    border-bottom: 2px dashed var(--line);
  }
  .pet-name-input:focus { outline: none; border-bottom-color: var(--accent); }
  .pet-stage-label { text-align: center; font-size: 13px; color: var(--ink-soft); font-weight: 700; margin-bottom: 6px; }

  /* Sparkle Power bar */
  .sparkle-bar-wrap {
    width: 100%; max-width: 300px; margin: 0 auto 4px;
  }
  .sparkle-bar-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
    font-family: var(--font-display); font-weight: 800; font-size: 13px; color: #8A5A00;
  }
  .sparkle-bar-track {
    width: 100%; height: 18px; background: #fff; border-radius: 999px;
    box-shadow: inset 0 1px 3px rgba(27,42,74,.15); overflow: hidden;
  }
  .sparkle-bar-fill {
    height: 100%; background: linear-gradient(90deg, #FFB3D9, #C9A8F5, #A8D8F5);
    background-size: 200% 100%; border-radius: 999px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
    animation: sparkleShimmer 3s linear infinite;
    position: relative;
  }
  .sparkle-bar-fill::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.4), transparent 55%);
    border-radius: 999px;
  }
  @keyframes sparkleShimmer {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .sparkle-bar-note { text-align: center; font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; font-weight: 600; }

  /* Evolution ready banner */
  .evo-ready-banner {
    background: linear-gradient(135deg, #FFB3D9, #C9A8F5);
    border-radius: var(--radius-md); padding: 12px 16px; text-align: center;
    margin: 0 auto 14px; max-width: 300px; box-shadow: var(--shadow-card);
    animation: evoBannerPulse 1.5s ease-in-out infinite;
  }
  @keyframes evoBannerPulse {
    0%, 100% { box-shadow: var(--shadow-card); }
    50%       { box-shadow: 0 8px 28px -8px #C9A8F5CC; }
  }
  .evo-ready-title { font-family: var(--font-display); font-weight: 800; font-size: 16px; color: #4A2070; margin-bottom: 4px; }
  .evo-ready-reward { font-size: 12px; color: #6A4090; margin-bottom: 10px; }
  .btn-evolve {
    background: linear-gradient(135deg, #C9A8F5, #7A6FCB);
    color: #fff; font-family: var(--font-display); font-weight: 800; font-size: 16px;
    border: none; border-radius: 999px; padding: 12px 28px; box-shadow: 0 4px 14px -4px #7A6FCB88;
    transition: transform .12s ease, box-shadow .12s ease;
    animation: evolveGlow 1.5s ease-in-out infinite;
  }
  .btn-evolve:active { transform: scale(.95); }
  @keyframes evolveGlow {
    0%, 100% { box-shadow: 0 4px 14px -4px #7A6FCB88; }
    50%       { box-shadow: 0 6px 22px -2px #7A6FCBCC; }
  }

  /* Coin + inventory row */
  .pet-info-row {
    display: flex; justify-content: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .pet-info-chip {
    font-family: var(--font-display); font-weight: 800; font-size: 13px;
    border-radius: 999px; padding: 6px 14px; display: flex; align-items: center; gap: 5px;
  }
  .pet-coin-chip { background: #FFF7DD; color: #8A5A00; }
  .pet-inv-chip  { background: #F0F4FF; color: #4A5490; }

  /* Section labels */
  .pet-section-label { font-family: var(--font-display); font-weight: 800; font-size: 14px; color: var(--ink); margin: 0 0 8px; text-align: center; }

  .evo-gallery { display: flex; align-items: center; justify-content: flex-start; gap: 6px; padding: 4px 10px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0; }
  .evo-gallery-item {
    position: relative; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 0 0 auto;
    background: #fff; border-radius: 16px; padding: 10px 8px; box-shadow: var(--shadow-card); width: 70px;
  }
  .evo-gallery-emoji { font-size: 30px; }
  .evo-gallery-name { font-size: 10px; font-weight: 700; text-align: center; color: var(--ink); line-height: 1.15; }
  .evo-gallery-locked { opacity: .45; filter: grayscale(.6); }
  .evo-gallery-locked .evo-gallery-emoji { filter: blur(.3px); }
  .evo-gallery-current { box-shadow: 0 0 0 3px gold, var(--shadow-card); }
  .evo-gallery-you-tag {
    position: absolute; top: -9px; left: 50%; transform: translateX(-50%); background: #FF6B5B; color: #fff;
    font-size: 9px; font-weight: 900; border-radius: 999px; padding: 2px 7px; letter-spacing: .03em;
  }
  .evo-gallery-arrow { font-size: 16px; color: var(--ink-soft); flex: 0 0 auto; }

  .play-bg-scenery {
    position: absolute; opacity: .32; pointer-events: none; z-index: -1;
    transform: translate(-50%,-50%); filter: saturate(1.1);
  }
  .pet-section-sub { font-size: 11px; color: var(--ink-soft); text-align: center; margin: -6px 0 10px; }

  /* Food shop grid */
  .pet-food-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .pet-food-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px; background: #fff;
    border-radius: var(--radius-md); padding: 12px 8px; border: 2px solid var(--line);
    box-shadow: var(--shadow-soft); transition: transform .12s ease, border-color .12s ease;
  }
  .pet-food-item:active { transform: scale(.96); }
  .pet-food-item:not(:disabled):hover { border-color: #FFB3D9; }
  .pet-food-item:disabled { opacity: .45; }
  .pet-food-icon { font-size: 28px; }
  .pet-food-name { font-size: 12px; font-weight: 700; color: var(--ink); text-align: center; }
  .pet-food-cost { font-size: 11px; color: #8A5A00; font-weight: 700; }
  .pet-food-power { font-size: 11px; color: var(--violet); font-weight: 800; }
  .pet-food-owned { background: #F8F0FF; border-color: var(--violet); }

  /* Inventory feed buttons */
  .pet-inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .pet-inv-item {
    display: flex; align-items: center; gap: 8px; background: #fff;
    border-radius: var(--radius-sm); padding: 8px 10px; border: 2px solid var(--line);
    box-shadow: var(--shadow-soft); text-align: left;
  }
  .pet-inv-icon { font-size: 22px; flex-shrink: 0; }
  .pet-inv-info { flex: 1; min-width: 0; }
  .pet-inv-name { font-size: 11px; font-weight: 700; color: var(--ink); }
  .pet-inv-count { font-size: 10px; color: var(--ink-soft); }
  .pet-inv-feed-btn {
    font-size: 10px; font-weight: 800; font-family: var(--font-display);
    background: linear-gradient(135deg, #FFB3D9, #C9A8F5); color: #4A2070;
    border: none; border-radius: 999px; padding: 4px 10px; flex-shrink: 0;
  }
  .pet-inv-feed-btn:active { transform: scale(.93); }
  .pet-inv-feed-btn:disabled { opacity: .45; }

  /* Color picker */
  .pet-color-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .pet-color-swatch { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; box-shadow: var(--shadow-soft); }
  .pet-color-selected { border-color: var(--ink); transform: scale(1.1); }

  /* Accessory shop */
  .pet-shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .pet-shop-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px; background: #fff;
    border-radius: var(--radius-md); padding: 12px 8px; border: 2px solid var(--line); box-shadow: var(--shadow-soft);
    transition: transform .12s ease;
  }
  .pet-shop-item:active { transform: scale(.96); }
  .pet-shop-icon { font-size: 26px; }
  .pet-shop-name { font-size: 12px; font-weight: 700; color: var(--ink); text-align: center; }
  .pet-shop-cost { font-size: 11px; color: var(--ink-soft); font-weight: 700; }
  .pet-shop-owned { border-color: var(--accent); }
  .pet-shop-equipped { border-color: var(--success); background: var(--success-bg); }
  .pet-shop-equipped .pet-shop-cost { color: var(--success); }
  .pet-shop-locked { opacity: .55; }

  /* Evolution celebration overlay */
  .evo-modal-overlay {
    position: fixed; inset: 0; background: rgba(20,10,40,.75); z-index: 10000;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    animation: fadeIn .2s ease both;
  }
  .evo-modal {
    background: linear-gradient(145deg, #2A1A4A, #4A2070);
    border-radius: var(--radius-lg); padding: 28px 22px; max-width: 320px; width: 100%;
    text-align: center; animation: pop .35s ease both; color: #fff;
    box-shadow: 0 20px 60px -10px rgba(0,0,0,.6);
  }
  .evo-modal-pet { font-size: 90px; line-height: 1; margin-bottom: 8px; animation: petBounce 1s ease-in-out infinite; display: block; }
  .evo-modal-title { font-family: var(--font-display); font-weight: 800; font-size: 22px; margin-bottom: 4px; color: #FFD700; }
  .evo-modal-stage { font-size: 14px; opacity: .85; margin-bottom: 10px; }
  .evo-modal-reward { background: rgba(255,255,255,.15); border-radius: 12px; padding: 10px 14px; margin-bottom: 18px; font-size: 14px; font-weight: 700; }
  .evo-modal-btn { background: #FFD700; color: #4A2070; font-family: var(--font-display); font-weight: 800; font-size: 16px; border: none; border-radius: 999px; padding: 14px 32px; box-shadow: 0 4px 14px -4px rgba(0,0,0,.3); }
  .evo-modal-btn:active { transform: scale(.96); }

  /* ==================================================================
     ROAMING SPARKLE COMPANION — floats across screens, talks in bubbles,
     reacts to taps with love glitter. Lives outside #app so it survives
     every render() call instead of being wiped out.
  ================================================================== */
  .sparkle-companion {
    position: fixed; left: 0; top: 0; width: 56px; height: 56px;
    z-index: 5000; pointer-events: none;
    transition: left 2.2s cubic-bezier(.4,0,.2,1), top 2.2s cubic-bezier(.4,0,.2,1);
    will-change: left, top;
  }
  .sparkle-companion-face {
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; line-height: 1; cursor: pointer; pointer-events: auto;
    background: radial-gradient(circle, rgba(255,255,255,.85), rgba(255,255,255,.15) 70%);
    box-shadow: 0 4px 14px -4px rgba(120,80,180,.45);
    animation: sparkleCompanionBob 2.6s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .sparkle-companion-face:active { transform: scale(.88); }
  .sparkle-companion.walking .sparkle-companion-face { animation: sparkleCompanionBob 2.6s ease-in-out infinite, sparkleCompanionWiggle .5s ease-in-out infinite; }
  @keyframes sparkleCompanionBob {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-7px) rotate(3deg); }
  }
  @keyframes sparkleCompanionWiggle {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(3px); }
  }
  .sparkle-companion-bubble {
    position: absolute; bottom: 62px; left: 50%; transform: translateX(-50%) translateY(6px) scale(.85);
    background: #fff; color: #4A2070; font-family: var(--font-display,inherit);
    font-weight: 700; font-size: 13px; line-height: 1.25; white-space: nowrap;
    padding: 8px 13px; border-radius: 14px; box-shadow: 0 6px 16px -4px rgba(0,0,0,.25);
    opacity: 0; pointer-events: none; transition: opacity .35s ease, transform .35s ease;
  }
  .sparkle-companion-bubble::after {
    content: ""; position: absolute; left: 50%; top: 100%; transform: translateX(-50%);
    border: 7px solid transparent; border-top-color: #fff;
  }
  .sparkle-companion-bubble.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  .sparkle-companion-face.tapped { animation: sparkleCompanionTapped .5s ease; }
  .sparkle-companion-face.sparkle-glow-close { animation: sparkleCompanionBob 2.6s ease-in-out infinite, sparkleGlowClose 1.6s ease-in-out infinite; }
  .sparkle-companion-face.sparkle-glow-ready { animation: sparkleCompanionBob 2.6s ease-in-out infinite, sparkleGlowReady 1s ease-in-out infinite; }
  @keyframes sparkleGlowClose {
    0%, 100% { filter: drop-shadow(0 0 0 rgba(255,215,0,0)); }
    50% { filter: drop-shadow(0 0 8px rgba(255,215,0,.85)); }
  }
  @keyframes sparkleGlowReady {
    0%, 100% { filter: drop-shadow(0 0 3px rgba(255,105,220,.6)) drop-shadow(0 0 0 rgba(255,215,0,0)); }
    50% { filter: drop-shadow(0 0 3px rgba(255,105,220,.6)) drop-shadow(0 0 14px rgba(255,215,0,1)); }
  }
  @keyframes sparkleCompanionTapped {
    0% { transform: scale(1); } 30% { transform: scale(1.35); } 60% { transform: scale(.92); } 100% { transform: scale(1); }
  }
  .love-glitter-particle {
    position: fixed; pointer-events: none; z-index: 5001; font-size: 20px;
    animation: loveGlitterFly 1.1s ease-out forwards;
  }
  @keyframes loveGlitterFly {
    0%   { transform: translate(0,0) scale(.6) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--lgx), var(--lgy)) scale(1.15) rotate(var(--lgr)); opacity: 0; }
  }

  /* Feed animation overlay */
  .sparkle-gain-anim {
    position: fixed; left: 50%; top: 40%; transform: translateX(-50%);
    font-family: var(--font-display); font-weight: 900; font-size: 26px;
    color: #C9A8F5; text-shadow: 0 2px 8px rgba(0,0,0,.2);
    pointer-events: none; z-index: 9998;
    animation: sparkleFloat 1.4s ease-out forwards;
  }
  @keyframes sparkleFloat {
    0%   { transform: translateX(-50%) translateY(0) scale(.8); opacity: 0; }
    20%  { transform: translateX(-50%) translateY(-14px) scale(1.2); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-70px) scale(1); opacity: 0; }
  }

  /* PATCH GROUP P/Q — TROPHY CASE & PROGRESS REPORT */
  .trophy-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .trophy-title { font-size: 22px; color: var(--ink); margin: 0; }
  .trophy-coins-summary { text-align: center; font-size: 16px; font-weight: bold; color: #8A5A00; background: #FFF7DD; border-radius: var(--radius-md); padding: 12px; margin-bottom: 18px; }
  .trophy-coins-summary span { font-size: 20px; }
  .trophy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .trophy-card { background: var(--card); border-radius: var(--radius-md); padding: 14px 10px; text-align: center; box-shadow: var(--shadow-soft); }
  .trophy-card.locked { opacity: 0.55; }
  .trophy-icon { font-size: 32px; margin-bottom: 6px; }
  .trophy-name { font-weight: bold; font-size: 13px; color: var(--ink); margin-bottom: 4px; }
  .trophy-desc { font-size: 11px; color: var(--ink-soft); }

  .report-sub { font-size: 13px; color: var(--ink-soft); font-weight: bold; margin: 16px 0 10px; }
  .report-mode-list { display: flex; flex-direction: column; gap: 10px; }
  .report-mode-row { background: var(--card); border-radius: var(--radius-md); padding: 12px 14px; box-shadow: var(--shadow-soft); }
  .report-mode-label { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 14px; color: var(--ink); margin-bottom: 8px; }
  .report-mode-icon { width: 26px; height: 26px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
  .report-mode-complete-badge {
    font-size: 11px; font-weight: 800; color: var(--success);
    background: var(--success-bg); padding: 3px 8px; border-radius: 999px;
    margin-left: auto;
  }
  .report-mode-reset-btn {
    margin-top: 10px; width: 100%; min-height: 36px;
    background: var(--success-bg); color: var(--success);
    border: none; border-radius: 10px; font-size: 12px; font-weight: 800;
    cursor: pointer;
  }
  .report-mode-reset-btn:active { transform: scale(.98); }
  .report-tier-bars { display: flex; flex-direction: column; gap: 6px; }
  .report-tier-bar { display: flex; align-items: center; gap: 8px; }
  .report-tier-track { flex: 1; height: 8px; border-radius: 4px; background: var(--line); overflow: hidden; }
  .report-tier-fill { height: 100%; border-radius: 4px; }
  .report-tier-label { font-size: 11px; color: var(--ink-soft); width: 52px; text-align: right; font-variant-numeric: tabular-nums; }
  .report-history-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .report-history-row { display: flex; justify-content: space-between; gap: 8px; background: var(--card); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 12px; box-shadow: var(--shadow-soft); }
  .report-history-game { color: var(--ink); font-weight: 600; flex: 1; }
  .report-history-score { color: var(--ink-soft); }
  .report-history-date { color: var(--ink-soft); opacity: 0.7; }
  .report-empty { text-align: center; color: var(--ink-soft); font-size: 13px; padding: 20px; }

  /* Telling Time clock: scales fluidly so it never crowds out the
     options/controls below it on short viewports. */
  .clock-svg-wrap{ width:100%; display:flex; justify-content:center; }
  .clock-svg-wrap svg{ width:clamp(120px,38vh,180px); height:clamp(120px,38vh,180px); }

  /* Fraction shapes (pie / bar): sized the same way as the clock so they
     scale fluidly and never crowd out the options/Check button below. */
  .frac-shape-wrap{ width:100%; display:flex; justify-content:center; }
  .frac-shape-wrap svg{ width:clamp(140px,40vh,220px); }
  .frac-progress{ margin-top:8px; font-family:var(--font-display); font-weight:800; font-size:14px; color:var(--ink-soft); }

  /* CODE THE ROBOT */
  .robot-grid-wrap{ width:100%; display:flex; justify-content:center; overflow-x:auto; }
  .robot-grid{ display:grid; gap:3px; background:var(--line); padding:3px; border-radius:10px; }
  .robot-cell{
    background:#fff; border-radius:6px; display:flex; align-items:center; justify-content:center;
    font-size:clamp(16px,5vw,22px); transition:background-color .15s ease;
  }
  .robot-cell.robot-wall{ background:var(--ink-soft); opacity:.45; }
  .robot-emoji{ display:inline-block; transition:transform .25s ease; font-size:clamp(18px,5.5vw,24px); }
  .goal-emoji{ font-size:clamp(16px,5vw,20px); opacity:.85; }

  .seq-row{
    margin-top:10px; min-height:34px; display:flex; flex-wrap:wrap; gap:4px; justify-content:center;
    align-items:center; padding:4px 6px;
  }
  .seq-empty{ color:var(--ink-soft); font-size:12px; font-style:italic; }
  .seq-chip{
    display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px;
    background:#fff; border:2px solid var(--line); border-radius:8px; font-size:14px; flex-shrink:0;
  }

  .robot-controls{ margin-top:10px; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .dpad{
    display:grid; grid-template-columns:44px 44px 44px; grid-template-rows:40px 40px;
    gap:4px; justify-content:center;
  }
  .dpad-btn{
    border-radius:10px; border:2px solid var(--line); background:#fff; font-size:18px;
    display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-soft);
  }
  .dpad-btn:active{ transform:scale(.93); background:var(--paper); }
  .dpad-btn:disabled{ opacity:.45; }
  .dpad-up{ grid-column:2; grid-row:1; }
  .dpad-left{ grid-column:1; grid-row:2; }
  .dpad-right{ grid-column:3; grid-row:2; }
  .dpad-down{ grid-column:2; grid-row:2; }
  .robot-action-row{ display:flex; gap:8px; width:100%; max-width:220px; }
  .robot-action-row .btn{ font-size:12px; padding:8px 10px; }

  /* LOOP LAND — repeat-block chips and the direction+count picker */
  .loop-block-chip{
    display:inline-flex; align-items:center; justify-content:center; min-width:44px; height:28px;
    padding:0 8px; background:#fff; border:2px solid var(--line); border-radius:8px; font-size:13px;
    font-weight:bold; flex-shrink:0; color:var(--ink);
  }
  .loop-picker{ margin-top:10px; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .loop-dir-row{
    display:grid; grid-template-columns:44px 44px 44px; grid-template-rows:40px 40px;
    gap:4px; justify-content:center;
  }
  .loop-dir-btn{
    border-radius:10px; border:2px solid var(--line); background:#fff; font-size:18px;
    display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-soft);
  }
  .loop-dir-btn:nth-child(1){ grid-column:2; grid-row:1; } /* up */
  .loop-dir-btn:nth-child(2){ grid-column:1; grid-row:2; } /* left */
  .loop-dir-btn:nth-child(3){ grid-column:3; grid-row:2; } /* right */
  .loop-dir-btn:nth-child(4){ grid-column:2; grid-row:2; } /* down */
  .loop-dir-btn:active{ transform:scale(.93); background:var(--paper); }
  .loop-dir-btn:disabled{ opacity:.45; }
  .loop-dir-selected{ background:var(--accent); border-color:var(--accent-dark); color:#fff; }
  .loop-count-row{ display:flex; align-items:center; gap:8px; }
  .loop-count-btn{
    width:32px; height:32px; border-radius:8px; border:2px solid var(--line); background:#fff;
    font-size:18px; font-weight:bold; display:flex; align-items:center; justify-content:center;
  }
  .loop-count-btn:active{ transform:scale(.9); background:var(--paper); }
  .loop-count-btn:disabled{ opacity:.45; }
  .loop-count-display{
    min-width:36px; text-align:center; font-family:var(--font-display); font-weight:800; font-size:16px;
    color:var(--ink);
  }
  .loop-add-btn{ font-size:13px; padding:8px 14px; }
  .loop-add-btn:disabled{ opacity:.45; }

  /* PATTERN DETECTIVE */
  .pd-tiles-row {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    margin: 10px 0 4px;
  }
  .pd-tile {
    width: clamp(42px,12vw,56px); height: clamp(42px,12vw,56px);
    border-radius: 14px; background: #fff; border: 3px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(20px,6vw,28px); box-shadow: var(--shadow-soft);
    flex-shrink: 0; font-family: var(--font-display); font-weight: 800; color: var(--ink);
    transition: border-color .15s ease, background .15s ease;
  }
  .pd-tile.pd-blank {
    border-style: dashed; border-color: var(--accent); background: var(--paper);
    animation: caretBlink 1.4s step-end infinite;
  }
  .pd-tile.pd-blank-filled {
    border-style: solid; border-color: var(--accent); background: var(--success-bg);
  }
  .pd-options {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px;
  }
  .pd-option-btn {
    width: clamp(52px,15vw,68px); height: clamp(52px,15vw,68px);
    border-radius: 16px; border: 3px solid var(--line); background: #fff;
    font-size: clamp(22px,7vw,30px); display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-soft); transition: all .15s ease; flex-shrink: 0;
    font-family: var(--font-display); font-weight: 800; color: var(--ink);
  }
  .pd-option-btn.selected {
    border-color: var(--accent); background: var(--accent); color: #fff; transform: scale(1.08);
  }
  .pd-option-btn:active { transform: scale(0.93); }
  .pd-rule-label {
    font-size: 13px; color: var(--ink-soft); font-weight: 700; margin-top: 6px;
    font-family: var(--font-display); text-align: center;
  }

  /* BUG HUNTER */
  .bh-seq-row {
    display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;
    margin: 10px 0 4px; padding: 4px 6px;
  }
  .bh-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 10px; font-size: 16px;
    background: #fff; border: 2.5px solid var(--line);
    box-shadow: var(--shadow-soft); flex-shrink: 0; position: relative;
    transition: border-color .15s, background .15s, transform .15s;
    cursor: pointer;
  }
  .bh-chip.bh-bug {
    border-color: var(--coral); background: var(--danger-bg);
    animation: bh-wiggle .5s ease both;
  }
  .bh-chip.bh-selected {
    border-color: var(--accent); background: var(--accent); color: #fff;
    transform: scale(1.12);
  }
  .bh-chip.bh-fixed {
    border-color: var(--success); background: var(--success-bg);
  }
  .bh-chip.bh-wrong {
    border-color: var(--amber-dark); background: var(--retry-bg);
  }
  .bh-chip .bh-bug-badge {
    position: absolute; top: -6px; right: -6px; width: 14px; height: 14px;
    background: var(--coral); border-radius: 50%; border: 2px solid #fff;
    font-size: 8px; display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; line-height: 1;
  }
  .bh-dir-options {
    display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap;
  }
  .bh-dir-btn {
    width: 52px; height: 52px; border-radius: 14px; border: 2.5px solid var(--line);
    background: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-soft); transition: all .15s; flex-shrink: 0;
  }
  .bh-dir-btn:active { transform: scale(.92); }
  .bh-dir-btn.bh-dir-selected { border-color: var(--accent); background: var(--accent); color: #fff; transform: scale(1.08); }
  .bh-hint-label {
    font-size: 13px; color: var(--ink-soft); font-weight: 700; text-align: center;
    margin: 6px 0 0; font-family: var(--font-display);
  }
  @keyframes bh-wiggle {
    0%,100% { transform: rotate(0deg); }
    20% { transform: rotate(-8deg); }
    40% { transform: rotate(8deg); }
    60% { transform: rotate(-5deg); }
    80% { transform: rotate(5deg); }
  }
  @media (max-height:700px) {
    .bh-chip { width: 28px; height: 28px; font-size: 13px; border-radius: 8px; }
