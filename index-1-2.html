    html += '<p class="report-empty">No sessions played yet — finish a round to see it here!</p>';
  }

  html += '<div class="report-danger-zone">' +
    '<button class="btn btn-ghost report-reset-btn" onclick="openResetConfirm()">🗑️ Reset All Progress</button>' +
    '<p class="report-danger-hint">For parents/teachers — this clears all scores, coins, and achievements. It can\'t be undone.</p>' +
  '</div>';

  html += '</div>';
  app.innerHTML = html;
}

// ====================================================================
// PATCH GROUP V — RESET ALL PROGRESS (with a kid-proof confirmation)
// A flat Yes/No confirm is too easy for a curious kid to tap through by
// accident. Instead this requires typing the exact word RESET before the
// button does anything — quick for a parent who means it, but not
// something a child mashing buttons is likely to stumble into.
// ====================================================================
function openResetConfirm() {
  var overlay = document.createElement("div");
  overlay.className = "reset-modal-overlay";
  overlay.id = "resetModalOverlay";
  overlay.innerHTML =
    '<div class="reset-modal">' +
      '<div class="reset-modal-icon">⚠️</div>' +
      '<h3 class="reset-modal-title">Reset all progress?</h3>' +
      '<p class="reset-modal-body">This will permanently erase every score, coin, streak, and achievement for every game. This can\'t be undone.</p>' +
      '<p class="reset-modal-instruction">Type <strong>RESET</strong> below to confirm:</p>' +
      '<input type="text" class="reset-modal-input" id="resetConfirmInput" autocomplete="off" autocapitalize="characters" placeholder="Type RESET">' +
      '<div class="reset-modal-actions">' +
        '<button class="btn btn-ghost" onclick="closeResetConfirm()">Cancel</button>' +
        '<button class="btn btn-danger" id="resetConfirmBtn" onclick="performReset()" disabled>Reset Everything</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);

  var input = document.getElementById("resetConfirmInput");
  var btn = document.getElementById("resetConfirmBtn");
  input.oninput = function() {
    btn.disabled = (input.value.trim().toUpperCase() !== "RESET");
  };
  input.focus();
}

function closeResetConfirm() {
  var overlay = document.getElementById("resetModalOverlay");
  if (overlay) overlay.remove();
}

function performReset() {
  // Clear every mathQuest_* key in localStorage, including the dynamic
  // per-game-per-difficulty "lastPlayed_*" keys, rather than an explicit
  // list — new games/keys added later are covered automatically.
  try {
    var keysToRemove = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf("mathQuest_") === 0) keysToRemove.push(k);
    }
    keysToRemove.forEach(function(k) { localStorage.removeItem(k); });
  } catch (e) {}

  // Reset in-memory state to match a fresh install, without a full page reload.
  gm.coins = 0;
  gm.totalCoinsEarned = 0;
  gm.achievements = [];
  gm.streak = 0;
  state.progress = {};
  state.score = 0;
  state.streak = 0;
  state.bestStreak = 0;
  // Also wipe Sparkle Pet v2 data
  try { localStorage.removeItem("mathQuest_pet2"); } catch(e) {}

  closeResetConfirm();
  state.screen = "home";
  render();
}

function startGame(key) {
  state.gameKey = key;
  var game = DATA.games.filter(function(g){ return g.key === key; })[0];
  state.index = 0;
  state.score = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.coinsEarned = 0;
  state.newAchievements = [];
  state.attemptUsed = false;
  state.missedQuestions = [];
  // Per-question attempt counter (resets each question in renderPlay)
  state.questionAttempts = 0;

  // REPLAY CAP — track how many times this game+difficulty has been played.
  // Coins are awarded on play 1 and 2 only. Play 3+ earns 0 coins.
  var difficulty = state.difficulty || "easy";
  var replayKey = "replayCount_" + key + "_" + difficulty;
  var replayCount = storageGet(replayKey, 0);
  replayCount += 1;
  storageSet(replayKey, replayCount);
  state.replayCount = replayCount; // 1 = first play, 2 = second, 3+ = no coins

  var pool = questionsForDifficulty(game, difficulty);

  // PATCH GROUP M — AVOID IMMEDIATE QUESTION REPEATS
  // If the tier has enough variety, steer away from whichever questions were
  // shown last time at this same game+difficulty, so back-to-back replays
  // (common for kids practicing the same tier) don't feel like the exact
  // same round on repeat.
  var lastPlayedKey = "lastPlayed_" + key + "_" + difficulty;
  var lastPlayedIds = storageGet(lastPlayedKey, []);
  var freshPool = pool.filter(function(q) { return lastPlayedIds.indexOf(q.id) === -1; });
  // Only use the "fresh" subset if it still leaves a reasonable round size;
  // otherwise fall back to the full pool (small tiers can't avoid repeats forever).
  var usablePool = (freshPool.length >= Math.min(4, pool.length)) ? freshPool : pool;

  state.activeQuestions = shuffleArray(usablePool.slice());
  storageSet(lastPlayedKey, state.activeQuestions.map(function(q) { return q.id; }));

  state.dotsStatus = state.activeQuestions.map(function(){ return "pending"; });
  state.screen = "play";
  render();
}

// Called from the home grid — opens the difficulty picker instead of jumping straight in.
function chooseGame(key) {
  state.gameKey = key;
  state.difficulty = null;
  state.screen = "difficulty";
  // Make sure state.subject is set so back buttons return to the right folder
  if (!state.subject) {
    SUBJECTS.forEach(function(subj) {
      subj.sections && subj.sections.forEach(function(sec) {
        if (sec.keys.indexOf(key) !== -1) state.subject = subj.key;
      });
    });
  }
  render();
}

// PATCH GROUP H — SCORE CHIP
function updateScoreChip() {
  var chip = document.getElementById("scoreChip");
  if (chip) {
    chip.innerHTML = '<span id="streakVal" title="Streak">🔥 ' + state.streak + '</span> ' +
                     '<span id="coinsVal" title="Coins">🪙 ' + gm.coins + '</span> ' +
                     '<span id="scoreVal" title="Score">⭐ ' + state.score + '</span>';
  }

  var banner = document.getElementById("coinRemainingBanner");
  if (!banner) return;

  var qs    = state.activeQuestions || [];
  var total = qs.length;
  var done  = state.index || 0;            // questions fully answered (index = next question)
  var replayOk = !state.replayCount || state.replayCount <= 2;

  // Questions still to come (not including current one being answered)
  var upcoming = Math.max(0, total - done - 1);
  var earned   = state.coinsEarned || 0;

  // How much was missed on already-answered questions
  var maxSoFar = done * 10;
  var missed   = Math.max(0, maxSoFar - earned);

  // Max still earnable = current question (10) + upcoming questions (10 each)
  var maxLeft  = (total - done) * 10;

  if (!replayOk) {
    banner.innerHTML = '⚠️ No coins this play (replay 3+) — practice makes perfect!';
    banner.style.background = 'rgba(255,107,91,.08)';
    return;
  }

  var replayWarn = state.replayCount === 2
    ? ' <span style="color:var(--coral);">· last paid play!</span>' : '';

  if (done === 0 && earned === 0) {
    // Before first answer — show max possible
    banner.innerHTML = '🪙 Up to <strong>' + (total * 10) + ' coins</strong> to earn — answer first try for full coins!' + replayWarn;
  } else if (total - done > 0) {
    // Mid-game
    banner.innerHTML =
      '🪙 <strong>' + earned + '</strong> earned' +
      (missed > 0 ? ' · <span style="color:var(--coral);">-' + missed + ' missed</span>' : '') +
      ' · <span style="color:var(--teal-dark);font-weight:800;">up to ' + maxLeft + ' still to go</span>' +
      replayWarn;
  } else {
    // Last question answered
    banner.innerHTML = '🪙 <strong>' + earned + '</strong> coins earned this round!';
  }
}

function renderPlay() {
  var game = DATA.games.filter(function(g){ return g.key === state.gameKey; })[0];
  var qs = state.activeQuestions;
  var q = qs[state.index];

  var pct = Math.round((state.index / qs.length) * 100);

  // PATCH GROUP U — PET COMPANION DURING PLAY
  // The pet now rides along on the quiz screen and reacts to answers
  // (instead of only existing on its own separate screen), so it feels
  // like a buddy doing the quiz with the kid.
  var petData3 = getPetData();
  var petStage3 = getPetStageData(petData3);

  var html = '<div class="screen play-screen" data-accent="' + game.accent + '" style="' + buildPlayBackgroundStyle(game.key, state.difficulty) + '">' +
    buildPlaySceneryWatermarkHTML(game.key) +
    '<div class="play-header">' +
      '<div class="top-bar">' +
        '<button class="icon-btn" onclick="goToSubject()">⬅</button>' +
        '<button class="icon-btn" id="voiceToggleBtn" onclick="toggleVoiceUI()" aria-label="Toggle voice narration"></button>' +
        '<button class="icon-btn" id="sfxToggleBtn" onclick="toggleSfxUI()" aria-label="Toggle sound effects"></button>' +
        '<span class="play-pet-companion" id="playPetCompanion">' + petStage3.emoji + '</span>' +
        '<div class="score-chip" id="scoreChip"></div>' +
      '</div>' +
      '<div class="progress-label"><span>' + escapeHTML(game.label) + '</span><span class="q-count">Question ' + (state.index + 1) + ' of ' + qs.length + '</span></div>' +
      '<div class="progress-track"><div class="progress-fill" id="progressFill" style="width:' + pct + '%;"></div></div>' +
      '<div id="coinRemainingBanner" class="coin-remaining-banner"></div>' +
      '<div class="feedback" id="feedback"></div>' +
    '</div>' +
    '<div class="play-area" id="playArea"></div>' +
    '<div class="play-footer" id="playFooter"></div>' +
  '</div>';

  app.innerHTML = html;
  updateScoreChip();
  updateVoiceToggleUI();
  updateSfxToggleUI();

  state.attemptUsed = false;

  var playArea = document.getElementById("playArea");
  var ctx = {
    correctAnswer: null, // renderers may set this (string/number) so we can show it on a miss
    onCheck: function(isCorrect) {
      handleAnswer(isCorrect, ctx);
    }
  };

  RENDERERS[game.type].mount(playArea, q, ctx);
  dockFooterControls();

  Voice.say(buildVoiceInstruction(game.type, q));
}

function updateVoiceToggleUI() {
  var btn = document.getElementById("voiceToggleBtn");
  if (!btn) return;
  if (!Voice.isSupported()) { btn.style.display = "none"; return; }
  btn.textContent = gm.voiceEnabled ? "🔊" : "🔇";
  btn.title = gm.voiceEnabled ? "Voice on — tap to mute" : "Voice off — tap to unmute";
}

function toggleVoiceUI() {
  Voice.toggle();
  updateVoiceToggleUI();
}

// PATCH GROUP S — SFX TOGGLE BUTTON
function updateSfxToggleUI() {
  var btn = document.getElementById("sfxToggleBtn");
  if (!btn) return;
  if (!SFX.isSupported()) { btn.style.display = "none"; return; }
  btn.textContent = gm.sfxEnabled ? "🔔" : "🔕";
  btn.title = gm.sfxEnabled ? "Sound effects on — tap to mute" : "Sound effects off — tap to unmute";
}

function toggleSfxUI() {
  SFX.toggle();
  updateSfxToggleUI();
}

// ====================================================================
// STICKY FOOTER DOCKING
// Renderers build their numpad (".numpad-wrap") and "Check Answer" button
// (#checkBtn) inline as part of their own markup, since they were written
// before the sticky-footer layout existed. Rather than rewrite every
// renderer's HTML, we relocate those two pieces into the fixed bottom dock
// after mount, so the numpad + Check button are always reachable with a
// thumb and never get pushed off-screen by question content above them.
//
// Some renderers (buildNumbers, moneyMath, comparingNumbers, tellingTime)
// fully rebuild #playArea's innerHTML on every tap (their own +/- buttons,
// option taps, etc.), which would otherwise recreate a fresh #checkBtn
// inside #playArea and "undock" it. A MutationObserver re-runs the dock
// step after any such rebuild so the footer never goes empty/duplicated.
// ====================================================================
var footerDockObserver = null;

function dockFooterControls() {
  var footer = document.getElementById("playFooter");
  var playArea = document.getElementById("playArea");
  if (!footer || !playArea) return;

  function redock() {
    var freshNumpad = playArea.querySelector(".numpad-wrap");
    var freshCheckBtn = playArea.querySelector("#checkBtn");
    if (!freshNumpad && !freshCheckBtn) return;
    // Clear out whatever is currently docked (old, now-detached-from-logic
    // nodes left behind by a renderer that just rebuilt #playArea) before
    // moving the fresh elements in, so we never end up with duplicates.
    footer.innerHTML = "";
    if (freshNumpad) footer.appendChild(freshNumpad);
    if (freshCheckBtn) footer.appendChild(freshCheckBtn);
  }

  redock();

  if (footerDockObserver) footerDockObserver.disconnect();
  footerDockObserver = new MutationObserver(redock);
  footerDockObserver.observe(playArea, { childList: true, subtree: true });
}

// Finds the card-like wrapper element to flash green/red. Renderers wrap their main
// interactive block in an element with class "eq-card"; if a renderer hasn't been
// updated yet, we fall back to the whole play area so nothing breaks visually.
function getEqCard() {
  var playArea = document.getElementById("playArea");
  return playArea.querySelector(".eq-card") || playArea;
}

function lockInputs() {
  var inputs = document.querySelectorAll('#playArea input, #playArea button, #playFooter input, #playFooter button, .numpad-key');
  for (var i = 0; i < inputs.length; i++) inputs[i].disabled = true;
}

// PATCH GROUP U — IN-PROGRESS COMPLETION TRACKING
// Saved every time a question is settled (correct, or used up both attempts),
// not just at the very end of a round. This way, if a kid plays a few
// questions and then quits — closes the tab, hits the back arrow, switches
// games — the home screen can still show "3 of 6 questions" instead of
// silently showing "0%" as if nothing happened. Cleared once that tier has
// been fully completed at least once, since "best score" becomes the more
// useful number to show at that point.
function saveInProgress(game, difficulty, questionsCompleted, totalQuestions) {
  var prev = state.progress[game.key] || {};
  // Don't bother recording "in progress" for a tier that's already been
  // fully completed before — the best-score badge takes priority on the home screen.
  var alreadyCompletedThisTier = !!(prev.everCompleted && prev.everCompleted[difficulty]);
  state.progress[game.key] = {
    percent: prev.percent || 0,
    byDifficulty: prev.byDifficulty || {},
    everCompleted: prev.everCompleted || {},
    inProgress: alreadyCompletedThisTier ? (prev.inProgress || null) : {
      difficulty: difficulty,
      questionsCompleted: questionsCompleted,
      totalQuestions: totalQuestions
    }
  };
  storageSet("progress", state.progress);
}

function handleAnswer(isCorrect, ctx) {
  var game = DATA.games.filter(function(g){ return g.key === state.gameKey; })[0];
  var fb = document.getElementById("feedback");
  var card = getEqCard();

  if (isCorrect) {
    state.score++;
    state.streak++;
    gm.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    state.dotsStatus[state.index] = "correct";
    fb.className = "feedback correct";
    card.classList.remove("is-retry", "is-incorrect");
    card.classList.add("is-correct");

    Voice.say(voicePick(VOICE_PRAISE));

    // ATTEMPT-BASED COIN MULTIPLIER
    // attempt 1 (questionAttempts=0 when answered) = 100%
    // attempt 2 = 50%, attempt 3 = 25%, attempt 4+ = 0%
    // Also: replay 3+ earns 0 coins regardless
    var BASE_COINS = 10;
    var attemptNum = (state.questionAttempts || 0) + 1; // 1-indexed at point of correct answer
    var replayOk = !state.replayCount || state.replayCount <= 2;
    var multiplier = 0;
    if (replayOk) {
      if (attemptNum === 1) multiplier = 1.0;
      else if (attemptNum === 2) multiplier = 0.5;
      else if (attemptNum === 3) multiplier = 0.25;
      else multiplier = 0;
    }
    var coinsAwarded = Math.round(BASE_COINS * multiplier);

    // Build feedback text with coin info
    var praiseMsg = PRAISE[Math.floor(Math.random() * PRAISE.length)];
    if (coinsAwarded > 0) {
      fb.textContent = praiseMsg;
    } else if (!replayOk) {
      fb.textContent = praiseMsg + " (No coins — you've played this 3+ times!)";
    } else {
      fb.textContent = praiseMsg + " (No coins this attempt)";
    }

    if (coinsAwarded > 0) {
      addCoins(coinsAwarded);
      state.coinsEarned += coinsAwarded;
      showCoinGain(coinsAwarded);
      // Show reduced coin hint on 2nd/3rd attempts
      if (attemptNum === 2) {
        var halfHint = document.createElement("div");
        halfHint.style.cssText = "text-align:center;font-size:11px;color:var(--amber-dark);font-weight:700;margin-top:2px;";
        halfHint.textContent = "½ coins — answer first try next time for full coins!";
        if (fb.parentNode) fb.parentNode.insertBefore(halfHint, fb.nextSibling);
        setTimeout(function(){ if (halfHint.parentNode) halfHint.remove(); }, 1200);
      } else if (attemptNum === 3) {
        var qtrHint = document.createElement("div");
        qtrHint.style.cssText = "text-align:center;font-size:11px;color:var(--amber-dark);font-weight:700;margin-top:2px;";
        qtrHint.textContent = "¼ coins — try harder next time!";
        if (fb.parentNode) fb.parentNode.insertBefore(qtrHint, fb.nextSibling);
        setTimeout(function(){ if (qtrHint.parentNode) qtrHint.remove(); }, 1200);
      }
    }

    if (earnAchievement("first_correct")) showAchievementToast("first_correct");

    reactPet("happy");
    storageSet("streak", gm.streak);
    updateScoreChip();
    lockInputs();

    saveInProgress(game, state.difficulty || "easy", state.index + 1, state.activeQuestions.length);
    setTimeout(function() { advance(game); }, 1300);
    return;
  }

  // Wrong answer — track attempt number, give retries
  // EXCEPTION: self-managed renderers (e.g. scienceQuiz) handle their own
  // wrong-answer flow internally — skip locking, retries and hints entirely.
  if (ctx && ctx.selfManaged) {
    state.streak = 0;
    gm.streak = 0;
    state.dotsStatus[state.index] = "incorrect";
    reactPet("sad");
    storageSet("streak", gm.streak);
    updateScoreChip();
    var promptElSM = card.querySelector("h2");
    state.missedQuestions.push({
      index: state.index,
      promptSummary: promptElSM ? promptElSM.textContent : (game.label + " — Question " + (state.index + 1)),
      correctAnswer: (ctx && ctx.correctAnswer) ? ctx.correctAnswer : null
    });
    saveInProgress(game, state.difficulty || "easy", state.index + 1, state.activeQuestions.length);
    setTimeout(function() { advance(game); }, 2200);
    return;
  }

  state.questionAttempts = (state.questionAttempts || 0) + 1;

  // Up to 3 attempts before final reveal (attempt 1,2,3 wrong → 4th is forced reveal)
  var maxRetries = 3; // after 3 wrong, show answer
  if (state.questionAttempts < maxRetries) {
    // Still has retries left
    var attemptsLeft = maxRetries - state.questionAttempts;
    var nextCoins = state.replayCount <= 2
      ? (state.questionAttempts === 1 ? "½" : state.questionAttempts === 2 ? "¼" : "0")
      : "0";
    fb.textContent = "Not quite — try again! (" + attemptsLeft + " " + (attemptsLeft === 1 ? "try" : "tries") + " left · next correct = " + nextCoins + " coins)";
    fb.className = "feedback retry";
    card.classList.remove("is-correct", "is-incorrect");
    card.classList.add("is-retry");
    Voice.say(voicePick(VOICE_RETRY));
    SFX.retry();

    // Hint on first miss
    if (state.questionAttempts === 1 && ctx && ctx.hintText) {
      var hintEl = document.createElement("div");
      hintEl.className = "retry-hint";
      hintEl.innerHTML = '<span class="retry-hint-icon">💡</span>' + escapeHTML(ctx.hintText);
      card.appendChild(hintEl);
    }

    // Clear numpad if present
    var npHost = document.querySelector("#playFooter .numpad-wrap") || card.querySelector(".numpad-wrap");
    if (npHost) {
      var clearKey = npHost.querySelector('[data-key="clear"]');
      if (clearKey) clearKey.click();
    }
    // Keep attemptUsed flag in sync for renderers that check it (e.g. ifThenRobot)
    state.attemptUsed = true;
    return;
  }

  // Used all retries — reveal answer and move on
  state.streak = 0;
  gm.streak = 0;
  state.dotsStatus[state.index] = "incorrect";
  fb.textContent = "Not quite! Here's the answer:";
  fb.className = "feedback incorrect";
  card.classList.remove("is-correct", "is-retry");
  card.classList.add("is-incorrect");
  reactPet("sad");
  storageSet("streak", gm.streak);
  updateScoreChip();

  // Missed question recap
  var promptEl = card.querySelector("h2");
  state.missedQuestions.push({
    index: state.index,
    promptSummary: promptEl ? promptEl.textContent : (game.label + " — Question " + (state.index + 1)),
    correctAnswer: (ctx && ctx.correctAnswer !== null && ctx.correctAnswer !== undefined) ? ctx.correctAnswer : null
  });

  if (ctx && ctx.correctAnswer !== null && ctx.correctAnswer !== undefined) {
    Voice.say(voicePick(VOICE_REVEAL_PREFIX) + " " + ctx.correctAnswer + ".");
    var reveal = document.createElement("div");
    reveal.className = "reveal-answer";
    reveal.innerHTML = '<span class="reveal-label">Correct answer</span>' + escapeHTML(ctx.correctAnswer);
    card.appendChild(reveal);
    var playAreaEl = document.getElementById("playArea");
    function ensureRevealVisible() {
      if (!playAreaEl || !reveal.isConnected) return;
      var areaRect = playAreaEl.getBoundingClientRect();
      var revealRect = reveal.getBoundingClientRect();
      var overflowPx = revealRect.bottom - areaRect.bottom;
      if (overflowPx > 0) playAreaEl.scrollTop += overflowPx + 8;
    }
    ensureRevealVisible();
    requestAnimationFrame(ensureRevealVisible);
  }

  lockInputs();
  saveInProgress(game, state.difficulty || "easy", state.index + 1, state.activeQuestions.length);
  setTimeout(function() { advance(game); }, 2200);
}

function advance(game) {
  state.index++;
  if (state.index >= state.activeQuestions.length) finishGame();
  else {
    render();
    // Banner update fires inside render() → renderPlay() → updateScoreChip()
  }
}

function finishGame() {
  var game = DATA.games.filter(function(g){ return g.key === state.gameKey; })[0];
  var total = state.activeQuestions.length;
  var percent = Math.round((state.score / total) * 100);
  var difficulty = state.difficulty || "easy";

  // PATCH GROUP N — PER-DIFFICULTY PROGRESS TRACKING
  var prev = state.progress[game.key];
  var prevByDifficulty = (prev && prev.byDifficulty) ? prev.byDifficulty : {};
  var prevTierBest = prevByDifficulty[difficulty] || 0;
  var newByDifficulty = {
    easy: prevByDifficulty.easy || 0,
    medium: prevByDifficulty.medium || 0,
    hard: prevByDifficulty.hard || 0
  };
  newByDifficulty[difficulty] = Math.max(percent, prevTierBest);
  var prevEverCompleted = (prev && prev.everCompleted) ? prev.everCompleted : {};
  var newEverCompleted = {
    easy: !!prevEverCompleted.easy,
    medium: !!prevEverCompleted.medium,
    hard: !!prevEverCompleted.hard
  };
  newEverCompleted[difficulty] = true;
  state.progress[game.key] = {
    percent: Math.max(percent, prev ? prev.percent : 0), // overall best, kept for the home screen badge
    byDifficulty: newByDifficulty,
    everCompleted: newEverCompleted,
    inProgress: null // this round actually finished, so there's nothing partial left to show
  };
  storageSet("progress", state.progress);

  // PATCH GROUP O — SESSION HISTORY (for the parent/teacher Progress Report)
  var history = storageGet("sessionHistory", []);
  history.push({
    gameKey: game.key,
    gameLabel: game.label,
    difficulty: difficulty,
    percent: percent,
    score: state.score,
    total: total,
    timestamp: Date.now()
  });
  // Cap history length so storage doesn't grow unbounded over months of play.
  if (history.length > 200) history = history.slice(history.length - 200);
  storageSet("sessionHistory", history);

  // PATCH GROUP S — SPACED REVIEW QUEUE
  // Tracks which games/difficulties a child recently struggled with so we
  // can nudge them back to those topics on a later visit (not the same
  // session) rather than only showing a one-off recap that disappears.
  var reviewQueue = storageGet("reviewQueue", {});
  if (state.missedQuestions.length > 0) {
    reviewQueue[game.key] = {
      gameLabel: game.label,
      difficulty: difficulty,
      missedCount: state.missedQuestions.length,
      lastMissedAt: Date.now()
    };
  } else if (percent >= 80 && reviewQueue[game.key] && reviewQueue[game.key].difficulty === difficulty) {
    // Came back and did well on the tier that was flagged — clear it.
    delete reviewQueue[game.key];
  }
  storageSet("reviewQueue", reviewQueue);

  state.lastResult = { percent: percent, score: state.score, total: total, bestStreak: state.bestStreak };
  state.screen = "complete";

  // PATCH GROUP J — PERFECT SCORE ACHIEVEMENT
  if (state.score === total && total > 0) {
    if (earnAchievement("perfect_score")) {
      showAchievementToast("perfect_score");
    }
    spawnConfetti(65);
  } else if (percent >= 50) {
    spawnConfetti(30); // small celebration
  }

  // Per-game completion achievements
  if (game.key === "patternDetective" && percent >= 50) {
    if (earnAchievement("pattern_detective")) showAchievementToast("pattern_detective");
  }
  if (game.key === "bugHunter" && percent >= 50) {
    if (earnAchievement("bug_hunter")) showAchievementToast("bug_hunter");
  }
  if (game.key === "loopLand"          && percent >= 50) { if (earnAchievement("loop_master"))    showAchievementToast("loop_master"); }
  if (game.key === "functionFactory"   && percent >= 50) { if (earnAchievement("fn_factory"))     showAchievementToast("fn_factory"); }
  if (game.key === "sortItOut"         && percent >= 50) { if (earnAchievement("sort_master"))    showAchievementToast("sort_master"); }
  if (game.key === "trueOrFalse"       && percent >= 50) { if (earnAchievement("logic_pro"))      showAchievementToast("logic_pro"); }
  if (game.key === "wordProblems"      && percent >= 50) { if (earnAchievement("word_wizard"))    showAchievementToast("word_wizard"); }
  if (game.key === "missingNumber"     && percent >= 50) { if (earnAchievement("number_hunter"))  showAchievementToast("number_hunter"); }
  if (game.key === "placeValueExpanded"&& percent >= 50) { if (earnAchievement("expand_expert"))  showAchievementToast("expand_expert"); }
  if (game.key === "doublesHalves"       && percent >= 50) { if (earnAchievement("double_trouble"))   showAchievementToast("double_trouble"); }
  if (game.key === "animalLifeCycles"    && percent >= 50) { if (earnAchievement("life_cycles"))     showAchievementToast("life_cycles"); }
  if (game.key === "plantParts"          && percent >= 50) { if (earnAchievement("plant_power"))     showAchievementToast("plant_power"); }
  if (game.key === "weatherSeasons"      && percent >= 50) { if (earnAchievement("weather_watcher")) showAchievementToast("weather_watcher"); }
  if (game.key === "statesOfMatter"      && percent >= 50) { if (earnAchievement("matter_master"))   showAchievementToast("matter_master"); }
  if (game.key === "humanBody"           && percent >= 50) { if (earnAchievement("body_expert"))     showAchievementToast("body_expert"); }
  if (game.key === "rocksAndSoil"        && percent >= 50) { if (earnAchievement("rock_star"))       showAchievementToast("rock_star"); }
  if (game.key === "solarSystem"         && percent >= 50) { if (earnAchievement("space_explorer"))  showAchievementToast("space_explorer"); }
  if (game.key === "foodChains"          && percent >= 50) { if (earnAchievement("food_chain_champ"))showAchievementToast("food_chain_champ"); }

  // Daily Quest tracking — normal lessons count toward "finish a lesson";
  // a standalone boss round (outside a gauntlet) counts toward "beat a
  // boss". Gauntlet stages are tracked once as a whole in finishWorldGauntlet().
  if (!state.isBossLevel) trackDailyLessonDone();
  else if (!state.gauntlet) trackDailyBossBeaten();

  render();
}

function getWorldForGameKey(key) {
  var found = ALL_WORLDS.filter(function(w) {
    return (w.finalBossKeys && w.finalBossKeys.indexOf(key) !== -1) ||
      (w.chapters || []).some(function(ch) { return ch.keys.indexOf(key) !== -1; });
  })[0];
  return found || null;
}

// ====================================================================
// GAMEPLAY BACKGROUND THEMING — every lesson used to sit on the exact
// same flat --paper background regardless of world, game, or difficulty.
// These helpers tint the difficulty picker, play, and complete screens
// with that game's own World color (falling back to its accent), with
// intensity that escalates Easy → Medium → Hard → Boss, plus a few faint
// scenery watermarks so the same subject doesn't always look identical.
// ====================================================================
function getWorldThemeForGame(gameKey) {
  var world = getWorldForGameKey(gameKey);
  if (world) return { color: world.color, scenery: TRAIL_SCENERY[world.key] || ["✨"], key: world.key };
  return { color: "#7A6FCB", scenery: ["✨"], key: null };
}

var PLAY_BG_ALPHA = { easy: "40", medium: "55", hard: "70", boss: "8C" };

function buildPlayBackgroundStyle(gameKey, mode) {
  var theme = getWorldThemeForGame(gameKey);
  var alpha = PLAY_BG_ALPHA[mode] || PLAY_BG_ALPHA.easy;
  return "background: linear-gradient(180deg, " + theme.color + alpha + " 0%, " + theme.color + "18 45%, transparent 75%), " +
    "radial-gradient(circle at 100% 100%, " + theme.color + alpha + ", transparent 60%), var(--paper);";
}

// Scenery emoji behind the actual content — decorative only, never
// intercepts taps, but bold enough to actually register on a phone screen.
function buildPlaySceneryWatermarkHTML(gameKey) {
  var theme = getWorldThemeForGame(gameKey);
  var spots = [
    { left: "12%", top: "10%", size: 42 }, { left: "86%", top: "9%", size: 38 },
    { left: "92%", top: "40%", size: 34 }, { left: "6%", top: "42%", size: 34 },
    { left: "90%", top: "80%", size: 44 }, { left: "9%", top: "84%", size: 40 }
  ];
  var html = "";
  spots.forEach(function(pos, i) {
    var emoji = theme.scenery[i % theme.scenery.length];
    html += '<div class="play-bg-scenery" style="left:' + pos.left + ';top:' + pos.top + ';font-size:' + pos.size + 'px;">' + emoji + '</div>';
  });
  return html;
}

// Tints the (already-dramatic) boss-complete cosmic gradient with the
// world's own color, so different worlds' boss victories don't all look
// like the exact same purple screen.
function buildBossCompleteBackgroundStyle(gameKey) {
  var theme = getWorldThemeForGame(gameKey);
  return "background: radial-gradient(circle at 25% 15%, " + theme.color + "70, transparent 60%), " +
    "linear-gradient(160deg,#1a0533 0%,#3a0a6e 60%,#0a1a3e 100%);";
}

function buildStoryBeatHTML(gameKey) {
  var world = getWorldForGameKey(gameKey);
  if (!world) return "";
  var lines = WORLD_STORY_LINES[world.key] || [];
  if (!lines.length) return "";
  var line = lines[Math.floor(Math.random() * lines.length)];
  return '<div class="story-beat-line">' + escapeHTML(line) + '</div>';
}

function renderComplete() {

  var game = DATA.games.filter(function(g){ return g.key === state.gameKey; })[0];
  var r = state.lastResult;
  var difficulty = state.difficulty || "easy";
  var stars = r.percent >= 90 ? 3 : r.percent >= 70 ? 2 : r.percent >= 50 ? 1 : 0;

  var starsHtml = "";
  for (var i = 0; i < 3; i++) {
    starsHtml += i < stars ? "⭐" : "<span style='opacity:0.3;filter:grayscale(1)'>⭐</span>";
  }

  // MISSED QUESTION RECAP
  var recapHtml = "";
  if (state.missedQuestions.length > 0) {
    recapHtml += '<div class="missed-recap"><div class="missed-recap-title">📝 Take another look at:</div><ul class="missed-recap-list">';
    state.missedQuestions.forEach(function(m) {
      recapHtml += '<li><span class="missed-recap-q">' + escapeHTML(m.promptSummary) + '</span>' +
        (m.correctAnswer !== null ? '<span class="missed-recap-a">Answer: ' + escapeHTML(m.correctAnswer) + '</span>' : '') +
        '</li>';
    });
    recapHtml += '</ul></div>';
  }

  // COINS EARNED + REPLAY STATUS
  var replayCount = state.replayCount || 1;
  var coinsEarnedHtml = '<div class="coins-earned">+' + state.coinsEarned + ' 🪙 Earned!</div>';

  // How many coins are still earnable from this game+difficulty in future replays?
  // Max possible per question = 10 coins (first attempt). Total qs in this round = r.total
  var maxPerRound = r.total * 10;
  var replayStatusHtml = '';
  if (replayCount === 1) {
    // Show how many coins they left on the table + what replay 2 can earn
    var missed = maxPerRound - state.coinsEarned;
    var nextMax = Math.round(maxPerRound * 0.5); // 2nd replay max (all 1st attempts = ½ coins each)
    replayStatusHtml =
      '<div class="replay-status-card">' +
        '<div class="replay-status-title">📊 Coin Summary</div>' +
        '<div class="replay-status-row"><span>This round (play 1 of 2):</span><span class="rsc-coins">🪙 ' + state.coinsEarned + ' earned</span></div>' +
        (missed > 0 ? '<div class="replay-status-row"><span>Left on the table:</span><span class="rsc-missed">🪙 ' + missed + ' missed</span></div>' : '') +
        '<div class="replay-status-row"><span>Play again (play 2):</span><span class="rsc-next">up to 🪙 ' + nextMax + ' more</span></div>' +
        '<div class="replay-status-row"><span>Play 3+:</span><span class="rsc-zero">🪙 0 coins</span></div>' +
      '</div>';
  } else if (replayCount === 2) {
    var nextMax2 = 0;
    replayStatusHtml =
      '<div class="replay-status-card">' +
        '<div class="replay-status-title">📊 Coin Summary</div>' +

// PATCH GROUP W — BOSS LEVEL ENGINE
// A rapid-fire 10-question mixed round pulled from all difficulty banks
// of the current game. Uses the same renderer as the parent game so no
// new renderer code is needed. Ends with a confetti celebration screen.

// ====================================================================
// DAILY QUEST BOARD — 3 light goals that reset each day. Never punishes
// missing a day; just quietly resets. Rewards are small flat coin bonuses,
// separate from the normal per-question coin economy.
// ====================================================================
var DAILY_QUEST_DEFS = [
  { id: "lesson", label: "Finish 1 lesson", icon: "📘", reward: 5, target: 1, getProgress: function(d) { return d.lessonsDone || 0; } },
  { id: "boss", label: "Beat a boss round", icon: "👾", reward: 10, target: 1, getProgress: function(d) { return d.bossesBeaten || 0; } },
  { id: "pet", label: "Visit your Sparkle Pet", icon: "✨", reward: 5, target: 1, getProgress: function(d) { return d.petVisited ? 1 : 0; } }
];

function todayKey() {
  var d = new Date();
  return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
}

function getDailyQuestState() {
  var d = storageGet("dailyQuestState", null);
  var today = todayKey();
  if (!d || d.date !== today) {
    d = { date: today, lessonsDone: 0, bossesBeaten: 0, petVisited: false, claimed: [] };
    storageSet("dailyQuestState", d);
  }
  return d;
}

function saveDailyQuestState(d) { storageSet("dailyQuestState", d); }

// Call this after any counter changes to hand out coins for newly-completed
// quests exactly once per day.
function checkDailyQuestRewards() {
  var d = getDailyQuestState();
  DAILY_QUEST_DEFS.forEach(function(q) {
    var done = q.getProgress(d) >= q.target;
    if (done && d.claimed.indexOf(q.id) === -1) {
      d.claimed.push(q.id);
      addCoins(q.reward);
      showSimpleToast(q.icon + " Daily Quest done! +" + q.reward + " coins");
    }
  });
  saveDailyQuestState(d);
}

function trackDailyLessonDone() {
  var d = getDailyQuestState();
  d.lessonsDone = (d.lessonsDone || 0) + 1;
  saveDailyQuestState(d);
  checkDailyQuestRewards();
}

function trackDailyBossBeaten() {
  var d = getDailyQuestState();
  d.bossesBeaten = (d.bossesBeaten || 0) + 1;
  saveDailyQuestState(d);
  checkDailyQuestRewards();
}

function trackDailyPetVisit() {
  var d = getDailyQuestState();
  if (!d.petVisited) {
    d.petVisited = true;
    saveDailyQuestState(d);
    checkDailyQuestRewards();
  }
}

function buildDailyQuestBoardHTML() {
  var d = getDailyQuestState();
  var rows = DAILY_QUEST_DEFS.map(function(q) {
    var done = q.getProgress(d) >= q.target;
    return '<div class="daily-quest-row' + (done ? ' daily-quest-done' : '') + '">' +
      '<span class="daily-quest-icon">' + (done ? '✅' : q.icon) + '</span>' +
      '<span class="daily-quest-label">' + escapeHTML(q.label) + '</span>' +
      '<span class="daily-quest-reward">+' + q.reward + '🪙</span>' +
    '</div>';
  }).join("");
  return '<div class="daily-quest-board">' +
    '<div class="daily-quest-title">📅 Today\'s Quests</div>' + rows +
  '</div>';
}

function collectAllQuestions(game) {
  var qs = game.questions;
  if (Array.isArray(qs)) return qs.slice();
  var out = [];
  ["easy", "medium", "hard"].forEach(function(d) {
    (qs[d] || []).forEach(function(q) { out.push(q); });
  });
  return out;
}

function startBossLevel(gameKey) {
  var game = DATA.games.filter(function(g){ return g.key === gameKey; })[0];
  if (!game) return;

  // Pull questions from all three banks and shuffle them together
  var allQs = collectAllQuestions(game);
  // Shuffle
  for (var i = allQs.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = allQs[i]; allQs[i] = allQs[j]; allQs[j] = tmp;
  }
  // Take up to 10
  var bossQs = allQs.slice(0, 10);

  // REPLAY CAP — boss rounds follow the exact same "2 free plays, then 0
  // coins" rule as normal lessons (tracked under a separate "_boss" key so
  // it never interferes with that game's Easy/Medium/Hard replay counts).
  // Without this, boss rounds were an infinite full-price coin farm.
  var replayKey = "replayCount_" + gameKey + "_boss";
  var replayCount = storageGet(replayKey, 0);
  replayCount += 1;
  storageSet(replayKey, replayCount);

  state.gameKey = gameKey;
  state.activeQuestions = bossQs;
  state.index = 0;
  state.score = 0;
  state.difficulty = "boss";
  state.streak = 0;
  state.bestStreak = 0;
  state.missedQuestions = [];
  state.dotsStatus = bossQs.map(function() { return "unanswered"; });
  state.coinsEarned = 0;
  state.replayCount = replayCount;
  state.questionAttempts = 0;
  state.attemptUsed = false;
  state.isBossLevel = true;
  state.screen = "play";
  render();
}

// ====================================================================
// SHARED NUMPAD HELPER
// On-screen digit pad so kids never trigger the system keyboard on mobile.
// mountNumpad(container, opts) renders a tap-to-build display + 0-9/back/clear
// (and optional +/- toggle) and returns { getValue(), reset(), onEnter(fn) }.
// ====================================================================
function mountNumpad(container, opts) {
  opts = opts || {};
  var allowNegative = !!opts.allowNegative;
  var maxDigits = opts.maxDigits || 5;
  var buf = { text: "", neg: false };

  function html() {
    var displayVal = buf.text.length
      ? (buf.neg ? "−" : "") + buf.text
      : '<span class="placeholder-q">?</span>';
    var caret = buf.text.length ? '<span class="caret"></span>' : '';
    var out = '<div class="numpad-display" id="npDisplay">' + displayVal + caret + '</div>';
    out += '<div class="numpad">';
    var keys = ["1","2","3","4","5","6","7","8","9"];
    keys.forEach(function(k) {
      out += '<button type="button" class="numpad-key" data-key="' + k + '">' + k + '</button>';
    });
    out += '<button type="button" class="numpad-key key-clear" data-key="clear">Clear</button>';
    out += '<button type="button" class="numpad-key" data-key="0">0</button>';
    out += '<button type="button" class="numpad-key key-back" data-key="back">⌫</button>';
    if (allowNegative) {
      out += '<button type="button" class="numpad-key key-neg" data-key="neg" style="grid-column: span 3;">+ / − (tap to flip sign)</button>';
    }
    out += '</div>';
    return out;
  }

  var wrap = document.createElement("div");
  wrap.className = "numpad-wrap";
  wrap.innerHTML = html();
  container.appendChild(wrap);

  var enterCb = null;

  function refreshDisplay() {
    var disp = wrap.querySelector("#npDisplay");
    if (!disp) return;
    var displayVal = buf.text.length
      ? (buf.neg ? "−" : "") + buf.text
      : '<span class="placeholder-q">?</span>';
    var caret = buf.text.length ? '<span class="caret"></span>' : '';
    disp.innerHTML = displayVal + caret;
  }

  wrap.addEventListener("click", function(e) {
    var btn = e.target.closest(".numpad-key");
    if (!btn || btn.disabled) return;
    var key = btn.getAttribute("data-key");
    if (key === "clear") {
      buf.text = ""; buf.neg = false;
    } else if (key === "back") {
      buf.text = buf.text.slice(0, -1);
    } else if (key === "neg") {
      buf.neg = !buf.neg;
    } else {
      if (buf.text.length < maxDigits) buf.text += key;
    }
    refreshDisplay();
    if (opts.onChange) opts.onChange(getValue());
  });

  function getValue() {
    if (!buf.text.length) return null;
    var n = parseInt(buf.text, 10);
    return buf.neg ? -n : n;
  }

  return {
    getValue: getValue,
    reset: function() { buf.text = ""; buf.neg = false; refreshDisplay(); },
    disable: function() {
      var keys = wrap.querySelectorAll(".numpad-key");
      for (var i = 0; i < keys.length; i++) keys[i].disabled = true;
    },
    el: wrap
  };
}

var RENDERERS = {};

RENDERERS.placeValue = {
  mount: function(stage, q, ctx) {
    if (q.mode === "readBlocks") {
      // Read the place-value blocks (concrete -> abstract): the kid sees a
      // fixed count of hundreds/tens/ones blocks and types the number they
      // represent. This is the inverse of the old "build the number" task —
      // reading a representation, rather than constructing one via +/- taps,
      // is the more common Grade 2 place-value assessment direction.
      ctx.correctAnswer = q.number;

      var html = '<div class="eq-card" style="padding:16px 14px;">';
      html += '<h2 style="margin-bottom:4px;">How many in all?</h2>';
      html += '<p style="color:var(--ink-soft);margin-bottom:10px;">Count the blocks, then type the number</p>';
      html += '<div class="pv-blocks-row">';

      html += '<div class="pv-block-group"><div class="pv-block-stack">';
      if (q.hundreds > 0) {
        for (var h = 0; h < q.hundreds; h++) html += '<div class="disc-hundreds">100</div>';
      } else {
        html += '<div class="pv-block-zero">0</div>';
      }
      html += '</div><div class="pv-block-label">hundreds</div></div>';

      html += '<div class="pv-block-group"><div class="pv-block-stack">';
      if (q.tens > 0) {
        for (var t = 0; t < q.tens; t++) html += '<div class="disc-tens">10</div>';
      } else {
        html += '<div class="pv-block-zero">0</div>';
      }
      html += '</div><div class="pv-block-label">tens</div></div>';

      html += '<div class="pv-block-group"><div class="pv-block-stack">';
      if (q.ones > 0) {
        for (var o = 0; o < q.ones; o++) html += '<div class="disc-ones">1</div>';
      } else {
        html += '<div class="pv-block-zero">0</div>';
      }
      html += '</div><div class="pv-block-label">ones</div></div>';

      html += '</div>';
      html += '<div id="numpadHost"></div>';
      html += '<button class="btn btn-primary" id="checkBtn" style="margin-top:14px; width:100%; max-width:240px;" disabled>Check Answer</button>';
      html += '</div>';

      stage.innerHTML = html;

      var checkBtn = document.getElementById("checkBtn");
      var pad = mountNumpad(document.getElementById("numpadHost"), {
        maxDigits: 3,
        onChange: function(val) {
          checkBtn.disabled = (val === null);
        }
      });

      checkBtn.onclick = function() {
        ctx.onCheck(pad.getValue() === q.number);
      };
    } else {
      // digitValue mode (abstract -> abstract): a number is shown with one
      // digit highlighted; the kid picks what that digit is *worth* given
      // its position, e.g. the "4" in 45 is worth 40, not 4. This is the
      // single most common Grade 2 SG Math place-value question type.
      ctx.correctAnswer = q.answer;
      var selected = { value: null };

      function updateDisplay() {
        var numStr = String(q.number);
        var digitsHTML = "";
        for (var i = 0; i < numStr.length; i++) {
          var cls = "pv-digit" + (i === q.highlightIndex ? " pv-digit-highlight" : "");
          digitsHTML += '<span class="' + cls + '">' + numStr[i] + '</span>';
        }

        var html = '<div class="eq-card" style="padding:16px 14px;">';
        html += '<h2 style="margin-bottom:4px;">What is this digit worth?</h2>';
        html += '<p style="color:var(--ink-soft);margin-bottom:10px;">Look at the highlighted digit</p>';
        html += '<div class="pv-number-display">' + digitsHTML + '</div>';
        html += '<div class="time-options" style="margin-top:14px;">';
        q.options.forEach(function(opt, i) {
          var cls = "time-option-btn" + (selected.value === opt ? " selected" : "");
          html += '<button class="' + cls + '" id="optBtn' + i + '">' + opt + '</button>';
        });
        html += '</div>';
        html += '<button class="btn btn-primary" id="checkBtn" style="margin-top:16px; width:100%; max-width:260px;"' + (selected.value === null ? ' disabled' : '') + '>Check Answer</button>';
        html += '</div>';

        stage.innerHTML = html;

        q.options.forEach(function(opt, i) {
          document.getElementById("optBtn" + i).onclick = function() {
            selected.value = opt;
            updateDisplay();
          };
        });

        document.getElementById("checkBtn").onclick = function() {
          if (selected.value === null) return;
          ctx.onCheck(selected.value === q.answer);
        };
      }

      updateDisplay();
    }
  }
};

// PATCH GROUP Q — TELLING TIME RENDERER
function buildClockSVG(hour, minute) {
  var cx = 70, cy = 70, r = 62;
  var hourAngle = ((hour % 12) + minute / 60) * 30;
  var minuteAngle = minute * 6;

  function pt(angleDeg, length) {
    var rad = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + length * Math.cos(rad), y: cy + length * Math.sin(rad) };
  }

  var hp = pt(hourAngle, 34);
  var mp = pt(minuteAngle, 50);

  var ticks = "";
  for (var i = 0; i < 60; i++) {
    var ang = i * 6;
    var isHourTick = i % 5 === 0;
    var outer = pt(ang, r - 4);
    var inner = pt(ang, isHourTick ? r - 14 : r - 9);
    ticks += '<line x1="' + inner.x + '" y1="' + inner.y + '" x2="' + outer.x + '" y2="' + outer.y + '" stroke="var(--ink-soft)" stroke-width="' + (isHourTick ? 2 : 1) + '"/>';
  }

  var numbers = "";
  for (var n = 1; n <= 12; n++) {
    var npos = pt(n * 30, r - 26);
    numbers += '<text x="' + npos.x + '" y="' + (npos.y + 5) + '" text-anchor="middle" font-size="13" font-weight="bold" font-family="var(--font-display)" fill="var(--ink)">' + n + '</text>';
  }

  return '<svg viewBox="0 0 140 140" role="img" aria-label="clock face">' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="#fff" stroke="var(--line)" stroke-width="3"/>' +
    ticks + numbers +
    '<line x1="' + cx + '" y1="' + cy + '" x2="' + hp.x + '" y2="' + hp.y + '" stroke="var(--ink)" stroke-width="6" stroke-linecap="round"/>' +
    '<line x1="' + cx + '" y1="' + cy + '" x2="' + mp.x + '" y2="' + mp.y + '" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>' +
    '<circle cx="' + cx + '" cy="' + cy + '" r="5" fill="var(--ink)"/>' +
  '</svg>';
}

// ====================================================================
// FRACTIONS RENDERER
// Builds a tappable pie (circle) or bar (rectangle) split into equal parts.
// shadedCount of the parts are filled with the accent color; the rest stay
// white with a visible outline so kids can clearly count "shaded vs total".
// ====================================================================
function buildFractionSVG(shape, denominator, shadedCount, opts) {
  opts = opts || {};
  var interactive = !!opts.onSegmentClick; // truthy flag: renderer wires up real click handlers afterward via .frac-segment
  var size = 140;

  if (shape === "circle") {
    var cx = 70, cy = 70, r = 60;
    var segments = "";
    for (var i = 0; i < denominator; i++) {
      var startAngle = (i / denominator) * 360 - 90;
      var endAngle = ((i + 1) / denominator) * 360 - 90;
      var startRad = startAngle * Math.PI / 180;
      var endRad = endAngle * Math.PI / 180;
      var x1 = cx + r * Math.cos(startRad), y1 = cy + r * Math.sin(startRad);
      var x2 = cx + r * Math.cos(endRad), y2 = cy + r * Math.sin(endRad);
      var largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
      var pathD = "M" + cx + "," + cy + " L" + x1 + "," + y1 + " A" + r + "," + r + " 0 " + largeArc + " 1 " + x2 + "," + y2 + " Z";
      var isShaded = i < shadedCount;
      var fill = isShaded ? "var(--accent)" : "#fff";
      var clickable = interactive;
      segments += '<path d="' + pathD + '" fill="' + fill + '" stroke="var(--ink)" stroke-width="2.5"' +
        (clickable ? ' class="frac-segment" data-idx="' + i + '" style="cursor:pointer;"' : '') + '/>';
    }
    return '<svg viewBox="0 0 140 140" role="img" aria-label="fraction circle">' + segments + '</svg>';
  }

  // Rectangle (bar) split into equal vertical strips.
  var w = 240, h = 110;
  var stripW = w / denominator;
  var bars = "";
  for (var j = 0; j < denominator; j++) {
    var bx = j * stripW;
    var bIsShaded = j < shadedCount;
    var bFill = bIsShaded ? "var(--accent)" : "#fff";
    var bClickable = interactive;
    bars += '<rect x="' + bx + '" y="0" width="' + stripW + '" height="' + h + '" fill="' + bFill + '" stroke="var(--ink)" stroke-width="2.5"' +
      (bClickable ? ' class="frac-segment" data-idx="' + j + '" style="cursor:pointer;"' : '') + '/>';
  }
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" role="img" aria-label="fraction bar">' + bars + '</svg>';
}
