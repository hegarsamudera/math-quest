      var box = document.getElementById("mnBox");
      if (box) box.textContent = current === "" ? "?" : current;
      var btn = document.getElementById("mnCheck");
      if (btn) btn.disabled = current === "";
    }
    var pad = mountNumpad(document.getElementById("numpadHost"), {
      maxDigits: 4,
      onChange: function(val) { current = (val === null ? "" : String(val)); updateDisplay(); }
    });
    var ownDisplay = pad.el.querySelector(".numpad-display");
    if (ownDisplay) ownDisplay.style.display = "none";

    ctx._numpadOnChange = function(val) { current = val; updateDisplay(); };
    ctx._numpadOnCheck  = function() { ctx.onCheck(parseInt(current, 10) === answer); };

    document.getElementById("mnCheck").onclick = function() {
      ctx.onCheck(parseInt(current, 10) === answer);
    };
  }
};

// ====================================================================
// RENDERER: placeValueExpanded
// Shows a 3-digit number, kids fill in H / T / O boxes.
// ====================================================================

RENDERERS.placeValueExpanded = {
  mount: function(stage, q, ctx) {
    var isThreeDigit = q.number >= 100;
    ctx.correctAnswer = (isThreeDigit ? q.hundreds + "00 + " : "") + q.tens + "0 + " + q.ones;
    ctx.hintText = "How many hundreds? How many tens? How many ones?";

    var COLORS = { H: { bg:"#FFE49C", border:"#F4A828", label:"Hundreds", val: q.hundreds },
                   T: { bg:"#C9A8F5", border:"#7A6FCB", label:"Tens",     val: q.tens },
                   O: { bg:"#A8EBD0", border:"#1FA391", label:"Ones",     val: q.ones } };

    var html = '<div class="eq-card" style="padding:16px 14px;text-align:center;">';
    html += '<h2 style="margin-bottom:4px;">Expanded Numbers 🔢</h2>';
    html += '<p style="font-size:12px;color:var(--ink-soft);margin-bottom:14px;">Break this number into parts!</p>';

    // Big number display
    html += '<div style="font-size:52px;font-weight:900;font-family:var(--font-display);' +
      'color:var(--ink);margin-bottom:16px;letter-spacing:.04em;">' + q.number + '</div>';

    // Equation: ___ + ___ + ___ = number
    html += '<div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;">';
    var parts = isThreeDigit ? ["H","T","O"] : ["T","O"];
    parts.forEach(function(k, i) {
      var c = COLORS[k];
      html += '<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">';
      html += '<input type="number" id="pve_' + k + '" min="0" max="9" ' +
        'style="width:56px;height:56px;border-radius:14px;border:3px solid ' + c.border + ';' +
        'background:' + c.bg + ';text-align:center;font-size:24px;font-weight:900;' +
        'font-family:var(--font-display);color:var(--ink);" placeholder="?" inputmode="numeric">';
      html += '<span style="font-size:10px;font-weight:800;color:' + c.border + ';">' + c.label + '</span>';
      html += '</div>';
      if (i < parts.length - 1) {
        html += '<div style="font-size:24px;font-weight:900;color:var(--ink-soft);padding-top:0px;">+</div>';
      }
    });
    html += '<div style="font-size:24px;font-weight:900;color:var(--ink-soft);padding-top:0;">=</div>';
    html += '<div style="font-size:24px;font-weight:900;color:var(--ink);">' + q.number + '</div>';
    html += '</div>';

    html += '<button class="btn btn-primary" id="pveCheck" style="width:100%;max-width:220px;" disabled>✅ Check!</button>';
    html += '</div>';
    stage.innerHTML = html;

    function getVals() {
      var result = {};
      parts.forEach(function(k) {
        var el = document.getElementById("pve_" + k);
        result[k] = el ? el.value.trim() : "";
      });
      return result;
    }
    function allFilled(vals) {
      return parts.every(function(k){ return vals[k] !== ""; });
    }

    parts.forEach(function(k) {
      var el = document.getElementById("pve_" + k);
      if (el) el.oninput = function() {
        var vals = getVals();
        var btn = document.getElementById("pveCheck");
        if (btn) btn.disabled = !allFilled(vals);
      };
    });

    document.getElementById("pveCheck").onclick = function() {
      var vals = getVals();
      var correct =
        (!isThreeDigit || parseInt(vals.H||"0") === q.hundreds) &&
        parseInt(vals.T||"0") === q.tens &&
        parseInt(vals.O||"0") === q.ones;
      ctx.onCheck(correct);
    };
  }
};

// ====================================================================
// RENDERER: doublesHalves
// Visual split screen — double = two equal groups, half = split one group.
// ====================================================================

RENDERERS.doublesHalves = {
  mount: function(stage, q, ctx) {
    var isDouble = q.mode === "double";
    ctx.correctAnswer = String(q.answer);
    ctx.hintText = isDouble
      ? "Double means two groups of the same number! Count both groups."
      : "Half means split into two equal groups! How many in each group?";

    var ICONS = ["🍎","🌟","🎈","🍪","🐸","🦋","🍭","🏀","🐣","🎀"];
    var icon = ICONS[q.number % ICONS.length];

    var html = '<div class="eq-card" style="padding:16px 14px;text-align:center;">';

    if (isDouble) {
      html += '<h2 style="margin-bottom:4px;">Double It! ✌️</h2>';
      html += '<p style="font-size:13px;color:var(--ink-soft);margin-bottom:12px;">Two groups of <strong>' + q.number + '</strong> — how many altogether?</p>';

      // Two equal groups visualised
      html += '<div style="display:flex;gap:16px;justify-content:center;margin-bottom:14px;">';
      [0,1].forEach(function() {
        html += '<div style="background:#FFF0F8;border:2px dashed #FFB3D9;border-radius:16px;padding:10px 12px;min-width:80px;">';
        html += '<div style="font-size:10px;font-weight:800;color:#C970A0;margin-bottom:6px;">Group</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-width:80px;">';
        for (var i = 0; i < Math.min(q.number, 10); i++) {
          html += '<span style="font-size:' + (q.number <= 5 ? 22 : 16) + 'px;">' + icon + '</span>';
        }
        if (q.number > 10) html += '<span style="font-size:11px;color:var(--ink-soft);">×' + q.number + '</span>';
        html += '</div></div>';
      });
      html += '</div>';
      html += '<p style="font-size:14px;font-weight:800;margin-bottom:10px;">Double ' + q.number + ' = ?</p>';

    } else {
      html += '<h2 style="margin-bottom:4px;">Half of It! ✂️</h2>';
      html += '<p style="font-size:13px;color:var(--ink-soft);margin-bottom:12px;">Split <strong>' + q.number + '</strong> into 2 equal groups — how many in each?</p>';

      // One big group being split
      html += '<div style="background:#F0F8FF;border:2px dashed #A8D8F5;border-radius:16px;padding:10px 14px;margin:0 auto 14px;max-width:260px;">';
      html += '<div style="font-size:10px;font-weight:800;color:#4A90C0;margin-bottom:6px;">All ' + q.number + ' together</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center;">';
      for (var i = 0; i < Math.min(q.number, 20); i++) {
        html += '<span style="font-size:' + (q.number <= 10 ? 20 : 14) + 'px;">' + icon + '</span>';
      }
      if (q.number > 20) html += '<span style="font-size:11px;color:var(--ink-soft);">(' + q.number + ' total)</span>';
      html += '</div></div>';
      html += '<p style="font-size:14px;font-weight:800;margin-bottom:10px;">Half of ' + q.number + ' = ?</p>';
    }

    html += '<div class="numpad-answer-row">' +
      '<div class="numpad-display" id="dhDisplay" style="min-width:70px;font-size:28px;">_</div>' +
    '</div>';
    html += '<div id="numpadHost" style="margin-top:14px;"></div>';
    html += '<button class="btn btn-primary" id="dhCheck" style="margin-top:14px;width:100%;max-width:220px;" disabled>✅ Check!</button>';
    html += '</div>';
    stage.innerHTML = html;

    var current = "";
    function updateDisplay() {
      var disp = document.getElementById("dhDisplay");
      if (disp) disp.textContent = current === "" ? "_" : current;
      var btn = document.getElementById("dhCheck");
      if (btn) btn.disabled = current === "";
    }
    var pad = mountNumpad(document.getElementById("numpadHost"), {
      maxDigits: 3,
      onChange: function(val) { current = (val === null ? "" : String(val)); updateDisplay(); }
    });
    var ownDisplay = pad.el.querySelector(".numpad-display");
    if (ownDisplay) ownDisplay.style.display = "none";

    ctx._numpadOnChange = function(val) { current = val; updateDisplay(); };
    ctx._numpadOnCheck  = function() { ctx.onCheck(parseInt(current, 10) === q.answer); };

    document.getElementById("dhCheck").onclick = function() {
      ctx.onCheck(parseInt(current, 10) === q.answer);
    };
  }
};

// ====================================================================
// RENDERER: scienceQuiz
// Self-managed renderer — handles correct AND wrong answers internally.
// The game engine's retry/lockInputs system is bypassed entirely via
// ctx.selfManaged = true, so nothing can interfere with our layout.
//
// Flow:
//   QUESTION screen  →  tap option  →  Check button lights up
//   tap Check        →  RESULT screen (coloured options + fact box)
//   auto-advance after 1.6s (correct) or 2.2s (wrong)
// ====================================================================
RENDERERS.scienceQuiz = {
  mount: function(stage, q, ctx) {
    var selected = null;

    ctx.correctAnswer = q.options[q.answer];
    ctx.hintText = "Read all four options carefully before choosing!";
    ctx.selfManaged = true; // bypass engine retry/lockInputs

    function showQuestion() {
      var html = '<div class="eq-card sci-question-card">';
      html += '<span class="sci-emoji">' + q.emoji + '</span>';
      html += '<div class="sci-question">' + escapeHTML(q.question) + '</div>';
      html += '<div class="sci-options">';
      q.options.forEach(function(opt, i) {
        var cls = 'sci-option' + (i === selected ? ' sci-selected' : '');
        html += '<button class="' + cls + '" data-idx="' + i + '">' +
          escapeHTML(opt) + '</button>';
      });
      html += '</div>';
      html += '<button class="btn btn-primary" id="sciCheck" ' +
        'style="width:100%;max-width:220px;margin-top:10px;"' +
        (selected !== null ? '' : ' disabled') + '>✅ Check!</button>';
      html += '</div>';
      stage.innerHTML = html;

      stage.querySelectorAll('[data-idx]').forEach(function(btn) {
        btn.onclick = function() {
          selected = parseInt(this.getAttribute('data-idx'));
          showQuestion();
        };
      });

      var checkBtn = document.getElementById('sciCheck');
      if (checkBtn) checkBtn.onclick = function() {
        if (selected === null) return;
        showResult();
      };
    }

    function showResult() {
      var correct = selected === q.answer;
      var html = '<div class="eq-card sci-question-card">';
      html += '<span class="sci-emoji">' + q.emoji + '</span>';
      html += '<div class="sci-question">' + escapeHTML(q.question) + '</div>';
      html += '<div class="sci-options">';
      q.options.forEach(function(opt, i) {
        var cls = 'sci-option';
        if (i === q.answer)      cls += ' sci-correct';
        else if (i === selected) cls += ' sci-wrong';
        html += '<button class="' + cls + '" disabled>' + escapeHTML(opt) + '</button>';
      });
      html += '</div>';
      if (q.fact) {
        html += '<div class="sci-fact-bubble">' + escapeHTML(q.fact) + '</div>';
      }
      // Wrong answer: show a Next Question button so the kid can read the fact
      // first before moving on. Correct answer: auto-advance after a short pause.
      if (!correct) {
        html += '<button class="btn btn-primary" id="sciNext" style="width:100%;max-width:220px;margin-top:12px;">➡️ Next Question</button>';
      }
      html += '</div>';
      stage.innerHTML = html;

      if (!correct) {
        var nextBtn = document.getElementById('sciNext');
        if (nextBtn) nextBtn.onclick = function() { ctx.onCheck(false); };
      } else {
        setTimeout(function() { ctx.onCheck(true); }, 1600);
      }
    }

    showQuestion();
  }
};

// ====================================================================
// MULTIPLICATION RENDERER
// Teaches multiplication as: equal groups → arrays → repeated addition
// → missing factor → commutativity → word problems.
// Each mode shows a visual BEFORE the child types an answer, so the
// concept is always anchored in something concrete they can see & count.
// ====================================================================
RENDERERS.multiplication = {
  mount: function(stage, q, ctx) {
    ctx.hintText = q.hint || "Use the picture to help you count!";

    // ── helpers ─────────────────────────────────────────────────────
    function makeEmoji(count, emoji) {
      var s = "";
      for (var i = 0; i < count; i++) s += '<span class="mult-emoji-item">' + emoji + "</span>";
      return s;
    }

    function makeDotGrid(rows, cols) {
      var html = '<div class="mult-dot-grid" style="grid-template-columns:repeat(' + cols + ',1fr);">';
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          html += '<div class="mult-dot row-' + (r % 2) + '"></div>';
        }
      }
      html += "</div>";
      return html;
    }

    function makeRepeatedAddHTML(a, b) {
      var parts = [];
      for (var i = 0; i < b; i++) parts.push('<span class="mult-addend-chip">' + a + "</span>");
      return parts.join('<span class="mult-plus-sign"> + </span>') +
             '<span class="mult-equals-sign"> = </span>' +
             '<span class="mult-answer-blank">?</span>';
    }

    function storyText(q) {
      return q.story
        .replace(/\{a\}/g, "<strong>" + q.a + "</strong>")
        .replace(/\{b\}/g, "<strong>" + q.b + "</strong>")
        .replace(/\{emoji\}/g, q.emoji);
    }

    // ── commutativity: self-managed MCQ ─────────────────────────────
    if (q.mode === "commutativity") {
      ctx.selfManaged = true;
      ctx.correctAnswer = q.a;

      var opts = [q.a, q.a + 1, q.b + 1, q.a + 2];
      // dedupe and shuffle
      opts = opts.filter(function(v, i, a) { return a.indexOf(v) === i; }).slice(0, 4);
      for (var si = opts.length - 1; si > 0; si--) {
        var sj = Math.floor(Math.random() * (si + 1));
        var st = opts[si]; opts[si] = opts[sj]; opts[sj] = st;
      }

      var chtml = '<div class="eq-card mult-card">';
      chtml += '<p class="mult-prompt">Which number completes this?</p>';
      chtml += '<div class="mult-commute-row">';
      chtml += '<div class="mult-commute-block"><div class="mult-commute-label">' + q.a + ' × ' + q.b + '</div>' + makeDotGrid(q.a, q.b) + '</div>';
      chtml += '<div class="mult-commute-eq">= ' + q.product + '</div>';
      chtml += '<div class="mult-commute-block"><div class="mult-commute-label">' + q.b + ' × <span class="mult-blank-box" style="font-size:20px;">?</span></div>' + makeDotGrid(q.b, q.a) + '</div>';
      chtml += '</div>';
      chtml += '<div class="mult-commute-opts">';
      opts.forEach(function(o) {
        chtml += '<button class="mult-commute-btn" data-val="' + o + '">' + o + '</button>';
      });
      chtml += '</div>';
      chtml += '<div class="mult-fact-bubble" id="multFact" style="display:none;">' + escapeHTML(q.fact || "") + '</div>';
      chtml += '</div>';
      stage.innerHTML = chtml;

      stage.querySelectorAll(".mult-commute-btn").forEach(function(btn) {
        btn.onclick = function() {
          var chosen = parseInt(this.getAttribute("data-val"), 10);
          var correct = chosen === q.a;
          stage.querySelectorAll(".mult-commute-btn").forEach(function(b) {
            b.disabled = true;
            var bv = parseInt(b.getAttribute("data-val"), 10);
            if (bv === q.a)              b.classList.add("mult-btn-correct");
            else if (bv === chosen && !correct) b.classList.add("mult-btn-wrong");
          });
          var fb = document.getElementById("multFact");
          if (fb) fb.style.display = "";
          reactPet(correct ? "happy" : "sad");
          setTimeout(function() { ctx.onCheck(correct); }, correct ? 1400 : 2200);
        };
      });
      return;
    }

    // ── numeric modes: groups, array, repeated_add, missing_factor, word_problem ──
    var answer = q.mode === "missing_factor" ? q.answer : (q.a * q.b);
    ctx.correctAnswer = answer;

    var html = '<div class="eq-card mult-card">';

    if (q.mode === "groups") {
      html += '<p class="mult-prompt">' + q.a + ' groups of ' + q.b + '</p>';
      html += '<div class="mult-groups-wrap">';
      for (var g = 0; g < q.a; g++) {
        html += '<div class="mult-group-box">' + makeEmoji(q.b, q.emoji) + '</div>';
      }
      html += '</div>';
      html += '<div class="mult-equation-strip">' +
        '<span class="mult-factor">' + q.a + '</span>' +
        '<span class="mult-op">×</span>' +
        '<span class="mult-factor">' + q.b + '</span>' +
        '<span class="mult-op">=</span>' +
        '<span class="mult-blank-box" id="multAns">?</span></div>';
    }

    else if (q.mode === "array") {
      html += '<p class="mult-prompt">' + q.a + ' rows of ' + q.b + '</p>';
      html += '<p class="mult-sub">Count the dots and find the total</p>';
      html += makeDotGrid(q.a, q.b);
      html += '<div class="mult-array-label">' + q.a + ' × ' + q.b + ' = <span class="mult-blank-box" id="multAns">?</span></div>';
    }

    else if (q.mode === "repeated_add") {
      html += '<p class="mult-prompt">Add these up:</p>';
      html += '<div class="mult-repeated-add-wrap">' + makeRepeatedAddHTML(q.a, q.b) + '</div>';
      html += '<div class="mult-connection-note">This is the same as <strong>' + q.b + ' × ' + q.a + '</strong></div>';
      html += '<div class="mult-equation-strip">' +
        '<span class="mult-factor">' + q.b + '</span>' +
        '<span class="mult-op">×</span>' +
        '<span class="mult-factor">' + q.a + '</span>' +
        '<span class="mult-op">=</span>' +
        '<span class="mult-blank-box" id="multAns">?</span></div>';
    }

    else if (q.mode === "missing_factor") {
      html += '<p class="mult-prompt">Find the missing number</p>';
      html += '<div class="mult-equation-strip mult-eq-large">' +
        '<span class="mult-factor">' + q.known + '</span>' +
        '<span class="mult-op">×</span>' +
        '<span class="mult-blank-box mult-missing" id="multAns">?</span>' +
        '<span class="mult-op">=</span>' +
        '<span class="mult-factor mult-product">' + q.product + '</span></div>';
      html += '<div class="mult-hint-bar">How many groups of <strong>' + q.known + '</strong> make <strong>' + q.product + '</strong>?</div>';
      html += '<div class="mult-missing-visual">';
      for (var gi = 0; gi < Math.min(q.known, 10); gi++) {
        html += '<div class="mult-dot row-0" style="margin:2px;"></div>';
      }
      html += '<span class="mult-missing-x">× ?</span></div>';
    }

    else if (q.mode === "word_problem") {
      html += '<p class="mult-story">' + storyText(q) + '</p>';
      html += '<div class="mult-groups-wrap mult-groups-small">';
      for (var wg = 0; wg < Math.min(q.a, 10); wg++) {
        html += '<div class="mult-group-box mult-group-sm">' + makeEmoji(Math.min(q.b, 8), q.emoji) + '</div>';
      }
      html += '</div>';
      html += '<div class="mult-equation-strip">' +
        '<span class="mult-factor">' + q.a + '</span>' +
        '<span class="mult-op">×</span>' +
        '<span class="mult-factor">' + q.b + '</span>' +
        '<span class="mult-op">=</span>' +
        '<span class="mult-blank-box" id="multAns">?</span></div>';
    }

    // Numpad host + fact bubble
    html += '<div id="numpadHost" style="margin-top:10px;"></div>';
    html += '<div class="mult-fact-bubble" id="multFact" style="display:none;">' + escapeHTML(q.fact || "") + '</div>';
    html += '</div>';

    stage.innerHTML = html;

    // Mount numpad and wire Check button
    var pad = mountNumpad(document.getElementById("numpadHost"), {
      maxDigits: 3,
      onChange: function(val) {
        var box = document.getElementById("multAns");
        if (box) box.textContent = val !== null ? String(val) : "?";
      }
    });

    // Check button inside numpadHost area
    var checkBtn = document.createElement("button");
    checkBtn.className = "btn btn-primary";
    checkBtn.style.cssText = "width:100%;margin-top:10px;";
    checkBtn.textContent = "✅ Check!";
    checkBtn.onclick = function() {
      var val = pad.getValue();
      if (val === null) return;
      pad.disable();
      checkBtn.disabled = true;
      var correct = val === answer;
      var box = document.getElementById("multAns");
      if (box) box.classList.add(correct ? "mult-ans-correct" : "mult-ans-wrong");
      var factEl = document.getElementById("multFact");
      if (factEl) factEl.style.display = "";
      reactPet(correct ? "happy" : "sad");
      ctx.onCheck(correct);
    };
    document.getElementById("numpadHost").appendChild(checkBtn);
  }
};
