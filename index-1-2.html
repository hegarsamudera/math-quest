    .bh-dir-btn { width: 42px; height: 42px; font-size: 18px; }
    .it-chip { width: 28px; height: 28px; font-size: 13px; border-radius: 8px; }
    .it-rule-btn { padding: 6px 8px; }
    .it-rule-icon { font-size: 18px; }
    .it-rule-text { font-size: 10px; }
  }

  /* IF/THEN ROBOT */
  .it-strip { display:flex; align-items:center; justify-content:center; gap:5px; flex-wrap:wrap; margin-top:10px; }
  .it-chip {
    width: 34px; height: 34px; border-radius: 10px; display:flex; align-items:center; justify-content:center;
    font-size: 16px; flex-shrink: 0;
  }
  .it-chip-fixed { background:#fff; border:2px solid var(--line); color:var(--ink-soft); }
  .it-chip-decision {
    background: var(--retry-bg); border:2.5px dashed var(--amber); color:var(--ink); font-weight:800;
    animation: it-pulse .6s ease both;
  }
  @keyframes it-pulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .it-chip-decision.it-chip-answered { background:#fff; border:2.5px solid var(--accent); animation:none; }
  .it-chip-decision:disabled, .it-rule-btn:disabled { opacity:.6; }

  .it-rule-picker {
    margin-top:10px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
  }
  .it-rule-hint { width:100%; text-align:center; font-size:13px; color:var(--ink-soft); font-weight:700; font-family:var(--font-display); margin-bottom:2px; }
  .it-rule-btn {
    flex:1; min-width:120px; max-width:150px; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:10px 8px; border-radius:14px; border:2.5px solid var(--line); background:#fff;
    box-shadow:var(--shadow-soft); transition:all .15s ease;
  }
  .it-rule-btn:active { transform:scale(.96); }
  .it-rule-btn.it-rule-selected { border-color:var(--accent); background:var(--success-bg); }
  .it-rule-icon { font-size:22px; }
  .it-rule-text { font-size:12px; font-weight:700; color:var(--ink); font-family:var(--font-display); line-height:1.3; }

  .robot-cell.it-check-wall { background:var(--danger-bg); animation:cardPopGood .3s ease; }
  .robot-cell.it-check-clear { background:var(--success-bg); animation:cardPopGood .3s ease; }

  .achievement-toast { position: fixed; top: max(20px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) translateY(-150px); background: #1FA391; color: white; padding: 12px 18px; border-radius: 16px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.25); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; display: flex; align-items: center; gap: 12px; width:min(90vw,360px); box-sizing:border-box; }
  .achievement-toast.show { transform: translateX(-50%) translateY(0); }
  .coin-gain-anim { position: absolute; color: #FFD700; font-weight: 900; font-size: 28px; pointer-events: none; animation: floatUp 1.2s ease-out forwards; z-index: 1000; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

  @keyframes floatUp { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { transform: translateY(-10px) scale(1.2); opacity: 1; } 100% { transform: translateY(-60px) scale(1); opacity: 0; } }

  .place-eq { margin-top: 16px; font-family: var(--font-mono); font-size: clamp(13px,4vw,18px); background: #fff; padding: 10px 16px; border-radius: 12px; box-shadow: var(--shadow-soft); display: inline-block; letter-spacing: 0.3px; max-width:100%; overflow-wrap:break-word; }
  .place-eq-hundreds { color: var(--violet); font-weight: bold; }
  .place-eq-tens { color: var(--amber-dark); font-weight: bold; }
  .place-eq-ones { color: var(--teal-dark); font-weight: bold; }
  .place-eq-total { color: var(--ink); font-weight: bold; }
  .coins-earned { color: #D1860E; font-weight: bold; font-size: 20px; margin-bottom: 18px; display: flex; align-items: center; justify-content: center; gap: 6px; }

  /* SCIENCE QUIZ */
  .sci-question-card {
    background: #fff; border-radius: var(--radius-lg); padding: 18px 16px;
    text-align: center; box-shadow: var(--shadow-card);
  }
  .sci-emoji { font-size: 52px; margin-bottom: 8px; display: block; }
  .sci-question { font-size: 15px; font-weight: 800; color: var(--ink); margin-bottom: 16px; line-height: 1.45; }
  .sci-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .sci-option {
    background: #F8F6FF; border: 2.5px solid var(--line); border-radius: 14px;
    padding: 12px 8px; font-size: 13px; font-weight: 700; color: var(--ink);
    text-align: center; line-height: 1.3; transition: all .12s ease;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .sci-option:active { transform: scale(.96); }
  .sci-option.sci-selected { border-color: var(--accent); background: var(--accent); color: #fff; }
  .sci-option.sci-correct  { border-color: var(--success); background: var(--success-bg); color: var(--success); }
  .sci-option.sci-wrong    { border-color: var(--coral); background: #FFF0F0; color: var(--coral); }
  .sci-fact-bubble {
    background: linear-gradient(135deg, #F0F4FF, #F8F0FF);
    border-radius: 14px; padding: 10px 14px; margin-top: 14px;
    font-size: 12px; font-weight: 700; color: var(--ink-soft);
    border-left: 4px solid var(--violet); text-align: left; line-height: 1.5;
    display: block; width: 100%; box-sizing: border-box;
  }
  .sci-fact-bubble::before { content: "💡 Fun fact: "; font-weight: 900; color: var(--violet); }
    .mode-grid { grid-template-columns: 1fr; }
    .gamification-stats { gap: 6px; }
    .coins-badge, .streak-badge, .ach-badge { padding: 4px 9px; font-size: 11px; }
    .eq-card[style*="inline-flex"]{ padding:16px 20px 16px !important; min-width:0 !important; max-width:100% !important; }

<script>
// ====================================================================
// CORE ENGINE & DATA
// ====================================================================
var DATA = JSON.parse(document.getElementById("game-data").textContent);

// ====================================================================
// PATCH GROUP K — QUESTION BANK SELF-CHECK (dev-only console warnings)
// Sanity-checks the path-based puzzle modes (ifThenRobot, codeTheRobot,
// bugHunter) on load so authoring mistakes (e.g. start === goal, or a
// "correct" rule that doesn't actually reach the goal) surface immediately
// in the console instead of silently shipping a broken question. This is
// diagnostic only — it never alters gameplay or shows anything to players.
// ====================================================================
(function validateQuestionBank() {
  var DIRS = {
    up:    { dx: 0, dy: -1 },
    down:  { dx: 0, dy: 1  },
    left:  { dx: -1, dy: 0 },
    right: { dx: 1, dy: 0  }
  };
  function step(pos, dirKey) {
    var d = DIRS[dirKey];
    return { x: pos.x + d.dx, y: pos.y + d.dy };
  }
  function inBounds(pos, gridSize) {
    return pos.x >= 0 && pos.x < gridSize && pos.y >= 0 && pos.y < gridSize;
  }
  function warn(gameKey, qid, msg) {
    console.warn("[Math Quest question check] " + gameKey + " / " + qid + ": " + msg);
  }

  (DATA.games || []).forEach(function(game) {
    // questions may be a flat array OR a {easy,medium,hard} object
    var qFlat = game.questions;
    if (qFlat && !Array.isArray(qFlat)) {
      qFlat = (qFlat.easy || []).concat(qFlat.medium || []).concat(qFlat.hard || []);
    }
    (qFlat || []).forEach(function(q) {
      if (game.type === "ifThenRobot") {
        if (q.start.x === q.goal.x && q.start.y === q.goal.y) {
          warn(game.key, q.id, "start equals goal — puzzle is solved before the robot moves.");
          return;
        }
        var wallSet = {};
        (q.walls || []).forEach(function(w) { wallSet[w.x + "," + w.y] = true; });
        var pos = { x: q.start.x, y: q.start.y };
        q.prefix.forEach(function(dir) { pos = step(pos, dir); });
        var checkPos = step(pos, q.decisionDir);
        var hasWall = !inBounds(checkPos, q.gridSize) || !!wallSet[checkPos.x + "," + checkPos.y];
        var branchDir = hasWall ? q.thenDir : q.elseDir;
        var branchPos = step(pos, branchDir);
        if (!inBounds(branchPos, q.gridSize) || wallSet[branchPos.x + "," + branchPos.y]) {
          warn(game.key, q.id, "the correct branch (" + branchDir + ") immediately hits a wall/edge.");
          return;
        }
        var finalPos = branchPos;
        var blockedMidSuffix = false;
        (q.suffix || []).forEach(function(dir) {
          var next = step(finalPos, dir);
          if (!inBounds(next, q.gridSize) || wallSet[next.x + "," + next.y]) { blockedMidSuffix = true; return; }
          finalPos = next;
        });
        if (blockedMidSuffix) {
          warn(game.key, q.id, "the suffix path is blocked by a wall/edge before finishing.");
        } else if (finalPos.x !== q.goal.x || finalPos.y !== q.goal.y) {
          warn(game.key, q.id, "following the correct rule lands at (" + finalPos.x + "," + finalPos.y + "), not the goal (" + q.goal.x + "," + q.goal.y + ").");
        }
      }

      if (game.type === "codeTheRobot") {
        if (q.start.x === q.goal.x && q.start.y === q.goal.y) {
          warn(game.key, q.id, "start equals goal.");
          return;
        }
        var wallSet2 = {};
        (q.walls || []).forEach(function(w) { wallSet2[w.x + "," + w.y] = true; });
        // BFS reachability check (mirrors solveShortestPathArrows' approach).
        var startKey = q.start.x + "," + q.start.y;
        var goalKey = q.goal.x + "," + q.goal.y;
        var visited = {}; visited[startKey] = true;
        var queue = [{ x: q.start.x, y: q.start.y }];
        var found = (startKey === goalKey);
        var qi = 0;
        while (qi < queue.length && !found) {
          var cur = queue[qi++];
          for (var dk in DIRS) {
            var n = step(cur, dk);
            var nKey = n.x + "," + n.y;
            if (!inBounds(n, q.gridSize) || wallSet2[nKey] || visited[nKey]) continue;
            if (nKey === goalKey) { found = true; break; }
            visited[nKey] = true;
            queue.push(n);
          }
        }
        if (!found) warn(game.key, q.id, "goal is unreachable from start given the walls.");
      }

      if (game.type === "loopLand") {
        if (q.start.x === q.goal.x && q.start.y === q.goal.y) {
          warn(game.key, q.id, "start equals goal.");
          return;
        }
        var wallSetLL = {};
        (q.walls || []).forEach(function(w) { wallSetLL[w.x + "," + w.y] = true; });
        // The real constraint isn't just "reachable" — it's "reachable using at
        // most maxBlocks straight-line runs" (since each block is one direction
        // repeated N times). Check the straight-line L-shaped path specifically.
        var dx = q.goal.x - q.start.x, dy = q.goal.y - q.start.y;
        var runs = [];
        if (dx !== 0) runs.push({ dir: dx > 0 ? "right" : "left", count: Math.abs(dx) });
        if (dy !== 0) runs.push({ dir: dy > 0 ? "down" : "up", count: Math.abs(dy) });
        if (runs.length > q.maxBlocks) {
          warn(game.key, q.id, "needs " + runs.length + " straight-line blocks but maxBlocks is " + q.maxBlocks + ".");
          return;
        }
        var posLL = { x: q.start.x, y: q.start.y };
        var blockedLL = false;
        runs.forEach(function(run) {
          for (var k = 0; k < run.count; k++) {
            var next = step(posLL, run.dir);
            if (!inBounds(next, q.gridSize) || wallSetLL[next.x + "," + next.y]) { blockedLL = true; return; }
            posLL = next;
          }
        });
        if (blockedLL) {
          warn(game.key, q.id, "the straight-line L-shaped path hits a wall/edge before reaching the goal.");
        } else if (posLL.x !== q.goal.x || posLL.y !== q.goal.y) {
          warn(game.key, q.id, "the straight-line L-shaped path doesn't land on the goal.");
        }
      }

      if (game.type === "bugHunter") {
        if (q.start.x === q.goal.x && q.start.y === q.goal.y) {
          warn(game.key, q.id, "start equals goal.");
          return;
        }
        var wallSet3 = {};
        (q.walls || []).forEach(function(w) { wallSet3[w.x + "," + w.y] = true; });
        var bugMap = {};
        (q.bugs || []).forEach(function(b) { bugMap[b.index] = b.correct; });
        var pos3 = { x: q.start.x, y: q.start.y };
        var blocked3 = false;
        q.sequence.forEach(function(dir, i) {
          var useDir = bugMap.hasOwnProperty(i) ? bugMap[i] : dir;
          var next = step(pos3, useDir);
          if (!inBounds(next, q.gridSize) || wallSet3[next.x + "," + next.y]) { blocked3 = true; return; }
          pos3 = next;
        });
        if (blocked3) {
          warn(game.key, q.id, "the corrected sequence (bugs fixed) hits a wall/edge.");
        } else if (pos3.x !== q.goal.x || pos3.y !== q.goal.y) {
          warn(game.key, q.id, "the corrected sequence ends at (" + pos3.x + "," + pos3.y + "), not the goal.");
        }
      }
    }); // end qFlat.forEach
  }); // end DATA.games.forEach
})();

// ====================================================================
function storageGet(key, def) {
  try {
    var val = localStorage.getItem("mathQuest_" + key);
    return val ? JSON.parse(val) : def;
  } catch(e) { return def; }
}

function storageSet(key, val) {
  try {
    localStorage.setItem("mathQuest_" + key, JSON.stringify(val));
  } catch(e) {}
}

// ====================================================================
// VOICE — kid-friendly narration using the browser's built-in text-to-speech
// (Web Speech API). Works fully offline, no audio files or API keys needed.
// Picks the warmest-sounding female-leaning voice available on the device,
// and falls back gracefully (silently) on devices/browsers without support.
// ====================================================================
var Voice = (function() {
  var supported = ("speechSynthesis" in window) && (typeof SpeechSynthesisUtterance !== "undefined");
  var chosenVoice = null;
  var voicesReady = false;

  // Common female voice names across Chrome/Android/iOS/Windows/macOS speech engines.
  var FEMALE_NAME_HINTS = [
    "female", "samantha", "victoria", "karen", "moira", "tessa", "fiona",
    "susan", "zira", "hazel", "salli", "joanna", "kendra", "kimberly",
    "google us english", "google uk english female", "woman", "girl"
  ];

  function pickVoice() {
    if (!supported) return;
    var voices = speechSynthesis.getVoices() || [];
    if (!voices.length) return;

    var english = voices.filter(function(v){ return /^en/i.test(v.lang); });
    var pool = english.length ? english : voices;

    var byHint = pool.filter(function(v) {
      var n = v.name.toLowerCase();
      return FEMALE_NAME_HINTS.some(function(hint){ return n.indexOf(hint) !== -1; });
    });

    chosenVoice = byHint[0] || pool[0] || voices[0] || null;
    voicesReady = true;
  }

  if (supported) {
    pickVoice();
    // Most browsers load voices asynchronously the first time.
    speechSynthesis.onvoiceschanged = pickVoice;
  }

  function isEnabled() {
    return supported && gm.voiceEnabled;
  }

  function stop() {
    if (supported) speechSynthesis.cancel();
  }

  function say(text, opts) {
    if (!isEnabled() || !text) return;
    stop(); // never overlap lines; a new line always interrupts the previous one
    opts = opts || {};
    var utter = new SpeechSynthesisUtterance(text);
    if (chosenVoice) utter.voice = chosenVoice;
    utter.rate = opts.rate || 0.95;   // a touch slower & clearer for young kids
    utter.pitch = opts.pitch || 1.15; // slightly higher/warmer pitch
    utter.volume = 1;
    speechSynthesis.speak(utter);
  }

  function toggle() {
    gm.voiceEnabled = !gm.voiceEnabled;
    storageSet("voiceEnabled", gm.voiceEnabled);
    if (!gm.voiceEnabled) stop();
    return gm.voiceEnabled;
  }

  return { say: say, stop: stop, toggle: toggle, isEnabled: isEnabled, isSupported: function(){ return supported; } };
})();

// ====================================================================
// PATCH GROUP S — SOUND EFFECTS (item 7)
// Short synthesized chimes/buzzes via the Web Audio API. No external audio
// files are used (this is an offline game), and effects never overlap or
// queue — each call plays immediately on its own short-lived oscillator.
// ====================================================================
var SFX = (function() {
  var Ctx = window.AudioContext || window.webkitAudioContext;
  var supported = !!Ctx;
  var ctx = null;

  function ensureCtx() {
    if (!supported) return null;
    if (!ctx) ctx = new Ctx();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }

  function isEnabled() {
    return supported && gm.sfxEnabled;
  }

  // tone: { freq, duration (s), type, delay (s), gain }
  function playTone(tone) {
    var audioCtx = ensureCtx();
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gainNode = audioCtx.createGain();
    osc.type = tone.type || "sine";
    osc.frequency.value = tone.freq;
    var startAt = audioCtx.currentTime + (tone.delay || 0);
    var dur = tone.duration || 0.15;
    gainNode.gain.setValueAtTime(0, startAt);
    gainNode.gain.linearRampToValueAtTime(tone.gain || 0.18, startAt + 0.02);
    gainNode.gain.exponentialRampToValueAtTime(0.001, startAt + dur);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start(startAt);
    osc.stop(startAt + dur + 0.02);
  }

  function correct() {
    if (!isEnabled()) return;
    // Bright two-note "ding-ding" rising chime.
    playTone({ freq: 880, duration: 0.13, delay: 0 });
    playTone({ freq: 1175, duration: 0.16, delay: 0.1 });
  }

  function retry() {
    if (!isEnabled()) return;
    // Soft low buzz — gentle, not harsh, so it doesn't feel punishing.
    playTone({ freq: 220, duration: 0.18, delay: 0, type: "triangle", gain: 0.14 });
  }

  function coin() {
    if (!isEnabled()) return;
    playTone({ freq: 1320, duration: 0.08, delay: 0, gain: 0.12 });
    playTone({ freq: 1760, duration: 0.12, delay: 0.06, gain: 0.12 });
  }

  function achievement() {
    if (!isEnabled()) return;
    // Short ascending fanfare.
    [660, 880, 1100, 1320].forEach(function(freq, idx) {
      playTone({ freq: freq, duration: 0.14, delay: idx * 0.08, gain: 0.15 });
    });
  }

  function toggle() {
    gm.sfxEnabled = !gm.sfxEnabled;
    storageSet("sfxEnabled", gm.sfxEnabled);
    return gm.sfxEnabled;
  }

  return {
    correct: correct, retry: retry, coin: coin, achievement: achievement,
    toggle: toggle, isEnabled: isEnabled, isSupported: function(){ return supported; }
  };
})();

// --- Pet data in localStorage ---
// schema: { name, stageIndex, sparklePower, ownedAccessories, equipped, color,
//           foodInventory: { apple:N, banana:N, ... }, unlockedColors }
function getPetData() {
  return storageGet("pet2", {
    name: "", stageIndex: 0, sparklePower: 0,
    ownedAccessories: [], equipped: [], color: "lavender",
    foodInventory: {}, unlockedColors: ["lavender","pink","mint","sky","sunshine"]
  });
}

function savePetData(pet) {
  storageSet("pet2", pet);
}

function getPetStageData(pet) {
  pet = pet || getPetData();
  return SPARKLE_STAGES[Math.min(pet.stageIndex, SPARKLE_STAGES.length - 1)];
}

// Shared evolution-progress calc so the Pet screen and the roaming
// companion always agree on "how close to evolving" a pet is.
function getPetEvolutionProgress(pet) {
  pet = pet || getPetData();
  var stage = getPetStageData(pet);
  var sp = pet.sparklePower || 0;
  var evoReady = !!(stage.sparkleToNext && sp >= stage.sparkleToNext);
  var pct = 100;
  if (stage.sparkleToNext) {
    var prevSP = 0;
    for (var si = 0; si < pet.stageIndex; si++) prevSP += (SPARKLE_STAGES[si].sparkleToNext || 0);
    var stageInto = sp - prevSP;
    pct = Math.max(0, Math.min(100, Math.round((stageInto / stage.sparkleToNext) * 100)));
    if (evoReady) pct = 100;
  }
  return { pct: pct, evoReady: evoReady, stage: stage, stageIndex: pet.stageIndex, isMaxStage: !stage.sparkleToNext };
}

// A little version of the pet that lives outside #app (so it survives
// every render()), wanders around the screen, "talks" in speech bubbles
// every so often, and bursts into love glitter when tapped.
// ====================================================================
var SPARKLE_TALK_LINES = [

  "My tummy is rumbling! 🍌",
  "Can I have a snack? 🧁"
];
var SPARKLE_ALMOST_EVOLVE_LINES = [

  "Visit my page — I'm ready to grow! 🌈"
];

var sparkleCompanion = {
  el: null, faceEl: null, bubbleEl: null,
  moveTimer: null, talkTimer: null, bubbleHideTimer: null
};

function sparkleCompanionAppearance() {
  var pet = getPetData();
  var stage = getPetStageData(pet);
  return { emoji: stage.emoji, colorHex: (PET_COLORS[pet.color] || PET_COLORS.lavender).hex };
}

function initSparkleCompanion() {
  if (sparkleCompanion.el) return; // already mounted
  var wrap = document.createElement("div");
  wrap.className = "sparkle-companion";
  wrap.id = "sparkleCompanion";
  wrap.innerHTML =
    '<div class="sparkle-companion-bubble" id="sparkleCompanionBubble"></div>' +
    '<div class="sparkle-companion-face" id="sparkleCompanionFace"></div>';
  document.body.appendChild(wrap);

  sparkleCompanion.el = wrap;
  sparkleCompanion.faceEl = document.getElementById("sparkleCompanionFace");
  sparkleCompanion.bubbleEl = document.getElementById("sparkleCompanionBubble");

  // Start near the bottom-right, out of the way of most content.
  wrap.style.left = Math.max(10, window.innerWidth - 90) + "px";
  wrap.style.top = (window.innerHeight * 0.7) + "px";

  sparkleCompanion.faceEl.addEventListener("click", onSparkleCompanionTap);

  updateSparkleCompanionAppearance();
  scheduleSparkleCompanionMove();
  scheduleSparkleCompanionTalk();

  // Say hello shortly after mounting.
  setTimeout(function() { sparkleCompanionSay(pickHelloLine()); }, 1800);
}

function pickHelloLine() {
  var pet = getPetData();
  var prog = getPetEvolutionProgress(pet);
  if (!prog.isMaxStage && prog.evoReady) return SPARKLE_READY_EVOLVE_LINES[Math.floor(Math.random() * SPARKLE_READY_EVOLVE_LINES.length)];
  var inv = pet.foodInventory || {};
  var hasFood = Object.keys(inv).some(function(k) { return (inv[k] || 0) > 0; });
  if (!hasFood) return SPARKLE_HUNGRY_LINES[Math.floor(Math.random() * SPARKLE_HUNGRY_LINES.length)];
  return "Hi there! 👋✨";
}

function updateSparkleCompanionAppearance() {
  if (!sparkleCompanion.faceEl) return;
  var look = sparkleCompanionAppearance();
  sparkleCompanion.faceEl.textContent = look.emoji;
  sparkleCompanion.faceEl.style.boxShadow =
    "0 4px 14px -4px rgba(120,80,180,.45), 0 0 0 3px " + (look.colorHex.indexOf("gradient") >= 0 ? "#C9A8F5" : look.colorHex) + "55";

  // Extra glow when the pet is close to (or ready for) its next evolution,
  // so the companion itself visibly hints "something's about to happen".
  var prog = getPetEvolutionProgress();
  sparkleCompanion.faceEl.classList.remove("sparkle-glow-close", "sparkle-glow-ready");
  if (!prog.isMaxStage) {
    if (prog.evoReady) sparkleCompanion.faceEl.classList.add("sparkle-glow-ready");
    else if (prog.pct >= 80) sparkleCompanion.faceEl.classList.add("sparkle-glow-close");
  }
}

function scheduleSparkleCompanionMove() {
  clearTimeout(sparkleCompanion.moveTimer);
  var delay = 6000 + Math.random() * 4000; // wander every 6-10s
  sparkleCompanion.moveTimer = setTimeout(function() {
    moveSparkleCompanionRandomly();
    scheduleSparkleCompanionMove();
  }, delay);
}

function moveSparkleCompanionRandomly() {
  var el = sparkleCompanion.el;
  if (!el) return;
  var margin = 12, size = 56;
  var maxX = window.innerWidth - size - margin;
  var minY = window.innerHeight * 0.18; // stay clear of headers/top nav
  var maxY = window.innerHeight - size - margin;
  var x = margin + Math.random() * Math.max(1, maxX - margin);
  var y = minY + Math.random() * Math.max(1, maxY - minY);
  el.classList.add("walking");
  el.style.left = x + "px";
  el.style.top = y + "px";
  setTimeout(function() { el.classList.remove("walking"); }, 2200);
}

function scheduleSparkleCompanionTalk() {
  clearTimeout(sparkleCompanion.talkTimer);
  var delay = 14000 + Math.random() * 12000; // chat every 14-26s
  sparkleCompanion.talkTimer = setTimeout(function() {
    var pet = getPetData();
    var inv = pet.foodInventory || {};
    var hasFood = Object.keys(inv).some(function(k) { return (inv[k] || 0) > 0; });
    var prog = getPetEvolutionProgress(pet);
    var pool;
    if (!prog.isMaxStage && prog.evoReady) pool = SPARKLE_READY_EVOLVE_LINES;
    else if (!prog.isMaxStage && prog.pct >= 80 && Math.random() < 0.6) pool = SPARKLE_ALMOST_EVOLVE_LINES;
    else if (!hasFood && Math.random() < 0.5) pool = SPARKLE_HUNGRY_LINES;
    else pool = SPARKLE_TALK_LINES;
    sparkleCompanionSay(pool[Math.floor(Math.random() * pool.length)]);
    scheduleSparkleCompanionTalk();
  }, delay);
}

function sparkleCompanionSay(text) {
  var b = sparkleCompanion.bubbleEl;
  if (!b) return;
  b.textContent = text;
  b.classList.add("show");
  clearTimeout(sparkleCompanion.bubbleHideTimer);
  sparkleCompanion.bubbleHideTimer = setTimeout(function() {
    b.classList.remove("show");
  }, 3200);
}

function onSparkleCompanionTap() {
  sparkleCompanionSay("💖 " + ["Yay!", "That tickles!", "Thank you!", "I love you!"][Math.floor(Math.random() * 4)]);
  sparkleCompanion.faceEl.classList.remove("tapped");
  void sparkleCompanion.faceEl.offsetWidth;
  sparkleCompanion.faceEl.classList.add("tapped");
  spawnLoveGlitter(sparkleCompanion.faceEl);
  SFX.coin && SFX.coin();
}

function spawnLoveGlitter(originEl) {
  var rect = originEl.getBoundingClientRect();
  var cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
  var glyphs = ["💖", "✨", "💕", "🌟", "💗"];
  var count = 10;
  for (var i = 0; i < count; i++) {
    var p = document.createElement("div");
    p.className = "love-glitter-particle";
    p.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    var angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
    var dist = 60 + Math.random() * 50;
    p.style.left = cx + "px";
    p.style.top = cy + "px";
    p.style.setProperty("--lgx", (Math.cos(angle) * dist) + "px");
    p.style.setProperty("--lgy", (Math.sin(angle) * dist - 20) + "px");
    p.style.setProperty("--lgr", (Math.random() * 60 - 30) + "deg");
    document.body.appendChild(p);
    (function(el) { setTimeout(function() { el.remove(); }, 1200); })(p);
  }
}

// PATCH GROUP U — PET REACTIONS DURING PLAY
// Bounces happy or droops sad on the in-quiz companion avatar so the pet
// feels like it's reacting alongside the kid, not just sitting on its own
// screen. Pure CSS class toggle — no layout shift, safe to call often.
function reactPet(mood) {
  var el = document.getElementById("playPetCompanion");
  if (!el) return;
  el.classList.remove("pet-react-happy", "pet-react-sad");
  // Force reflow so the animation re-triggers even on repeated same mood
  void el.offsetWidth;
  el.classList.add(mood === "happy" ? "pet-react-happy" : "pet-react-sad");
  setTimeout(function() {
    if (el) el.classList.remove("pet-react-happy", "pet-react-sad");
  }, 900);
}

// Sparkle Power gained from coins earned in math (1 coin = 0 SP; SP comes from feeding)
// We call this after feeding in the pet screen.
function feedPet(foodKey) {
  var food = SPARKLE_FOOD[foodKey];
  if (!food) return;
  var pet = getPetData();
  var inv = pet.foodInventory || {};
  if ((inv[foodKey] || 0) < 1) return;

  inv[foodKey] = (inv[foodKey] || 0) - 1;
  pet.foodInventory = inv;
  var gained = food.power;
  pet.sparklePower = (pet.sparklePower || 0) + gained;
  savePetData(pet);

  // Sparkle gain animation
  var el = document.createElement("div");
  el.className = "sparkle-gain-anim";
  el.textContent = "+✨" + gained + " Sparkle Power!";
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 1400);

  SFX.coin();
  spawnConfetti(20);

  // Check if evolution is now available — don't evolve, just re-render
  renderPetScreen();
}

function buyFood(foodKey) {
  var food = SPARKLE_FOOD[foodKey];
  if (!food) return;
  if (gm.coins < food.cost) return;
  gm.coins -= food.cost;
  storageSet("coins", gm.coins);
  var pet = getPetData();
  var inv = pet.foodInventory || {};
  inv[foodKey] = (inv[foodKey] || 0) + 1;
  pet.foodInventory = inv;
  savePetData(pet);
  SFX.achievement();
  renderPetScreen();
}

function tryEvolve() {
  var pet = getPetData();
  var stage = getPetStageData(pet);
  if (!stage.sparkleToNext) return; // already legendary
  if (pet.sparklePower < stage.sparkleToNext) return;

  // Evolution!
  pet.stageIndex = Math.min(pet.stageIndex + 1, SPARKLE_STAGES.length - 1);
  var newStage = SPARKLE_STAGES[pet.stageIndex];

  // Grant evolution reward cosmetic/color
  if (newStage.rewardKey === "hat" || newStage.rewardKey === "trail") {
    var accKey = newStage.rewardKey === "hat" ? "hat" : "wings";
    if (pet.ownedAccessories.indexOf(accKey) === -1) {
      pet.ownedAccessories.push(accKey);
      pet.equipped.push(accKey);
    }
  }
  if (newStage.rewardKey === "rainbow") {
    if (!pet.unlockedColors) pet.unlockedColors = ["lavender","pink","mint","sky","sunshine"];
    if (pet.unlockedColors.indexOf("rainbow") === -1) pet.unlockedColors.push("rainbow");
    pet.color = "rainbow";
  }

  savePetData(pet);
  spawnConfetti(80);
  SFX.achievement();

  // Show evolution modal
  showEvoModal(newStage);
}

function showEvoModal(stage) {
  var overlay = document.createElement("div");
  overlay.className = "evo-modal-overlay";
  overlay.innerHTML =
    '<div class="evo-modal">' +
      '<span class="evo-modal-pet">' + stage.emoji + '</span>' +
      '<div class="evo-modal-title">✨ EVOLVED! ✨</div>' +
      '<div class="evo-modal-stage">Your pet became a<br><strong>' + escapeHTML(stage.name) + '</strong></div>' +
      (stage.reward ? '<div class="evo-modal-reward">🎁 Reward unlocked: ' + escapeHTML(stage.reward) + '</div>' : '') +
      '<button class="evo-modal-btn" onclick="this.closest(\'.evo-modal-overlay\').remove(); renderPetScreen();">🌟 Awesome!</button>' +
    '</div>';
  document.body.appendChild(overlay);
}

// Build pet visual (shared by home preview and pet screen)
function buildPetVisualHTML(sizeClass) {
  var pet = getPetData();
  var stage = getPetStageData(pet);
  var colorDef = PET_COLORS[pet.color] || PET_COLORS.lavender;
  var bgStyle = colorDef.hex.startsWith("linear") ? colorDef.hex : colorDef.hex + "33";

  var equippedIcons = (pet.equipped || []).map(function(id) {
    return PET_ACCESSORIES[id] ? PET_ACCESSORIES[id].icon : "";
  }).filter(Boolean);

  var isLarge = (sizeClass || "").indexOf("large") !== -1;
  var aura = stage.aura;
  var auraClass = aura ? " pet-aura-ring pet-aura-" + aura : " pet-aura-ring";

  html += '<div class="' + auraClass + '"></div>';

// Finds the first not-yet-mastered lesson across the Main Quest worlds (in
// order) so "Continue" can jump straight to it instead of making the player
// hunt for where they left off.
function findNextJourneyStep() {
  for (var i = 0; i < MAIN_WORLDS.length; i++) {
    var world = MAIN_WORLDS[i];
    if (!isWorldUnlocked(world)) return { world: world, kind: "locked" };
    if (isWorldBossCleared(world.key)) continue;
    if (world.isFinale) return { world: world, kind: "boss" };
    var keys = flattenWorldLessonKeys(world);
    var nextLesson = keys.filter(function(k) { return !getGameTierProgress(k).isFullyComplete; })[0];
    if (nextLesson) return { world: world, kind: "lesson", key: nextLesson };
    return { world: world, kind: "boss" }; // all lessons done, boss awaits
  }
  return null; // whole Main Quest complete
}

function buildJourneyContinueCardHTML() {
  var step = findNextJourneyStep();
  var text, sub;
  if (!step) {
    text = "🎉 You've conquered the whole Journey!";
    sub = "Explore the Side Kingdoms or replay any World Boss.";
  } else if (step.kind === "boss") {
    text = "👾 " + step.world.label + "'s boss is ready!";
    sub = "Tap to head to the map and take them on.";

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, function(tag) {
    var charsToReplace = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
    return charsToReplace[tag] || tag;
  });
}

function spawnConfetti(count) {

// Builds the spoken instruction for a question, based on the game type.
// Mirrors the on-screen heading/prompt but phrased naturally for speech.
function buildVoiceInstruction(gameType, q) {
  switch (gameType) {
    case "placeValue":
      if (q.mode === "readBlocks") {
        return "Count the hundreds, tens, and ones blocks, then type the number they make.";
      }
      return "Look at the highlighted digit in " + q.number + ". Tap what that digit is worth.";
    case "numberBonds":
      return "Find the missing part of the number bond. Type your answer on the number pad.";
    case "addition":
      return "What is " + q.a + " plus " + q.b + "? Type your answer on the number pad.";
    case "subtraction":
      return "What is " + q.a + " minus " + q.b + "? Type your answer on the number pad.";
    case "moneyMath":
      return "Can you make " + formatRupiah(q.amount) + "? Tap the plus buttons under the bills to add money.";
    case "skipCounting":
      return "Fill in the missing number. What comes next in the pattern?";
    case "comparingNumbers":
      return "Compare the numbers " + q.a + " and " + q.b + ". Is it less than, equal to, or greater than?";
    case "tellingTime":
      if (q.mode === "set") {
        var minutePhrase = q.minute === 0 ? "o'clock" : (q.minute < 10 ? "oh " + q.minute : "" + q.minute);
        return "Set the clock to " + q.hour + " " + minutePhrase + ". Use the buttons to move the hour and minute hands.";
      }
      return "What time is it? Look at the clock and tap the correct time.";
    case "fractions":
      if (q.mode === "identify") {
        return "What fraction of the shape is shaded? Tap the matching fraction.";
      }
      return "Shade " + q.numerator + " out of " + q.denominator + " parts of the shape. Tap the parts to shade them.";
    case "codeTheRobot":
      return "Help the robot reach the pizza. Tap the arrows to build a path, then press Run.";
    case "patternDetective":
      if (q.mode === "extend") return "Look at the pattern and tap what comes next!";
      if (q.mode === "find-missing") return "Something is missing! Can you find what goes in the blank?";
      return "Find the rule and tap the missing number in the sequence!";
    case "bugHunter": {
      var bugCount = q.bugs.length;
      return bugCount > 1
        ? "There are " + bugCount + " bugs hiding in this code! Tap each broken arrow, then fix it."
        : "There's a bug in this code! Tap the broken arrow, then tap the correct direction to fix it.";
    }
    case "ifThenRobot":
      return "The robot needs to make a decision. Tap the question mark and pick the rule that fits what's ahead.";
    case "functionFactory":
      return "Teach the robot your SPIN function, then pick how many times to call it to reach the star!";
    case "sortItOut":
      return "Tap two bars to swap them. Get them sorted from " + (q.targetOrder === "desc" ? "tallest to shortest" : "shortest to tallest") + "!";
    case "trueOrFalse":
      return q.story + " — read the clues and decide: YES or NO?";
    case "wordProblems":
      return "Listen to the story carefully, then type your answer!";
    case "missingNumber":
      return "Find the mystery number! What goes in the blank to make the equation correct?";
    case "placeValueExpanded":
      return "Break the number " + q.number + " into hundreds, tens and ones!";
    case "doublesHalves":
      return q.mode === "double" ? "What is double " + q.number + "?" : "What is half of " + q.number + "?";
    case "scienceQuiz":
      return q.question;
    case "multiplication": {
      if (q.mode === "groups")        return q.a + " groups of " + q.b + ". How many altogether?";
      if (q.mode === "array")         return q.a + " rows of " + q.b + " dots. What is the total?";
      if (q.mode === "repeated_add")  return "What is " + q.a + " added " + q.b + " times?";
      if (q.mode === "missing_factor") return q.known + " times something equals " + q.product + ". What is the missing number?";
      if (q.mode === "commutativity") return q.a + " times " + q.b + " equals " + q.product + ". So " + q.b + " times what also equals " + q.product + "?";
      if (q.mode === "word_problem")  return q.story.replace(/\{a\}/g,q.a).replace(/\{b\}/g,q.b).replace(/\{emoji\}/g,"");
      return "Solve the multiplication!";
    }
    default:
      return "Here's your next question. Good luck!";
  }
}

// PATCH GROUP M — SHUFFLE HELPER
function shuffleArray(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}

// Returns the "size" of a question so we can sort it into a difficulty bucket.
function questionMagnitude(game, q) {
  switch (game.type) {
    case "placeValue": return q.number;
    case "numberBonds": return q.whole !== null ? q.whole : (q.part1 !== null ? q.part1 + (q.part2||0) : q.part2);
    case "addition": return Math.max(q.a, q.b);
    case "subtraction": return q.a;
    case "moneyMath": return q.amount / 100; // scale rupiah down to a comparable range
    case "skipCounting": {
      var maxVal = q.start;
      for (var i = 0; i < q.length; i++) {
        var v = q.start + i * q.step;
        if (Math.abs(v) > Math.abs(maxVal)) maxVal = v;
      }
      return Math.abs(maxVal);
    }
    case "comparingNumbers": return Math.max(q.a, q.b);
    case "tellingTime": return q.hour * 60 + q.minute; // rough proxy, time games are length-agnostic re: difficulty
    case "fractions": return q.denominator;
    case "codeTheRobot": return q.maxSteps;
    case "patternDetective": {
      // difficulty proxy: rule mode with larger numbers = harder
      if (q.mode === "rule") return Math.max.apply(null, q.tiles.filter(function(t){ return typeof t === "number"; }));
      if (q.mode === "find-missing") return 30;
      return 10; // extend mode = easiest
    }
    case "bugHunter": return q.sequence.length + (q.bugs.length > 1 ? 10 : 0) + (q.walls.length > 0 ? 5 : 0);
    case "ifThenRobot": return q.prefix.length + 1 + q.suffix.length;
    case "loopLand": return q.maxBlocks * 10 + q.gridSize;
    case "functionFactory": return (q.callCount || 1) * (q.fnSteps ? q.fnSteps.length : 1);
    case "sortItOut": return q.values ? q.values.length : 3;
    case "trueOrFalse": return q.gate === "NOT" ? 1 : q.gate === "OR" ? 2 : 3;
    case "wordProblems":       return q.answer;
    case "missingNumber":      return q.result;
    case "placeValueExpanded": return q.number;
    case "doublesHalves":      return q.number;
    case "scienceQuiz":        return q.id ? parseInt(q.id.split("-")[1]||"1") : 1;
    case "multiplication": {
      // magnitude = the product being practised, so difficulty tiers track
      // which times-table range the child is working in
      if (q.mode === "missing_factor") return q.product;
      if (q.mode === "commutativity")  return q.product;
      return (q.a || 1) * (q.b || 1);
    }
    default: return 0;
  }
}

function bucketFor(mag, gameType) {
  if (gameType === "fractions") {
    if (mag <= 3) return "easy";
    if (mag <= 5) return "medium";
    return "hard";
  }
  if (gameType === "codeTheRobot") {
    if (mag <= 5) return "easy";
    if (mag <= 7) return "medium";
    return "hard";
  }
  if (gameType === "patternDetective") {
    if (mag <= 10) return "easy";
    if (mag <= 30) return "medium";
    return "hard";
  }
  if (gameType === "bugHunter") {
    if (mag <= 6) return "easy";
    if (mag <= 12) return "medium";
    return "hard";
  }
  if (gameType === "ifThenRobot") {
    if (mag <= 2) return "easy";
    if (mag <= 3) return "medium";
    return "hard";
  }
  if (gameType === "loopLand") {
    if (mag <= 16) return "easy";
    if (mag <= 25) return "medium";
    return "hard";
  }
  if (gameType === "placeValue") {
    var numStr = String(mag);
    if (numStr.indexOf("0") !== -1) return "hard"; // zero placeholders (e.g. 407, 503) trip kids up most
    var hundredsDigit = parseInt(numStr[0], 10);
    if (hundredsDigit <= 4) return "easy";
    return "medium";
  }
  if (gameType === "functionFactory")       { return mag <= 3  ? "easy" : mag <= 6  ? "medium" : "hard"; }
  if (gameType === "sortItOut")             { return mag <= 3  ? "easy" : mag <= 5  ? "medium" : "hard"; }
  if (gameType === "trueOrFalse")           { return mag <= 1  ? "easy" : mag <= 2  ? "medium" : "hard"; }
  if (gameType === "wordProblems")          { return mag <= 10 ? "easy" : mag <= 30 ? "medium" : "hard"; }
  if (gameType === "missingNumber")         { return mag <= 12 ? "easy" : mag <= 32 ? "medium" : "hard"; }
  if (gameType === "placeValueExpanded")    { return mag < 100 ? "easy" : mag < 500 ? "medium" : "hard"; }
  if (gameType === "doublesHalves")         { return mag <= 6  ? "easy" : mag <= 12 ? "medium" : "hard"; }
  if (gameType === "scienceQuiz")           { return mag <= 6  ? "easy" : mag <= 12 ? "medium" : "hard"; }
  if (gameType === "multiplication")        { return mag <= 10 ? "easy" : mag <= 25 ? "medium" : "hard"; }
  if (mag < 20) return "easy";
  if (mag < 50) return "medium";
  return "hard";
}

function questionsForDifficulty(game, difficulty) {
  var qs = game.questions;

  // If questions are pre-bucketed by difficulty (e.g. multiplication), use
  // the bucket directly — no magnitude filtering needed.
  if (qs && !Array.isArray(qs) && (qs.easy || qs.medium || qs.hard)) {
    var bucket = qs[difficulty] || [];
    // Fallback: merge all tiers if the requested one is empty
    if (bucket.length === 0) {
      bucket = (qs.easy || []).concat(qs.medium || []).concat(qs.hard || []);
    }
    return bucket.slice(); // return a copy so shuffle doesn't mutate source
  }

  // Legacy flat-array path used by all other game types
  var all = qs;
  var matched = all.filter(function(q) { return bucketFor(questionMagnitude(game, q), game.type) === difficulty; });
  // Graceful fallback: if a tier is too thin (e.g. a small hand-authored set), pad with the closest-magnitude questions.
  if (matched.length < 6) {
    var sorted = all.slice().sort(function(a, b) {
      return Math.abs(questionMagnitude(game, a) - targetMidpoint(difficulty)) -
             Math.abs(questionMagnitude(game, b) - targetMidpoint(difficulty));
    });
    var matchedIds = {};
    matched.forEach(function(q){ matchedIds[q.id] = true; });
    var i = 0;
    while (matched.length < Math.min(6, all.length) && i < sorted.length) {
      if (!matchedIds[sorted[i].id]) { matched.push(sorted[i]); matchedIds[sorted[i].id] = true; }
      i++;
    }
  }
  return matched;
}

function targetMidpoint(difficulty) {
  if (difficulty === "easy") return 10;
  if (difficulty === "medium") return 35;
  return 80;
}

function renderDifficulty() {
  var game = DATA.games.filter(function(g){ return g.key === state.gameKey; })[0];
  var overrides = DIFFICULTY_INFO_OVERRIDES[game.type];
  var subText = overrides ? overrides.sub : "Pick how big the numbers should be.";

  var html = '<div class="screen difficulty-screen scrollable" data-accent="' + game.accent + '" style="' + buildPlayBackgroundStyle(game.key, "easy") + '">' +
    buildPlaySceneryWatermarkHTML(game.key) +
    '<div class="mode-icon" style="background:var(--' + game.accent + ');color:#fff;margin:0 auto 14px;">' + game.icon + '</div>' +
    '<div class="difficulty-game-label">' + escapeHTML(game.label) + '</div>' +
    '<h2 class="difficulty-title">Choose a difficulty</h2>' +
    '<p class="difficulty-sub">' + subText + '</p>' +
    '<div class="difficulty-grid">';

  ["easy", "medium", "hard"].forEach(function(d) {
    var info = (overrides && overrides[d]) ? overrides[d] : DIFFICULTY_INFO[d];
    var prog = state.progress[game.key];
    var ec = (prog && prog.everCompleted) ? prog.everCompleted : {};
    var byD = (prog && prog.byDifficulty) ? prog.byDifficulty : {};
    var tierDone = !!ec[d];
    var tierBest = byD[d] || 0;
    // PATCH GROUP T — ADAPTIVE DIFFICULTY SUGGESTION
    // Recommend the next logical tier: easy if nothing played yet; the next
    // un-mastered tier (>=85%) once the one before it is mastered; otherwise
    // nudge back to whichever tier wasn't mastered yet.
    var isRecommended = false;
    if (!ec.easy && d === "easy") isRecommended = true;
    else if (ec.easy && (byD.easy || 0) >= 85 && !ec.medium && d === "medium") isRecommended = true;
    else if (ec.medium && (byD.medium || 0) >= 85 && !ec.hard && d === "hard") isRecommended = true;
    else if (ec.easy && (byD.easy || 0) < 85 && d === "easy" && !ec.medium) isRecommended = true;
    html += '<button class="difficulty-card diff-' + d + (tierDone ? ' diff-tier-done' : '') + '" onclick="beginGameWithDifficulty(\'' + d + '\')">' +
      '<div class="difficulty-icon">' + info.icon + '</div>' +
      '<div style="flex:1;"><div class="difficulty-name">' + info.label + (isRecommended ? '<span class="difficulty-recommended-badge">👍 Try this</span>' : '') + '</div>' +
      '<div class="difficulty-range">' + info.range + '</div></div>' +
      (tierDone ? '<div class="difficulty-tier-badge">\u2713 ' + tierBest + '%</div>' : '') +
    '</button>';
  });

  html += '</div>' +
    '<button class="btn btn-ghost difficulty-back" onclick="goToSubject()">⬅ Back to games</button>' +
  '</div>';

  app.innerHTML = html;
}

function beginGameWithDifficulty(difficulty) {
  state.difficulty = difficulty;
  startGame(state.gameKey);
}

function getWorldByKey(key) {
  return ALL_WORLDS.filter(function(w) { return w.key === key; })[0] || null;
}

function flattenWorldLessonKeys(world) {
  var out = [];
  (world.chapters || []).forEach(function(ch) { out = out.concat(ch.keys); });
  return out;
}

function isWorldBossCleared(worldKey) {
  var cleared = storageGet("worldBossCleared", {});
  return !!cleared[worldKey];
}

function markWorldBossCleared(worldKey) {
  var cleared = storageGet("worldBossCleared", {});
  cleared[worldKey] = true;
  storageSet("worldBossCleared", cleared);
}

function isWorldUnlocked(world) {
  if (world.pairedAfter) return isWorldBossCleared(world.pairedAfter); // side kingdom
  var idx = MAIN_WORLDS.indexOf(world);
  if (idx <= 0) return true;
  return isWorldBossCleared(MAIN_WORLDS[idx - 1].key);
}

function getWorldLessonProgress(world) {
  var keys = flattenWorldLessonKeys(world);
  var fullyDone = keys.filter(function(k) { return getGameTierProgress(k).isFullyComplete; }).length;
  var started = keys.filter(function(k) { return getGameTierProgress(k).done >= 1; }).length;
  return { total: keys.length, fullyDone: fullyDone, started: started };
}

function isWorldReadyForBoss(world) {
  if (world.isFinale) return isWorldUnlocked(world); // Sky Kingdom just needs World 5 cleared
  var keys = flattenWorldLessonKeys(world);
  if (!keys.length) return false;
  // Now requires every lesson to be fully 3-starred (Easy+Medium+Hard all
  // done), matching the point-to-point path where a lesson must be fully
  // mastered before the next one unlocks.
  return keys.every(function(k) { return getGameTierProgress(k).isFullyComplete; });
}

// Builds the ordered, point-to-point lesson path for a world: each lesson
// knows its star count (0-3, one per difficulty) and whether it's cleared,
// the current playable stop, or still locked behind an earlier lesson.
function getWorldPathState(world) {
  var keys = flattenWorldLessonKeys(world);
  var path = [];
  var foundCurrent = false;
  keys.forEach(function(key) {
    var tier = getGameTierProgress(key);
    var status;
    if (tier.isFullyComplete) status = "cleared";
    else if (!foundCurrent) { status = "current"; foundCurrent = true; }
    else status = "locked";
    path.push({ key: key, stars: tier.done, status: status });
  });
  return path;
}

// ------------------- Boss Gauntlet engine -------------------
// A gauntlet chains the (now-fixed) single-game Boss Round across every
// lesson in a world, one at a time, tallying a combined result at the end.
function startWorldBossGauntlet(worldKey) {
  var world = getWorldByKey(worldKey);
  if (!world) return;
  var keys = world.isFinale ? world.finalBossKeys : flattenWorldLessonKeys(world);
  if (!keys || !keys.length) return;
  state.returnScreen = "worldDetail";
  state.returnWorldKey = worldKey;
  state.gauntlet = { worldKey: worldKey, keys: keys, idx: 0, stageResults: [] };
  launchGauntletStage();
}

function launchGauntletStage() {
  var g = state.gauntlet;
  if (!g) return;
  startBossLevel(g.keys[g.idx]);
}

function advanceGauntletStage() {
  var g = state.gauntlet;
  if (!g) return;
  g.idx++;
  launchGauntletStage();
}

function finishWorldGauntlet() {
  var g = state.gauntlet;
  if (!g) return;
  var isFirstClear = !isWorldBossCleared(g.worldKey);
  markWorldBossCleared(g.worldKey);
  trackDailyBossBeaten();

  // Reward: a flat Sparkle Power bump every time (so rematches still feed
  // the pet a little), plus a one-time coin milestone bonus the FIRST time
  // this world's boss is ever cleared — rematches lean on the (now capped)
  // per-question boss coins instead, so this can't be farmed on repeat.
  var pet = getPetData();
  pet.sparklePower = (pet.sparklePower || 0) + 60;
  savePetData(pet);
  if (isFirstClear) {
    addCoins(100);
    showSimpleToast("🏆 World Boss milestone! +100 coins");
  }

  state.screen = "gauntletVictory";
  render();
}

function showSimpleToast(text) {
  var el = document.createElement("div");
  el.className = "simple-toast";
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(function() { el.classList.add("show"); }, 10);
  setTimeout(function() {
    el.classList.remove("show");
    setTimeout(function() { el.remove(); }, 300);
  }, 2200);
}


// A game is only "complete" once easy, medium AND hard have each been
// finished at least once. Progress badges everywhere should reflect that,
// and once a game is fully complete it locks until the player resets it.
// ====================================================================
function getGameTierProgress(key) {
  var prog = state.progress[key];
  var ec = (prog && prog.everCompleted) ? prog.everCompleted : {};
  var done = (ec.easy ? 1 : 0) + (ec.medium ? 1 : 0) + (ec.hard ? 1 : 0);
  return {
    done: done,
    total: 3,
    percent: Math.round((done / 3) * 100),
    isFullyComplete: done >= 3,
    started: done > 0
  };
}

// Per-game reset (separate from the "Reset All Progress" nuke in the
// Progress Report). Clears this one game's completion + replay/lastPlayed
// keys so a fully-done game can be unlocked and played again.
function confirmResetGame(key) {
  var game = DATA.games.filter(function(g){ return g.key === key; })[0];
  if (!game) return;
  var overlay = document.createElement("div");
  overlay.className = "reset-modal-overlay";
  overlay.id = "resetGameModalOverlay";
  overlay.innerHTML =
    '<div class="reset-modal">' +
      '<div class="reset-modal-icon">🔒</div>' +
      '<h3 class="reset-modal-title">' + escapeHTML(game.label) + ' is all done!</h3>' +
      '<p class="reset-modal-body">Easy, Medium and Hard have all been completed. Reset this game to play it again from the start?</p>' +
      '<div class="reset-modal-actions">' +
        '<button class="btn btn-ghost" onclick="closeResetGameConfirm()">Cancel</button>' +
        '<button class="btn btn-danger" onclick="performResetGame(\'' + key + '\')">Reset This Game</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
}

function closeResetGameConfirm() {
  var overlay = document.getElementById("resetGameModalOverlay");
  if (overlay) overlay.remove();
}

function performResetGame(key) {
  delete state.progress[key];
  storageSet("progress", state.progress);
  try {
    var keysToRemove = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && (
        k.indexOf("mathQuest_replayCount_" + key + "_") === 0 ||
        k.indexOf("mathQuest_lastPlayed_" + key + "_") === 0
      )) keysToRemove.push(k);
    }
    keysToRemove.forEach(function(k) { localStorage.removeItem(k); });
  } catch (e) {}
  closeResetGameConfirm();
  render();
}

function renderSubject() {
  var subj = SUBJECTS.filter(function(s){ return s.key === state.subject; })[0];
  if (!subj) { state.screen = "home"; render(); return; }

  var gamesByKey = {};
  DATA.games.forEach(function(g) { gamesByKey[g.key] = g; });

  var reviewQueue = storageGet("reviewQueue", {});

  function gameCardHTML(g) {
    var tier = getGameTierProgress(g.key);
    var prog = state.progress[g.key];
    var progLabel, progClass = "";
    if (tier.isFullyComplete) {
      progLabel = "🔒 All done!";
      progClass = " mode-progress-locked";
    } else if (tier.started) {
      progLabel = tier.done + " of " + tier.total + " levels · " + tier.percent + "%";
      progClass = " mode-progress-partial";
    } else if (prog && prog.inProgress && prog.inProgress.questionsCompleted > 0) {
      progLabel = prog.inProgress.questionsCompleted + " of " + prog.inProgress.totalQuestions + " done";
      progClass = " mode-progress-partial";
    } else {
      progLabel = "Not started yet";
      progClass = " mode-progress-empty";
    }
    var cardClick = tier.isFullyComplete
      ? "confirmResetGame('" + g.key + "')"
      : "chooseGame('" + g.key + "')";
    var reviewBadge = "";
    var rq = reviewQueue[g.key];
    if (rq && state.gameKey !== g.key) {
      reviewBadge = '<div class="mode-review-badge">🔁 Review ' + rq.difficulty + ' — missed ' + rq.missedCount + ' last time</div>';
    }
    return '<div class="mode-card" data-accent="' + g.accent + '" onclick="' + cardClick + '">' +
      '<div class="mode-icon" style="background:var(--' + g.accent + ');color:#fff;">' + g.icon + '</div>' +
      '<div class="mode-card-body">' +
        '<div class="mode-label">' + escapeHTML(g.label) + '</div>' +
        '<div class="mode-desc">' + escapeHTML(g.description) + '</div>' +
        reviewBadge +
        '<div class="mode-progress' + progClass + '">' + progLabel + '</div>' +
      '</div>' +
    '</div>';
  }

  var html = '<div class="screen home-screen scrollable">' +
    '<div class="subject-screen-header" style="background:' + subj.color + ';">' +
      '<button class="icon-btn" style="color:#fff;background:rgba(255,255,255,.2);" onclick="state.screen=\'home\';render()">⬅</button>' +
      '<div style="flex:1;text-align:center;">' +
        '<div style="font-size:28px;">' + subj.icon + '</div>' +
        '<div style="font-family:var(--font-display);font-weight:900;font-size:18px;color:#fff;">' + escapeHTML(subj.label) + '</div>' +
      '</div>' +
      '<div style="width:40px;"></div>' +
    '</div>';

  // Coin stats mini row
  html += '<div style="display:flex;justify-content:center;gap:10px;padding:10px 16px 0;">' +
    '<div class="pet-info-chip pet-coin-chip">🪙 ' + gm.coins + ' Coins</div>' +
    '<div class="pet-info-chip" style="background:#F0F8FF;color:#4A5490;">🔥 ' + gm.streak + ' Streak</div>' +
  '</div>';

  // Sections (handles both sections[] format and flat keys[] format)
  var subjSections2 = subj.sections || [{ label: subj.label, keys: subj.keys || [] }];
  subjSections2.forEach(function(section) {
    html += '<div class="home-section-header">' + section.label + '</div>';
    html += '<div class="mode-grid">';
    section.keys.forEach(function(key) {
      var g = gamesByKey[key];
      if (g) html += gameCardHTML(g);
    });
    html += '</div>';
  });

  html += '</div>';
  app.innerHTML = html;
}

  if (!subj) return;
  var html = '<div class="screen home-screen scrollable">' +
    '<div class="subject-screen-header" style="background:#bbb;">' +
      '<button class="icon-btn" style="color:#fff;background:rgba(255,255,255,.2);" onclick="state.screen=\'home\';render()">⬅</button>' +
      '<div style="flex:1;text-align:center;">' +
        '<div style="font-size:28px;">' + subj.icon + '</div>' +
        '<div style="font-family:var(--font-display);font-weight:900;font-size:18px;color:#fff;">' + escapeHTML(subj.label) + '</div>' +
      '</div>' +
      '<div style="width:40px;"></div>' +
    '</div>' +

// ====================================================================
// WINDING TRAIL — shared geometry for the campaign-map look (used by both
// the main Journey Map and the in-world lesson path). Nodes snake left-
// right down the screen along a sine wave; a smooth SVG road is drawn
// through their centers, Age-of-Empires-campaign-select style.
// ====================================================================
function computeTrailPositions(n, slotHeight) {
  var positions = [];
  for (var i = 0; i < n; i++) {
    var x = 50 + 30 * Math.sin(i * 1.05 + 0.4);
    x = Math.max(18, Math.min(82, x));
    positions.push({ x: x, y: i * slotHeight + slotHeight * 0.6 });
  }
  return positions;
}

function buildTrailPathD(positions) {
  if (positions.length < 2) return "";
  var d = "M " + positions[0].x + " " + positions[0].y;
  for (var i = 1; i < positions.length; i++) {
    var p0 = positions[i - 1], p1 = positions[i];
    var midY = (p0.y + p1.y) / 2;
    d += " C " + p0.x + " " + midY + ", " + p1.x + " " + midY + ", " + p1.x + " " + p1.y;
  }
  return d;
}

function buildTrailRoadSVG(positions, totalHeight) {
  var d = buildTrailPathD(positions);
  return '<svg class="trail-road-svg" viewBox="0 0 100 ' + totalHeight + '" preserveAspectRatio="none" width="100%" height="' + totalHeight + '">' +
    '<path d="' + d + '" class="trail-road-shadow" vector-effect="non-scaling-stroke" transform="translate(0,3)"/>' +
    '<path d="' + d + '" class="trail-road-base" vector-effect="non-scaling-stroke"/>' +
    '<path d="' + d + '" class="trail-road-dash" vector-effect="non-scaling-stroke"/>' +
  '</svg>';
}

// Soft blurred hill silhouettes behind the trail, purely for depth — a
// couple of overlapping ellipses tinted with the world's own color.
function buildTrailHillsHTML(worldColor, totalHeight) {
  var out = "";
  var count = Math.max(3, Math.round(totalHeight / 260));
  for (var i = 0; i < count; i++) {
    var y = Math.round((i / count) * totalHeight) + (i % 2 === 0 ? 10 : 70);
    var x = i % 2 === 0 ? 6 : 58;
    var w = 150 + (i % 3) * 35;
    out += '<div class="trail-hill" style="left:' + x + '%;top:' + y + 'px;width:' + w + 'px;height:' + Math.round(w * 0.55) + 'px;background:' + worldColor + ';"></div>';
  }
  return out;
}

// Fog of war: everything past the current stop is softly obscured, just
// like an unrevealed section of an old campaign map.
function buildTrailFogHTML(positions, currentIndex, totalHeight, slotHeight) {
  if (currentIndex < 0 || currentIndex >= positions.length - 1) return "";
  var fogTop = positions[currentIndex].y + slotHeight * 0.42;
  var fogHeight = totalHeight - fogTop;
  if (fogHeight <= 20) return "";
  var next = positions[currentIndex + 1];
  var cloud1x = Math.max(12, Math.min(88, next.x - 16));
  var cloud2x = Math.max(12, Math.min(88, next.x + 16));
  return '<div class="trail-fog" style="top:' + fogTop + 'px;height:' + fogHeight + 'px;">' +
    '<div class="trail-fog-cloud" style="left:' + cloud1x + '%;top:10px;">☁️</div>' +
    '<div class="trail-fog-cloud" style="left:' + cloud2x + '%;top:52px;">☁️</div>' +
  '</div>';
}

var TRAIL_SCENERY = {
  village: ["🌻", "🌾", "🐓"], forest: ["🌲", "🍄", "🦋"], bridge: ["🌊", "⛵", "🪙"],
  castle: ["💎", "🕯️", "🏳️"], mountain: ["☁️", "🪨", "🤖"], sky: ["⭐", "☁️", "🌈"],
  greenwood: ["🌿", "🐛", "🍃"], library: ["📚", "🖋️", "🕮"], observatory: ["✨", "🌙", "🪐"],
  atlas: ["🧭", "🏔️", "🌍"], studio: ["🎨", "🎵", "🖌️"]
};

function buildTrailSceneryHTML(worldKey, positions, totalHeight) {
  var flavors = TRAIL_SCENERY[worldKey] || ["✨"];
  var html = "";
  for (var i = 0; i < positions.length - 1; i++) {
    var p0 = positions[i], p1 = positions[i + 1];
    var midX = (p0.x + p1.x) / 2;
    var side = midX > 50 ? -1 : 1; // decorate the emptier side of the curve
    var offset = 16 + (i % 3) * 4;
    var sx = Math.max(6, Math.min(94, midX + side * offset));
    var sy = (p0.y + p1.y) / 2 + (i % 2 === 0 ? -10 : 10);
    var emoji = flavors[i % flavors.length];
    html += '<div class="trail-scenery" style="left:' + sx + '%;top:' + sy + 'px;">' + emoji + '</div>';
  }
  return html;
}

function renderPetScreen() {
  trackDailyPetVisit();
  var pet = getPetData();
  var stage = getPetStageData(pet);
  var sp = pet.sparklePower || 0;
  var inv = pet.foodInventory || {};
  var unlockedColors = pet.unlockedColors || ["lavender","pink","mint","sky","sunshine"];

  // --- Evolution ready? ---
  var evoReady = stage.sparkleToNext && sp >= stage.sparkleToNext;

  // --- Sparkle Power bar calc ---
  var spPct = 0, spLabel = "";
  if (stage.sparkleToNext) {
    // Find previous stage threshold to compute bar-within-stage progress
    var prevSP = 0;
    if (pet.stageIndex > 0) {
      // sum all previous stage thresholds
      var accSP = 0;
      for (var si = 0; si < pet.stageIndex; si++) accSP += (SPARKLE_STAGES[si].sparkleToNext || 0);
      prevSP = accSP;
    }
    var stageSpan = stage.sparkleToNext;
    var stageInto = sp - prevSP;
    spPct = Math.max(0, Math.min(100, Math.round((stageInto / stageSpan) * 100)));
    if (evoReady) spPct = 100;
    spLabel = sp + " / " + (prevSP + stageSpan) + " ✨";
  } else {
    spPct = 100;
    spLabel = sp + " ✨ MAX";
  }

  var html = '<div class="screen pet-screen scrollable">' +
    '<div class="trophy-header">' +
      '<button class="icon-btn" onclick="goToSubject()">⬅</button>' +
      '<h2 class="trophy-title">✨ My Sparkle Pet</h2>' +
    '</div>';

  // Pet visual
  html += buildPetVisualHTML("pet-visual-large");

  // Name input
  html += '<div class="pet-name-row">';
  html += '<input type="text" id="petNameInput" class="pet-name-input" maxlength="16" placeholder="' + escapeHTML(stage.name) + '" value="' + escapeHTML(pet.name || "") + '">';
  html += '</div>';

  html += '<div class="pet-stage-label">Stage ' + stage.stage + ' · ' + escapeHTML(stage.name) + '</div>';

  // Sparkle Power bar
  html += '<div class="sparkle-bar-wrap">';
  html += '<div class="sparkle-bar-header"><span>✨ Sparkle Power</span><span>' + spLabel + '</span></div>';
  html += '<div class="sparkle-bar-track"><div class="sparkle-bar-fill" style="width:' + spPct + '%;"></div></div>';
  html += '</div>';
  if (!evoReady && stage.sparkleToNext) {
    var nextStageName = SPARKLE_STAGES[pet.stageIndex + 1] ? SPARKLE_STAGES[pet.stageIndex + 1].name : "";
    html += '<p class="sparkle-bar-note">Feed your pet to fill the bar and unlock ' + escapeHTML(nextStageName) + '!</p>';
  }

  // Evolution ready banner
  if (evoReady) {
    var nextSt = SPARKLE_STAGES[pet.stageIndex + 1];
    html += '<div class="evo-ready-banner">';
    html += '<div class="evo-ready-title">✨ READY TO EVOLVE! ✨</div>';
    if (nextSt && nextSt.reward) {
      html += '<div class="evo-ready-reward">Next reward: ' + escapeHTML(nextSt.reward) + '</div>';
    }
    html += '<button class="btn-evolve" onclick="tryEvolve()">🌟 Evolve Now!</button>';
    html += '</div>';
  }

  // Next stage reward preview (when not ready yet)
  if (!evoReady && stage.sparkleToNext) {
    var previewStage = SPARKLE_STAGES[pet.stageIndex + 1];
    if (previewStage && previewStage.reward) {
      html += '<p class="sparkle-bar-note" style="color:var(--violet);font-weight:800;">Next reward: ' + escapeHTML(previewStage.reward) + '</p>';
    }
  }

  // --- EVOLUTION GALLERY — every stage your pet will pass through, so kids
  // can see exactly what they're working toward without the roaming
  // companion having to fake a form the pet hasn't actually reached yet.
  html += '<p class="pet-section-label">Evolution Path</p><div class="evo-gallery">';
  SPARKLE_STAGES.forEach(function(s, i) {
    var reached = i <= pet.stageIndex;
    var isCurrent = i === pet.stageIndex;
    html += '<div class="evo-gallery-item' + (reached ? '' : ' evo-gallery-locked') + (isCurrent ? ' evo-gallery-current' : '') + '">' +
      '<div class="evo-gallery-emoji">' + (reached ? s.emoji : '❔') + '</div>' +
      '<div class="evo-gallery-name">' + (reached ? escapeHTML(s.name.replace(" Sparkle Pet", "")) : "???") + '</div>' +
      (isCurrent ? '<div class="evo-gallery-you-tag">YOU</div>' : '') +
    '</div>';
    if (i < SPARKLE_STAGES.length - 1) html += '<div class="evo-gallery-arrow">→</div>';
  });
  html += '</div>';

  // Info row: coins + food inventory count
  var totalFood = Object.keys(inv).reduce(function(t, k) { return t + (inv[k] || 0); }, 0);
  html += '<div class="pet-info-row">';
  html += '<div class="pet-info-chip pet-coin-chip">🪙 ' + gm.coins + ' Coins</div>';
  html += '<div class="pet-info-chip pet-inv-chip">🍎 ' + totalFood + ' Food</div>';
  html += '</div>';

  // --- FOOD INVENTORY (feed buttons) ---
  var hasFoodInInv = Object.keys(SPARKLE_FOOD).some(function(k) { return (inv[k] || 0) > 0; });
  if (hasFoodInInv) {
    html += '<p class="pet-section-label">Feed Your Pet</p>';
    html += '<p class="pet-section-sub">Tap food to give it to your pet</p>';
    html += '<div class="pet-inv-grid">';
    Object.keys(SPARKLE_FOOD).forEach(function(key) {
      var food = SPARKLE_FOOD[key];
      var count = inv[key] || 0;
      if (count < 1) return;
      html += '<div class="pet-inv-item">';
      html += '<span class="pet-inv-icon">' + food.icon + '</span>';
      html += '<div class="pet-inv-info"><div class="pet-inv-name">' + escapeHTML(food.name) + '</div><div class="pet-inv-count">x' + count + ' · +' + food.power + ' ✨</div></div>';
      html += '<button class="pet-inv-feed-btn" data-feed="' + key + '">Feed!</button>';
      html += '</div>';
    });
    html += '</div>';
  }

  // --- FOOD SHOP ---
  html += '<p class="pet-section-label">Food Shop</p>';
  html += '<p class="pet-section-sub">Buy food with coins, then feed your pet!</p>';
  html += '<div class="pet-food-grid">';
  Object.keys(SPARKLE_FOOD).forEach(function(key) {
    var food = SPARKLE_FOOD[key];
    var canAfford = gm.coins >= food.cost;
    var owned = inv[key] || 0;
    html += '<button class="pet-food-item' + (owned > 0 ? ' pet-food-owned' : '') + '" data-buy="' + key + '"' + (canAfford ? '' : ' disabled') + '>';
    html += '<span class="pet-food-icon">' + food.icon + '</span>';
    html += '<span class="pet-food-name">' + escapeHTML(food.name) + (owned > 0 ? ' (x' + owned + ')' : '') + '</span>';
    html += '<span class="pet-food-cost">🪙 ' + food.cost + '</span>';
    html += '<span class="pet-food-power">+' + food.power + ' ✨</span>';
    html += '</button>';
  });
  html += '</div>';

  // --- COLOR PICKER ---
  html += '<p class="pet-section-label">Pick a Color</p>';
  html += '<div class="pet-color-row">';
  Object.keys(PET_COLORS).forEach(function(key) {
    var c = PET_COLORS[key];
    var isUnlocked = unlockedColors.indexOf(key) !== -1;
    var selected = pet.color === key;
    var bg = c.hex.startsWith("linear") ? c.hex : c.hex;
    if (isUnlocked) {
      html += '<button class="pet-color-swatch' + (selected ? ' pet-color-selected' : '') + '" style="background:' + bg + ';" data-color="' + key + '" title="' + escapeHTML(c.name) + '"></button>';
    } else {
      html += '<button class="pet-color-swatch" style="background:#ccc;opacity:.4;cursor:not-allowed;" disabled title="Locked — evolve to unlock"></button>';
    }
  });
  html += '</div>';

  // --- ACCESSORY SHOP ---
  html += '<p class="pet-section-label">Accessory Shop</p>';
  html += '<p class="pet-section-sub">Dress up your pet with coins!</p>';
  html += '<div class="pet-shop-grid">';
  Object.keys(PET_ACCESSORIES).forEach(function(key) {
    var acc = PET_ACCESSORIES[key];
    var owned = (pet.ownedAccessories || []).indexOf(key) !== -1;
    var equipped = (pet.equipped || []).indexOf(key) !== -1;
    var canAfford = gm.coins >= acc.cost;
    var isFree = acc.cost === 0 && acc.evolutionReward;

    var cls = "pet-shop-item";
    if (equipped) cls += " pet-shop-equipped";
    else if (owned) cls += " pet-shop-owned";
    else if (!canAfford && !isFree) cls += " pet-shop-locked";

    var costText = owned
      ? (equipped ? "Equipped ✓" : "Tap to wear")
      : (isFree ? "🎁 Evolution reward" : "🪙 " + acc.cost);

    html += '<button class="' + cls + '" data-accessory="' + key + '"' + (!owned && !canAfford && !isFree ? ' disabled' : '') + '>';
    html += '<span class="pet-shop-icon">' + acc.icon + '</span>';
    html += '<span class="pet-shop-name">' + escapeHTML(acc.name) + '</span>';
    html += '<span class="pet-shop-cost">' + costText + '</span>';
    html += '</button>';
  });
  html += '</div>';

  html += '</div>'; // end screen
  app.innerHTML = html;

  // --- Wire interactions ---
  var nameInput = document.getElementById("petNameInput");
  if (nameInput) {
    nameInput.onchange = function() {
      var p = getPetData();
      p.name = nameInput.value.trim().slice(0, 16);
      savePetData(p);
    };
  }

  // Feed buttons
  document.querySelectorAll("[data-feed]").forEach(function(btn) {
    btn.onclick = function() { feedPet(this.getAttribute("data-feed")); };
  });

  // Buy food buttons
  document.querySelectorAll("[data-buy]").forEach(function(btn) {
    btn.onclick = function() { buyFood(this.getAttribute("data-buy")); };
  });

  // Color swatches
  document.querySelectorAll(".pet-color-swatch:not(:disabled)").forEach(function(btn) {
    btn.onclick = function() {
      var p = getPetData();
      p.color = this.getAttribute("data-color");
      savePetData(p);
      renderPetScreen();
    };
  });

  // Accessory shop
  document.querySelectorAll(".pet-shop-item:not(:disabled)").forEach(function(btn) {
    btn.onclick = function() {
      var key = this.getAttribute("data-accessory");
      if (!key) return;
      var acc = PET_ACCESSORIES[key];
      var p = getPetData();
      var owned = (p.ownedAccessories || []).indexOf(key) !== -1;

      if (!owned) {
        var isFree = acc.cost === 0 && acc.evolutionReward;
        if (!isFree) {
          if (gm.coins < acc.cost) return;
          gm.coins -= acc.cost;
          storageSet("coins", gm.coins);
        }
        if (!p.ownedAccessories) p.ownedAccessories = [];
        if (!p.equipped) p.equipped = [];
        p.ownedAccessories.push(key);
        p.equipped.push(key);
        SFX.achievement();
      } else {
        var idx = (p.equipped || []).indexOf(key);
        if (idx === -1) p.equipped.push(key);
        else p.equipped.splice(idx, 1);
      }
      savePetData(p);
      renderPetScreen();
    };
  });
}

// PATCH GROUP Q — PROGRESS REPORT (item 5)
// A parent/teacher-facing summary: accuracy per mode broken out by
// difficulty tier (rather than one rolling best percent), plus a short
// recent-session log, so practice data is actually actionable.
// ====================================================================
function renderProgressReport() {
  var history = storageGet("sessionHistory", []);
  var recent = history.slice(Math.max(0, history.length - 10)).reverse();

  var html = '<div class="screen report-screen scrollable">' +
    '<div class="trophy-header">' +
      '<button class="icon-btn" onclick="goToSubject()">⬅</button>' +
      '<h2 class="trophy-title">📊 Progress Report</h2>' +
    '</div>' +
    '<p class="report-sub">Best score per mode, by difficulty.</p>' +
    '<div class="report-mode-list">';

  DATA.games.forEach(function(g) {
    var prog = state.progress[g.key];
    var byD = (prog && prog.byDifficulty) ? prog.byDifficulty : {};
    var tier = getGameTierProgress(g.key);
    html += '<div class="report-mode-row">' +
      '<div class="report-mode-label"><span class="report-mode-icon" style="background:var(--' + g.accent + ');">' + g.icon + '</span>' + escapeHTML(g.label) +
        (tier.isFullyComplete ? '<span class="report-mode-complete-badge">🔒 Complete</span>' : '') +
      '</div>' +
      '<div class="report-tier-bars">' +
        ['easy', 'medium', 'hard'].map(function(d) {

          var label = d === "easy" ? "E" : d === "medium" ? "M" : "H";
          return '<div class="report-tier-bar"><div class="report-tier-track"><div class="report-tier-fill" style="width:' + pct + '%;background:var(--' + g.accent + ');"></div></div><span class="report-tier-label">' + label + ' ' + pct + '%</span></div>';
        }).join('') +
      '</div>' +
      (prog && prog.inProgress && prog.inProgress.questionsCompleted > 0
        ? '<div class="report-inprogress-note">⏳ ' + prog.inProgress.questionsCompleted + ' of ' + prog.inProgress.totalQuestions + ' questions in an unfinished ' + prog.inProgress.difficulty + ' round</div>'
        : '') +
      (tier.isFullyComplete
        ? '<button class="report-mode-reset-btn" onclick="confirmResetGame(\'' + g.key + '\')">↺ Reset this game to unlock it</button>'
        : '') +
    '</div>';
  });

  html += '</div>';

  if (recent.length > 0) {
    html += '<p class="report-sub">Recent sessions</p><div class="report-history-list">';
    recent.forEach(function(h) {
      var d = new Date(h.timestamp);
      var dateStr = (d.getMonth() + 1) + "/" + d.getDate();
      html += '<div class="report-history-row">' +
        '<span class="report-history-game">' + escapeHTML(h.gameLabel) + ' (' + escapeHTML(h.difficulty) + ')</span>' +
        '<span class="report-history-score">' + h.score + '/' + h.total + ' · ' + h.percent + '%</span>' +
        '<span class="report-history-date">' + dateStr + '</span>' +
      '</div>';
    });
