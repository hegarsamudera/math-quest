// ====================================================================
// CODE THE ROBOT RENDERER
// A simple "intro to coding" puzzle: the kid taps direction arrows to build
// a sequence of moves, then presses Run to watch the robot follow them step
// by step on a grid. Correct = robot ends exactly on the pizza's cell.
// Mirrors the same eq-card / sticky-footer pattern as the other games, but
// swaps the numpad+CheckAnswer footer for direction-arrows+Run.
// ====================================================================
// Finds one valid shortest path from q.start to q.goal (avoiding walls) via BFS,
// and renders it as a compact arrow-emoji string for the "Correct answer" reveal
// shown after a second miss — e.g. "➡️➡️⬇️" — so it's a concrete worked example,
// not just a vague description.
function solveShortestPathArrows(q, wallSet) {
  var gridSize = q.gridSize;
  var DIRLIST = [
    { key: "up", dx: 0, dy: -1, arrow: "⬆️" },
    { key: "down", dx: 0, dy: 1, arrow: "⬇️" },
    { key: "left", dx: -1, dy: 0, arrow: "⬅️" },
    { key: "right", dx: 1, dy: 0, arrow: "➡️" }
  ];
  var startKey = q.start.x + "," + q.start.y;
  var goalKey = q.goal.x + "," + q.goal.y;
  var visited = {};
  visited[startKey] = true;
  var queue = [{ x: q.start.x, y: q.start.y, path: [] }];
  var qi = 0;
  while (qi < queue.length) {
    var cur = queue[qi++];
    var curKey = cur.x + "," + cur.y;
    if (curKey === goalKey) return cur.path.map(function(d){ return d.arrow; }).join("");
    for (var i = 0; i < DIRLIST.length; i++) {
      var d = DIRLIST[i];
      var nx = cur.x + d.dx, ny = cur.y + d.dy;
      var nKey = nx + "," + ny;
      if (nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize) continue;
      if (wallSet[nKey] || visited[nKey]) continue;
      visited[nKey] = true;
      queue.push({ x: nx, y: ny, path: cur.path.concat([d]) });
    }
  }
  return "—"; // no path exists (shouldn't happen with authored puzzles, but fail safe)
}

RENDERERS.codeTheRobot = {
  mount: function(stage, q, ctx) {
    var gridSize = q.gridSize;
    var wallSet = {};
    (q.walls || []).forEach(function(w) { wallSet[w.x + "," + w.y] = true; });
    ctx.correctAnswer = solveShortestPathArrows(q, wallSet);
    ctx.hintText = "Count the squares between the robot and the slice, and watch out for any walls 🧱 in the way.";

    var sequence = [];     // array of "up"/"down"/"left"/"right"
    var running = false;
    var resolved = false;

    var DIRS = {
      up:    { dx: 0, dy: -1, arrow: "⬆️" },
      down:  { dx: 0, dy: 1,  arrow: "⬇️" },
      left:  { dx: -1, dy: 0, arrow: "⬅️" },
      right: { dx: 1, dy: 0,  arrow: "➡️" }
    };

    function cellSize() {
      // Keep the whole grid comfortably inside the play area on short phones.
      var vh = window.innerHeight || 640;
      if (vh <= 700) return gridSize >= 5 ? 34 : 40;
      return gridSize >= 5 ? 52 : 60;
    }

    function buildGridHTML(robotPos) {
      var cs = cellSize();
      var html = '<div class="robot-grid" style="grid-template-columns:repeat(' + gridSize + ', ' + cs + 'px); grid-template-rows:repeat(' + gridSize + ', ' + cs + 'px);">';
      for (var y = 0; y < gridSize; y++) {
        for (var x = 0; x < gridSize; x++) {
          var isWall = !!wallSet[x + "," + y];
          var isGoal = (x === q.goal.x && y === q.goal.y);
          var isRobot = (x === robotPos.x && y === robotPos.y);
          var cls = "robot-cell" + (isWall ? " robot-wall" : "");
          var content = "";
          if (isWall) content = "🧱";
          else if (isRobot) content = '<span class="robot-emoji">🤖</span>';
          else if (isGoal) content = '<span class="goal-emoji">🍕</span>';
          html += '<div class="' + cls + '">' + content + '</div>';
        }
      }
      html += '</div>';
      return html;
    }

    function buildSequenceHTML() {
      if (sequence.length === 0) {
        return '<span class="seq-empty">Tap arrows below to add steps</span>';
      }
      return sequence.map(function(dir, i) {
        return '<span class="seq-chip" data-seq-idx="' + i + '">' + DIRS[dir].arrow + '</span>';
      }).join("");
    }

    function render_() {
      var html = '<div class="eq-card" style="padding:14px 12px;">';
      html += '<h2 style="margin-bottom:4px;">Code the path! 🍕</h2>';
      html += '<p class="robot-subtitle" style="color:var(--ink-soft);margin-bottom:10px;">Build a path, then press Run</p>';
      html += '<div class="robot-grid-wrap">' + buildGridHTML(q.start) + '</div>';
      html += '<div class="seq-row" id="seqRow">' + buildSequenceHTML() + '</div>';
      html += '<div class="robot-controls" id="robotControls">';
      html += '<div class="dpad">';
      html += '<button class="dpad-btn dpad-up" data-dir="up">⬆️</button>';
      html += '<button class="dpad-btn dpad-left" data-dir="left">⬅️</button>';
      html += '<button class="dpad-btn dpad-right" data-dir="right">➡️</button>';
      html += '<button class="dpad-btn dpad-down" data-dir="down">⬇️</button>';
      html += '</div>';
      html += '<div class="robot-action-row">';
      html += '<button class="btn btn-ghost" id="undoBtn" style="flex:1;">↩️ Undo</button>';
      html += '<button class="btn btn-ghost" id="clearBtn" style="flex:1;">🔄 Clear</button>';
      html += '</div>';
      html += '</div>';
      html += '<button class="btn btn-primary" id="checkBtn" style="margin-top:14px; width:100%; max-width:260px;"' + (sequence.length === 0 ? ' disabled' : '') + '>▶ Run</button>';
      html += '</div>';

      stage.innerHTML = html;
      wireUp();
    }

    function wireUp() {
      var dpadBtns = stage.querySelectorAll(".dpad-btn");
      dpadBtns.forEach(function(btn) {
        btn.onclick = function() {
          if (running || resolved) return;
          if (sequence.length >= q.maxSteps) return;
          sequence.push(this.getAttribute("data-dir"));
          render_();
        };
      });

      document.getElementById("undoBtn").onclick = function() {
        if (running || resolved) return;
        sequence.pop();
        render_();
      };
      document.getElementById("clearBtn").onclick = function() {
        if (running || resolved) return;
        sequence = [];
        render_();
      };

      var checkBtn = document.getElementById("checkBtn");
      checkBtn.onclick = function() {
        if (running || resolved || sequence.length === 0) return;
        runSequence();
      };
    }

    function setControlsDisabled(disabled) {
      var controls = stage.querySelectorAll(".dpad-btn, #undoBtn, #clearBtn, #checkBtn");
      controls.forEach(function(el) { el.disabled = disabled; });
    }

    function runSequence() {
      running = true;
      setControlsDisabled(true);

      var pos = { x: q.start.x, y: q.start.y };
      var i = 0;
      var hitWallOrEdge = false;
      var skipRequested = false;
      var stepDelay = 380;

      // PATCH GROUP R — SKIP-AHEAD ON RETRY
      // Only the retry run (after a first miss) gets a skip button: the very
      // first run is part of the learning moment, but watching the *same*
      // path replay again after a miss is just dead time for the child.
      if (state.attemptUsed) {
        var skipBtn = document.createElement("button");
        skipBtn.className = "btn btn-ghost skip-replay-btn";
        skipBtn.textContent = "⏩ Skip";
        skipBtn.onclick = function() {
          skipRequested = true;
          stepDelay = 40;
          skipBtn.disabled = true;
          skipBtn.style.opacity = "0.4";
        };
        var stageHost = stage.querySelector(".robot-grid-wrap");
        if (stageHost && stageHost.parentNode) {
          stageHost.parentNode.insertBefore(skipBtn, stageHost.nextSibling);
        }
      }

      function step() {
        if (i >= sequence.length) {
          finish();
          return;
        }
        var d = DIRS[sequence[i]];
        var nx = pos.x + d.dx, ny = pos.y + d.dy;
        var blocked = nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize || wallSet[nx + "," + ny];
        if (!blocked) {
          pos = { x: nx, y: ny };
        } else {
          hitWallOrEdge = true;
        }
        var gridWrap = stage.querySelector(".robot-grid-wrap");
        if (gridWrap) gridWrap.innerHTML = buildGridHTML(pos);
        i++;
        setTimeout(step, skipRequested ? 40 : stepDelay);
      }

      function finish() {
        running = false;
        var skipBtnEl = stage.querySelector(".skip-replay-btn");
        if (skipBtnEl) skipBtnEl.remove();
        var reachedGoal = (pos.x === q.goal.x && pos.y === q.goal.y) && !hitWallOrEdge;

        // handleAnswer() flips state.attemptUsed false -> true on the *first* miss
        // and deliberately leaves inputs enabled so the child can retry immediately
        // (see its own comment to that effect). We mirror that here: only treat
        // this run as final when it's correct, or it's already a second miss.
        var isFinalAttempt = reachedGoal || state.attemptUsed;
        resolved = isFinalAttempt;

        if (!reachedGoal && !isFinalAttempt) {
          // First miss: let the child fix their path. Reset the robot back to
          // the start, clear the old sequence, and re-enable all controls.
          setTimeout(function() {
            sequence = [];
            render_();
            ctx.onCheck(false);
          }, 250);
          return;
        }

        setTimeout(function() { ctx.onCheck(reachedGoal); }, 250);
      }

      step();
    }

    render_();
  }
};

// ====================================================================
// LOOP LAND RENDERER
// Introduces repetition/loops: instead of tapping one arrow per step, the
// child picks a direction + a count and adds a single "repeat" block
// (e.g. ➡️ ×4) to the program. Checking the program expands every block
// into its individual moves and animates the robot exactly like
// codeTheRobot — correctness is purely positional (did it reach the goal
// without hitting a wall/edge), not a fixed-sequence match, since more
// than one valid block arrangement can solve a given puzzle.
// ====================================================================
RENDERERS.loopLand = {
  mount: function(stage, q, ctx) {
    var gridSize = q.gridSize;
    var wallSet = {};
    (q.walls || []).forEach(function(w) { wallSet[w.x + "," + w.y] = true; });
    ctx.correctAnswer = solveShortestPathArrows(q, wallSet);
    ctx.hintText = "Figure out how many squares to move in one direction, then turn — one repeat block can cover the whole stretch.";

    var DIRS = {
      up:    { dx: 0, dy: -1, arrow: "⬆️" },
      down:  { dx: 0, dy: 1,  arrow: "⬇️" },
      left:  { dx: -1, dy: 0, arrow: "⬅️" },
      right: { dx: 1, dy: 0,  arrow: "➡️" }
    };

    var blocks = [];        // array of { dir: "up"/"down"/"left"/"right", count: 1-6 }
    var pendingDir = null;  // direction currently selected in the picker, before count is chosen
    var pendingCount = 1;   // count currently dialed in for the pending block
    var running = false;
    var resolved = false;

    function cellSize() {
      // Keep the whole grid comfortably inside the play area on short phones.
      var vh = window.innerHeight || 640;
      if (vh <= 700) return gridSize >= 5 ? 34 : 40;
      return gridSize >= 5 ? 52 : 60;
    }

    function buildGridHTML(robotPos) {
      var cs = cellSize();
      var html = '<div class="robot-grid" style="grid-template-columns:repeat(' + gridSize + ', ' + cs + 'px); grid-template-rows:repeat(' + gridSize + ', ' + cs + 'px);">';
      for (var y = 0; y < gridSize; y++) {
        for (var x = 0; x < gridSize; x++) {
          var isWall = !!wallSet[x + "," + y];
          var isGoal = (x === q.goal.x && y === q.goal.y);
          var isRobot = (x === robotPos.x && y === robotPos.y);
          var cls = "robot-cell" + (isWall ? " robot-wall" : "");
          var content = "";
          if (isWall) content = "🧱";
          else if (isRobot) content = '<span class="robot-emoji">🤖</span>';
          else if (isGoal) content = '<span class="goal-emoji">🍕</span>';
          html += '<div class="' + cls + '">' + content + '</div>';
        }
      }
      html += '</div>';
      return html;
    }

    function buildBlocksHTML() {
      if (blocks.length === 0) {
        return '<span class="seq-empty">Pick a direction and a number below, then add a block</span>';
      }
      return blocks.map(function(b, i) {
        return '<span class="loop-block-chip" data-block-idx="' + i + '">' + DIRS[b.dir].arrow + ' ×' + b.count + '</span>';
      }).join("");
    }

    function buildPickerHTML() {
      var html = '<div class="loop-picker">';
      html += '<div class="loop-dir-row">';
      ["up", "left", "right", "down"].forEach(function(d) {
        html += '<button class="loop-dir-btn' + (pendingDir === d ? " loop-dir-selected" : "") + '" data-dir="' + d + '">' + DIRS[d].arrow + '</button>';
      });
      html += '</div>';
      html += '<div class="loop-count-row">';
      html += '<button class="loop-count-btn" id="loopCountMinus">−</button>';
      html += '<span class="loop-count-display">×' + pendingCount + '</span>';
      html += '<button class="loop-count-btn" id="loopCountPlus">+</button>';
      html += '<button class="btn btn-primary loop-add-btn" id="loopAddBtn"' + (pendingDir ? '' : ' disabled') + '>+ Add Block</button>';
      html += '</div>';
      html += '</div>';
      return html;
    }

    function render_() {
      var html = '<div class="eq-card" style="padding:14px 12px;">';
      html += '<h2 style="margin-bottom:4px;">Build a repeat program! 🔁</h2>';
      html += '<p class="robot-subtitle" style="color:var(--ink-soft);margin-bottom:10px;">Use repeat blocks to cover long stretches in one go</p>';
      html += '<div class="robot-grid-wrap">' + buildGridHTML(q.start) + '</div>';
      html += '<div class="seq-row" id="seqRow">' + buildBlocksHTML() + '</div>';
      html += buildPickerHTML();
      html += '<div class="robot-action-row">';
      html += '<button class="btn btn-ghost" id="undoBtn" style="flex:1;">↩️ Undo</button>';
      html += '<button class="btn btn-ghost" id="clearBtn" style="flex:1;">🔄 Clear</button>';
      html += '</div>';
      html += '<button class="btn btn-primary" id="checkBtn" style="margin-top:14px; width:100%; max-width:260px;"' + (blocks.length === 0 ? ' disabled' : '') + '>▶ Run</button>';
      html += '</div>';

      stage.innerHTML = html;
      wireUp();
    }

    function wireUp() {
      stage.querySelectorAll(".loop-dir-btn").forEach(function(btn) {
        btn.onclick = function() {
          if (running || resolved) return;
          pendingDir = this.getAttribute("data-dir");
          render_();
        };
      });

      var minusBtn = document.getElementById("loopCountMinus");
      var plusBtn = document.getElementById("loopCountPlus");
      if (minusBtn) minusBtn.onclick = function() {
        if (running || resolved) return;
        pendingCount = Math.max(1, pendingCount - 1);
        render_();
      };
      if (plusBtn) plusBtn.onclick = function() {
        if (running || resolved) return;
        pendingCount = Math.min(6, pendingCount + 1);
        render_();
      };

      var addBtn = document.getElementById("loopAddBtn");
      if (addBtn) addBtn.onclick = function() {
        if (running || resolved || !pendingDir) return;
        if (blocks.length >= q.maxBlocks) return;
        blocks.push({ dir: pendingDir, count: pendingCount });
        pendingDir = null;
        pendingCount = 1;
        render_();
      };

      document.getElementById("undoBtn").onclick = function() {
        if (running || resolved) return;
        blocks.pop();
        render_();
      };
      document.getElementById("clearBtn").onclick = function() {
        if (running || resolved) return;
        blocks = [];
        render_();
      };

      var checkBtn = document.getElementById("checkBtn");
      checkBtn.onclick = function() {
        if (running || resolved || blocks.length === 0) return;
        runProgram();
      };
    }

    function setControlsDisabled(disabled) {
      var controls = stage.querySelectorAll(".loop-dir-btn, #loopCountMinus, #loopCountPlus, #loopAddBtn, #undoBtn, #clearBtn, #checkBtn");
      controls.forEach(function(el) { el.disabled = disabled; });
    }

    // Expand the block program into a flat list of individual moves, e.g.
    // [{dir:"right",count:3}] -> ["right","right","right"].
    function expandedMoves() {
      var moves = [];
      blocks.forEach(function(b) {
        for (var k = 0; k < b.count; k++) moves.push(b.dir);
      });
      return moves;
    }

    function runProgram() {
      running = true;
      setControlsDisabled(true);

      var moves = expandedMoves();
      var pos = { x: q.start.x, y: q.start.y };
      var i = 0;
      var hitWallOrEdge = false;
      var skipRequested = false;
      var stepDelay = 380;

      // PATCH GROUP R — SKIP-AHEAD ON RETRY (see codeTheRobot for rationale)
      if (state.attemptUsed) {
        var skipBtn = document.createElement("button");
        skipBtn.className = "btn btn-ghost skip-replay-btn";
        skipBtn.textContent = "⏩ Skip";
        skipBtn.onclick = function() {
          skipRequested = true;
          stepDelay = 40;
          skipBtn.disabled = true;
          skipBtn.style.opacity = "0.4";
        };
        var stageHost = stage.querySelector(".robot-grid-wrap");
        if (stageHost && stageHost.parentNode) {
          stageHost.parentNode.insertBefore(skipBtn, stageHost.nextSibling);
        }
      }

      function step() {
        if (i >= moves.length) {
          finish();
          return;
        }
        var d = DIRS[moves[i]];
        var nx = pos.x + d.dx, ny = pos.y + d.dy;
        var blocked = nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize || wallSet[nx + "," + ny];
        if (!blocked) {
          pos = { x: nx, y: ny };
        } else {
          hitWallOrEdge = true;
        }
        var gridWrap = stage.querySelector(".robot-grid-wrap");
        if (gridWrap) gridWrap.innerHTML = buildGridHTML(pos);
        i++;
        setTimeout(step, skipRequested ? 40 : stepDelay);
      }

      function finish() {
        running = false;
        var skipBtnEl = stage.querySelector(".skip-replay-btn");
        if (skipBtnEl) skipBtnEl.remove();
        var reachedGoal = (pos.x === q.goal.x && pos.y === q.goal.y) && !hitWallOrEdge;

        var isFinalAttempt = reachedGoal || state.attemptUsed;
        resolved = isFinalAttempt;

        if (!reachedGoal && !isFinalAttempt) {
          // First miss: let the child rebuild their program. Reset the robot
          // back to the start, clear the old blocks, and re-enable controls.
          setTimeout(function() {
            blocks = [];
            pendingDir = null;
            pendingCount = 1;
            render_();
            ctx.onCheck(false);
          }, 250);
          return;
        }

        setTimeout(function() { ctx.onCheck(reachedGoal); }, 250);
      }

      step();
    }

    render_();
  }
};

// ====================================================================
// PATTERN DETECTIVE RENDERER
// Three modes: extend (what comes next?), find-missing (what's the ?),
// rule (number sequence — what's the next number?).
// All modes use tap-to-select multiple-choice, matching the engine's
// comparingNumbers / tellingTime patterns exactly.
// ====================================================================
RENDERERS.patternDetective = {
  mount: function(stage, q, ctx) {
    var selected = { value: null };

    // Build the emoji/number label for a tile value
    function tileLabel(val) {
      return val === "?" ? "?" : String(val);
    }

    // Determine the correct answer string from the question
    var correctAnswer = String(q.answer);
    ctx.correctAnswer = correctAnswer;
    if (q.mode === "extend") {
      ctx.hintText = "Look at how the pieces repeat from left to right — what piece would come right after the last one?";
    } else if (q.mode === "find-missing") {
      ctx.hintText = "Cover up the blank and look at what's on both sides of it — what piece keeps the repeating pattern going?";
    } else {
      ctx.hintText = "Look at how much the numbers go up (or down) by each time — that same jump tells you the next number.";
    }

    function updateDisplay() {
      var modeTitle, modeHint;
      if (q.mode === "extend") {
        modeTitle = "What comes next?";
        modeHint = "Spot the pattern, then tap the next piece";
      } else if (q.mode === "find-missing") {
        modeTitle = "Find the missing piece!";
        modeHint = "Look at the pattern and fill in the blank";
      } else {
        modeTitle = "What's the next number?";
        modeHint = "Find the rule, then pick the answer";
      }

      var html = '<div class="eq-card" style="padding:18px 14px; text-align:center;">';
      html += '<h2 style="margin-bottom:4px;">' + modeTitle + '</h2>';
      html += '<p style="color:var(--ink-soft);margin-bottom:2px;font-size:13px;">' + modeHint + '</p>';

      // Build the tile row
      html += '<div class="pd-tiles-row">';

      if (q.mode === "extend") {
        // Show all given tiles, then a blank at the end
        q.tiles.forEach(function(t) {
          html += '<div class="pd-tile">' + tileLabel(t) + '</div>';
        });
        // Arrow separator
        html += '<div style="font-size:22px;display:flex;align-items:center;color:var(--ink-soft);">→</div>';
        // The blank (filled if selected)
        if (selected.value !== null) {
          html += '<div class="pd-tile pd-blank-filled">' + escapeHTML(String(selected.value)) + '</div>';
        } else {
          html += '<div class="pd-tile pd-blank">?</div>';
        }

      } else if (q.mode === "find-missing") {
        // Show tiles, replace blank index with selected value or ?
        q.tiles.forEach(function(t, i) {
          if (i === q.blankIndex) {
            if (selected.value !== null) {
              html += '<div class="pd-tile pd-blank-filled">' + escapeHTML(String(selected.value)) + '</div>';
            } else {
              html += '<div class="pd-tile pd-blank">?</div>';
            }
          } else {
            html += '<div class="pd-tile">' + tileLabel(t) + '</div>';
          }
        });

      } else {
        // rule mode: number sequence tiles, then → and blank
        q.tiles.forEach(function(t) {
          html += '<div class="pd-tile">' + tileLabel(t) + '</div>';
        });
        html += '<div style="font-size:22px;display:flex;align-items:center;color:var(--ink-soft);">→</div>';
        if (selected.value !== null) {
          html += '<div class="pd-tile pd-blank-filled">' + escapeHTML(String(selected.value)) + '</div>';
        } else {
          html += '<div class="pd-tile pd-blank">?</div>';
        }
      }

      html += '</div>'; // end tiles-row

      if (q.mode === "rule") {
        // Show the rule hint below the tiles
        var nums = q.tiles.filter(function(t){ return typeof t === "number"; });
        if (nums.length >= 2) {
          var diff = nums[1] - nums[0];
          var isConstantAdd = true;
          for (var ri = 1; ri < nums.length; ri++) {
            if (nums[ri] - nums[ri-1] !== diff) { isConstantAdd = false; break; }
          }
          if (isConstantAdd && diff > 0) {
            html += '<p class="pd-rule-label">Rule: count by ' + diff + 's 🔢</p>';
          } else if (isConstantAdd && diff < 0) {
            html += '<p class="pd-rule-label">Rule: count back by ' + Math.abs(diff) + 's 🔢</p>';
          } else {
            html += '<p class="pd-rule-label">Hint: look at how each number changes 🔍</p>';
          }
        }
      }

      // Option buttons
      html += '<div class="pd-options">';
      q.options.forEach(function(opt) {
        var isSelected = (selected.value !== null && String(selected.value) === String(opt));
        html += '<button class="pd-option-btn' + (isSelected ? ' selected' : '') + '" data-opt="' + escapeHTML(String(opt)) + '">' +
          escapeHTML(String(opt)) + '</button>';
      });
      html += '</div>';

      // Check button (no numpad — this uses the footer dock like comparingNumbers)
      html += '<button class="btn btn-primary" id="checkBtn" style="margin-top:20px;width:100%;max-width:240px;"' +
        (selected.value !== null ? '' : ' disabled') + '>Check Answer</button>';

      html += '</div>'; // end eq-card
      stage.innerHTML = html;

      // Wire option buttons
      stage.querySelectorAll(".pd-option-btn").forEach(function(btn) {
        btn.onclick = function() {
          selected.value = this.getAttribute("data-opt");
          updateDisplay();
        };
      });

      // Wire check button
      var checkBtn = document.getElementById("checkBtn");
      if (checkBtn) {
        checkBtn.onclick = function() {
          if (selected.value === null) return;
          ctx.onCheck(String(selected.value) === correctAnswer);
        };
      }
    }

    updateDisplay();
  }
};

// ====================================================================
// BUG HUNTER RENDERER
// Kids see a pre-written arrow sequence that leads the robot to the
// wrong place. They tap the buggy step(s) to select them, pick the
// correct replacement direction, then press Check to run.
// 1-bug questions (easy/medium) are answered when the one fix is made.
// 2-bug questions (hard) require both fixes before the Check button
// unlocks.
// ====================================================================
RENDERERS.bugHunter = {
  mount: function(stage, q, ctx) {
    var gridSize = q.gridSize;
    var wallSet = {};
    (q.walls || []).forEach(function(w) { wallSet[w.x + "," + w.y] = true; });

    // fixes: map index -> direction string that the kid chose
    var fixes = {};
    // selectedChipIndex: which chip is currently tapped and awaiting a direction pick
    var selectedChipIndex = null;

    var DIRS = {
      up:    { dx: 0, dy: -1, arrow: "⬆️" },
      down:  { dx: 0, dy: 1,  arrow: "⬇️" },
      left:  { dx: -1, dy: 0, arrow: "⬅️" },
      right: { dx: 1, dy: 0,  arrow: "➡️" }
    };
    var DIR_KEYS = ["up","down","left","right"];

    // Set of buggy indices from question data
    var bugIndices = {};
    q.bugs.forEach(function(b) { bugIndices[b.index] = b.correct; });

    // PATCH GROUP T — CONTEXTUAL HINT (points at which step(s) are buggy,
    // without revealing the fix direction itself).
    var buggyStepNumbers = q.bugs.map(function(b) { return b.index + 1; });
    ctx.hintText = (buggyStepNumbers.length === 1)
      ? ("Trace the robot's path step by step — something's off at step " + buggyStepNumbers[0] + ".")
      : ("Trace the robot's path step by step — something's off at steps " + buggyStepNumbers.join(" and ") + ".");

    // Build effective sequence incorporating kid's fixes
    function effectiveSequence() {
      return q.sequence.map(function(dir, i) {
        return (fixes[i] !== undefined) ? fixes[i] : dir;
      });
    }

    // All bug slots have been given ANY direction (right or wrong)
    function allFilled() {
      return q.bugs.every(function(b) { return fixes[b.index] !== undefined; });
    }

    // All bug slots filled with the CORRECT direction
    function allCorrect() {
      return q.bugs.every(function(b) { return fixes[b.index] === b.correct; });
    }

    function cellSize() {
      var vh = window.innerHeight || 640;
      if (vh <= 700) return gridSize >= 5 ? 34 : 40;
      return gridSize >= 5 ? 48 : 56;
    }

    function buildGridHTML(robotPos) {
      var cs = cellSize();
      var html = '<div class="robot-grid" style="grid-template-columns:repeat(' + gridSize + ', ' + cs + 'px); grid-template-rows:repeat(' + gridSize + ', ' + cs + 'px);">';
      for (var y = 0; y < gridSize; y++) {
        for (var x = 0; x < gridSize; x++) {
          var isWall  = !!wallSet[x + "," + y];
          var isGoal  = (x === q.goal.x  && y === q.goal.y);
          var isRobot = (x === robotPos.x && y === robotPos.y);
          var cls = "robot-cell" + (isWall ? " robot-wall" : "");
          var content = "";
          if (isWall)       content = "🧱";
          else if (isRobot) content = '<span class="robot-emoji">🤖</span>';
          else if (isGoal)  content = '<span class="goal-emoji">🍕</span>';
          html += '<div class="' + cls + '">' + content + '</div>';
        }
      }
      html += '</div>';
      return html;
    }

    function buildSeqHTML() {
      var bugCount = q.bugs.length;
      var allDone = allFilled();
      var html = '<div class="bh-seq-row" id="bhSeqRow">';
      q.sequence.forEach(function(dir, i) {
        var isBug     = bugIndices.hasOwnProperty(i);
        var isFixed   = fixes[i] !== undefined;
        var isSelected = (selectedChipIndex === i);
        var displayDir = isFixed ? fixes[i] : dir;

        var isCorrectFix = isFixed && fixes[i] === bugIndices[i];
        var isWrongFix   = isFixed && fixes[i] !== bugIndices[i];
        var cls = "bh-chip";
        if (isCorrectFix)          cls += " bh-fixed";
        else if (isWrongFix)       cls += " bh-wrong";
        else if (isBug && !isFixed) cls += " bh-bug";
        if (isSelected)            cls += " bh-selected";

        html += '<button class="' + cls + '" data-idx="' + i + '" aria-label="Step ' + (i+1) + '">';
        html += DIRS[displayDir].arrow;
        // Badge: ! on unfixed bugs, ✗ on wrong fixes
        if (isBug && !isFixed && !isSelected) {
          html += '<span class="bh-bug-badge">!</span>';
        } else if (isWrongFix && !isSelected) {
          html += '<span class="bh-bug-badge" style="background:var(--amber-dark);">✗</span>';
        }
        html += '</button>';
      });
      html += '</div>';
      return html;
    }

    function buildDirPickerHTML() {
      if (selectedChipIndex === null) return '';
      var html = '<div class="bh-dir-options" id="bhDirPicker">';
      html += '<p class="bh-hint-label" style="width:100%;margin-bottom:4px;">Pick the correct arrow 👇</p>';
      DIR_KEYS.forEach(function(dk) {
        var isChosen = (fixes[selectedChipIndex] === dk);
        html += '<button class="bh-dir-btn' + (isChosen ? ' bh-dir-selected' : '') + '" data-dir="' + dk + '">' + DIRS[dk].arrow + '</button>';
      });
      html += '</div>';
      return html;
    }

    function render_() {
      var bugCount = q.bugs.length;
      var fixedCount = q.bugs.filter(function(b){ return fixes[b.index] !== undefined; }).length;
      var allDone = allFilled();

      var statusMsg = allDone
        ? (allCorrect() ? '✅ All ' + bugCount + ' bug' + (bugCount>1?'s':'') + ' fixed! Press Check to run.' : '⚠️ All slots filled — press Run to test your fix!')
        : (fixedCount + ' of ' + bugCount + ' bug' + (bugCount>1?'s':'') + ' fixed — tap a 🐛 step to fix it!');

      var html = '<div class="eq-card" style="padding:14px 12px; text-align:center;">';
      html += '<h2 style="margin-bottom:2px;">Debug the Code! 🐛</h2>';
      html += '<p style="color:var(--ink-soft);font-size:13px;margin-bottom:8px;">' + statusMsg + '</p>';
      html += '<div class="robot-grid-wrap" id="bhGrid">' + buildGridHTML(q.start) + '</div>';
      html += buildSeqHTML();
      html += buildDirPickerHTML();
      html += '<button class="btn btn-primary" id="checkBtn" style="margin-top:14px;width:100%;max-width:260px;"' + (allDone ? '' : ' disabled') + '>▶ Run Fixed Code</button>';
      html += '</div>';

      stage.innerHTML = html;
      wireUp();
    }

    function wireUp() {
      // Chip taps
      stage.querySelectorAll(".bh-chip").forEach(function(btn) {
        btn.onclick = function() {
          var idx = parseInt(this.getAttribute("data-idx"), 10);
          // Only allow tapping a bug chip
          if (!bugIndices.hasOwnProperty(idx)) return;
          selectedChipIndex = (selectedChipIndex === idx) ? null : idx;
          render_();
        };
      });

      // Direction picks
      var picker = document.getElementById("bhDirPicker");
      if (picker) {
        picker.querySelectorAll(".bh-dir-btn").forEach(function(btn) {
          btn.onclick = function() {
            if (selectedChipIndex === null) return;
            fixes[selectedChipIndex] = this.getAttribute("data-dir");
            selectedChipIndex = null;
            render_();
          };
        });
      }

      // Check / Run button
      var checkBtn = document.getElementById("checkBtn");
      if (checkBtn) {
        checkBtn.onclick = function() {
          if (!allFilled()) return;
          runSequence();
        };
      }
    }

    // Animate the robot running the (now-fixed) sequence
    function runSequence() {
      // Disable all interactive elements
      stage.querySelectorAll(".bh-chip, .bh-dir-btn, #checkBtn").forEach(function(el){ el.disabled = true; });

      var seq = effectiveSequence();
      var pos = { x: q.start.x, y: q.start.y };
      var i = 0;
      var hitWall = false;
      var skipRequested = false;

      // PATCH GROUP R — SKIP-AHEAD ON RETRY (see codeTheRobot for rationale)
      if (state.attemptUsed) {
        var skipBtn = document.createElement("button");
        skipBtn.className = "btn btn-ghost skip-replay-btn";
        skipBtn.textContent = "⏩ Skip";
        skipBtn.onclick = function() {
          skipRequested = true;
          skipBtn.disabled = true;
          skipBtn.style.opacity = "0.4";
        };
        var stageHost = stage.querySelector(".robot-grid-wrap");
        if (stageHost && stageHost.parentNode) {
          stageHost.parentNode.insertBefore(skipBtn, stageHost.nextSibling);
        }
      }

      function step() {
        if (i >= seq.length) { finish(); return; }
        var d = DIRS[seq[i]];
        var nx = pos.x + d.dx, ny = pos.y + d.dy;
        var blocked = nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize || wallSet[nx + "," + ny];
        if (!blocked) { pos = { x: nx, y: ny }; } else { hitWall = true; }
        var gridEl = stage.querySelector(".robot-grid-wrap");
        if (gridEl) gridEl.innerHTML = buildGridHTML(pos);
        i++;
        setTimeout(step, skipRequested ? 40 : 380);
      }

      function finish() {
        var skipBtnEl = stage.querySelector(".skip-replay-btn");
        if (skipBtnEl) skipBtnEl.remove();
        var reachedGoal = (pos.x === q.goal.x && pos.y === q.goal.y) && !hitWall;
        var isFinalAttempt = reachedGoal || state.attemptUsed;

        if (!reachedGoal && !isFinalAttempt) {
          // Wrong answer — pause so the kid can see where the robot ended up,
          // then walk it back to start step-by-step before letting them retry.
          setTimeout(function() { walkBack(pos, function() {
            fixes = {};
            selectedChipIndex = null;
            render_();
            ctx.onCheck(false);
          }); }, 600);
          return;
        }
        setTimeout(function() { ctx.onCheck(reachedGoal); }, 300);
      }

      // Animate the robot gliding back to its start position one cell at a time.
      function walkBack(from, onDone) {
        var cur = { x: from.x, y: from.y };
        var target = { x: q.start.x, y: q.start.y };

        function nextBackStep() {
          if (cur.x === target.x && cur.y === target.y) { onDone(); return; }
          // Move one step toward start (prefer x first, then y)
          if (cur.x !== target.x) {
            cur.x += (target.x > cur.x) ? 1 : -1;
          } else {
            cur.y += (target.y > cur.y) ? 1 : -1;
          }
          var gridEl = stage.querySelector(".robot-grid-wrap");
          if (gridEl) gridEl.innerHTML = buildGridHTML(cur);
          setTimeout(nextBackStep, 280);
        }
        nextBackStep();
      }

      step();
    }

    ctx.correctAnswer = q.bugs.map(function(b) { return "Step " + (b.index+1) + " → " + DIRS[b.correct].arrow; }).join(", ");
    render_();
  }
};

// ====================================================================
// IF/THEN ROBOT RENDERER
// Introduces conditional logic, concretely: the robot has a fixed prefix
// path, then hits a decision point where it must check one direction for
// a wall. The kid picks which single rule applies — "if a wall is there,
// turn ___" or "if it's clear, go ___" — using the puzzle's own thenDir/
// elseDir as the two candidate outcomes (always one concrete pair per
// puzzle, not abstract booleans). Pressing Run plays the prefix, pauses to
// visually "check" the decision cell (highlighting it as wall/clear), then
// branches live based on the kid's chosen rule, then plays the suffix.
// Win = robot ends exactly on the goal cell.
// ====================================================================
RENDERERS.ifThenRobot = {
  mount: function(stage, q, ctx) {
    var gridSize = q.gridSize;
    var wallSet = {};
    (q.walls || []).forEach(function(w) { wallSet[w.x + "," + w.y] = true; });

    var DIRS = {
      up:    { dx: 0, dy: -1, arrow: "⬆️" },
      down:  { dx: 0, dy: 1,  arrow: "⬇️" },
      left:  { dx: -1, dy: 0, arrow: "⬅️" },
      right: { dx: 1, dy: 0,  arrow: "➡️" }
    };

    // Where the robot will sit right at the decision point (after the prefix).
    var decisionPos = { x: q.start.x, y: q.start.y };
    q.prefix.forEach(function(dir) {
      decisionPos = { x: decisionPos.x + DIRS[dir].dx, y: decisionPos.y + DIRS[dir].dy };
    });
    function cellHasWall(pos, dir) {
      var nx = pos.x + DIRS[dir].dx, ny = pos.y + DIRS[dir].dy;
      if (nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize) return true; // edge counts as blocked
      return !!wallSet[nx + "," + ny];
    }
    var actualHasWall = cellHasWall(decisionPos, q.decisionDir);
    var correctRule = actualHasWall ? "then" : "else"; // which rule the kid SHOULD pick

    ctx.correctAnswer = actualHasWall
      ? ("If there's a wall ahead, go " + DIRS[q.thenDir].arrow)
      : ("If it's clear ahead, go " + DIRS[q.elseDir].arrow);
    ctx.hintText = "Watch closely what's directly " + q.decisionDir + " of the robot when it stops to check — is it a wall, or clear space?";

    var chosenRule = null;   // "then" | "else" | null
    var pickerOpen = false;
    var running = false;

    function cellSize() {
      var vh = window.innerHeight || 640;
      if (vh <= 700) return gridSize >= 5 ? 34 : 40;
      return gridSize >= 5 ? 48 : 56;
    }

    function buildGridHTML(robotPos, highlightPos, highlightState) {
      var cs = cellSize();
      var html = '<div class="robot-grid" style="grid-template-columns:repeat(' + gridSize + ', ' + cs + 'px); grid-template-rows:repeat(' + gridSize + ', ' + cs + 'px);">';
      for (var y = 0; y < gridSize; y++) {
        for (var x = 0; x < gridSize; x++) {
          var isWall = !!wallSet[x + "," + y];
          var isGoal = (x === q.goal.x && y === q.goal.y);
          var isRobot = (x === robotPos.x && y === robotPos.y);
          var isHighlight = highlightPos && x === highlightPos.x && y === highlightPos.y;
          var cls = "robot-cell" + (isWall ? " robot-wall" : "");
          if (isHighlight) cls += highlightState === "wall" ? " it-check-wall" : " it-check-clear";
          var content = "";
          if (isWall) content = "🧱";
          else if (isRobot) content = '<span class="robot-emoji">🤖</span>';
          else if (isGoal) content = '<span class="goal-emoji">🍕</span>';
          else if (isHighlight) content = highlightState === "wall" ? "🧱" : "✨";
          html += '<div class="' + cls + '">' + content + '</div>';
        }
      }
      html += '</div>';
      return html;
    }

    function buildCodeStripHTML() {
      var html = '<div class="it-strip" id="itStrip">';
      q.prefix.forEach(function(dir, i) {
        html += '<span class="it-chip it-chip-fixed">' + DIRS[dir].arrow + '</span>';
      });
      var qClass = "it-chip it-chip-decision" + (chosenRule ? " it-chip-answered" : "");
      var qContent = chosenRule ? DIRS[chosenRule === "then" ? q.thenDir : q.elseDir].arrow : "❓";
      html += '<button class="' + qClass + '" id="itDecisionChip">' + qContent + '</button>';
      q.suffix.forEach(function(dir, i) {
        html += '<span class="it-chip it-chip-fixed">' + DIRS[dir].arrow + '</span>';
      });
      html += '</div>';
      return html;
    }

    function buildRulePickerHTML() {
      if (!pickerOpen) return '';
      var html = '<div class="it-rule-picker" id="itRulePicker">';
      html += '<p class="it-rule-hint">What should the robot do?</p>';
      html += '<button class="it-rule-btn' + (chosenRule === "then" ? " it-rule-selected" : "") + '" data-rule="then">';
      html += '<span class="it-rule-icon">🧱</span><span class="it-rule-text">If wall ahead<br>go ' + DIRS[q.thenDir].arrow + '</span>';
      html += '</button>';
      html += '<button class="it-rule-btn' + (chosenRule === "else" ? " it-rule-selected" : "") + '" data-rule="else">';
      html += '<span class="it-rule-icon">✨</span><span class="it-rule-text">If clear ahead<br>go ' + DIRS[q.elseDir].arrow + '</span>';
      html += '</button>';
      html += '</div>';
      return html;
    }

    function render_(robotPos, highlightPos, highlightState) {
      var html = '<div class="eq-card" style="padding:14px 12px;">';
      html += '<h2 style="margin-bottom:4px;">Teach the robot a rule! 🤔</h2>';
      html += '<p style="color:var(--ink-soft);margin-bottom:8px;">Tap the ❓ and pick what the robot should do</p>';
      html += '<div class="robot-grid-wrap" id="itGrid">' + buildGridHTML(robotPos || q.start, highlightPos, highlightState) + '</div>';
      html += buildCodeStripHTML();
      html += buildRulePickerHTML();
      html += '<button class="btn btn-primary" id="checkBtn" style="margin-top:14px;width:100%;max-width:260px;"' + (chosenRule ? '' : ' disabled') + '>▶ Run</button>';
      html += '</div>';

      stage.innerHTML = html;
      wireUp();
    }

    function wireUp() {
      var decisionChip = document.getElementById("itDecisionChip");
      if (decisionChip) {
        decisionChip.onclick = function() {
          if (running) return;
          pickerOpen = !pickerOpen;
          render_();
        };
      }
      var picker = document.getElementById("itRulePicker");
      if (picker) {
        picker.querySelectorAll(".it-rule-btn").forEach(function(btn) {
          btn.onclick = function() {
            chosenRule = this.getAttribute("data-rule");
            pickerOpen = false;
            render_();
          };
        });
      }
      var checkBtn = document.getElementById("checkBtn");
      if (checkBtn) {
        checkBtn.onclick = function() {
          if (!chosenRule) return;
          runSequence();
        };
      }
    }

    function setControlsDisabled(disabled) {
      stage.querySelectorAll("#itDecisionChip, .it-rule-btn, #checkBtn").forEach(function(el) { el.disabled = disabled; });
    }

    function runSequence() {
      running = true;
      pickerOpen = false;
      setControlsDisabled(true);

      var pos = { x: q.start.x, y: q.start.y };
      var hitWall = false;
      var steps = q.prefix.slice(); // we'll animate prefix, then a pause-and-check, then branch+suffix
      var skipRequested = false;

      // PATCH GROUP R — SKIP-AHEAD ON RETRY (see codeTheRobot for rationale)
      if (state.attemptUsed) {
        var skipBtn = document.createElement("button");
        skipBtn.className = "btn btn-ghost skip-replay-btn";
        skipBtn.textContent = "⏩ Skip";
        skipBtn.onclick = function() {
          skipRequested = true;
          skipBtn.disabled = true;
          skipBtn.style.opacity = "0.4";
        };
        var stageHost = stage.querySelector("#itGrid");
        if (stageHost && stageHost.parentNode) {
          stageHost.parentNode.insertBefore(skipBtn, stageHost.nextSibling);
        }
      }

      var i = 0;
      function prefixStep() {
        if (i >= steps.length) { afterPrefix(); return; }
        var d = DIRS[steps[i]];
        var nx = pos.x + d.dx, ny = pos.y + d.dy;
        var blocked = nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize || wallSet[nx + "," + ny];
        if (!blocked) pos = { x: nx, y: ny }; else hitWall = true;
        var gridEl = stage.querySelector("#itGrid");
        if (gridEl) gridEl.innerHTML = buildGridHTML(pos);
        i++;
        setTimeout(prefixStep, skipRequested ? 40 : 380);
      }

      function afterPrefix() {
        // Pause and visually "check" the decision cell before branching.
        var checkDx = DIRS[q.decisionDir].dx, checkDy = DIRS[q.decisionDir].dy;
        var checkPos = { x: pos.x + checkDx, y: pos.y + checkDy };
        var inBounds = checkPos.x >= 0 && checkPos.x < gridSize && checkPos.y >= 0 && checkPos.y < gridSize;
        var checkState = (!inBounds || actualHasWall) ? "wall" : "clear";
        var gridEl = stage.querySelector("#itGrid");
        if (gridEl) gridEl.innerHTML = buildGridHTML(pos, inBounds ? checkPos : null, checkState);
        setTimeout(function() { branch(); }, skipRequested ? 80 : 700);
      }

      function branch() {
        var branchDir = (chosenRule === "then") ? q.thenDir : q.elseDir;
        var d = DIRS[branchDir];
        var nx = pos.x + d.dx, ny = pos.y + d.dy;
        var blocked = nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize || wallSet[nx + "," + ny];
        if (!blocked) pos = { x: nx, y: ny }; else hitWall = true;
        var gridEl = stage.querySelector("#itGrid");
        if (gridEl) gridEl.innerHTML = buildGridHTML(pos);
        var j = 0;
        function suffixStep() {
          if (j >= q.suffix.length) { finish(); return; }
          var sd = DIRS[q.suffix[j]];
          var snx = pos.x + sd.dx, sny = pos.y + sd.dy;
          var sblocked = snx < 0 || snx >= gridSize || sny < 0 || sny >= gridSize || wallSet[snx + "," + sny];
          if (!sblocked) pos = { x: snx, y: sny }; else hitWall = true;
          var ge = stage.querySelector("#itGrid");
          if (ge) ge.innerHTML = buildGridHTML(pos);
          j++;
          setTimeout(suffixStep, skipRequested ? 40 : 380);
        }
        setTimeout(suffixStep, skipRequested ? 40 : 380);
      }

      function finish() {
        running = false;
        var skipBtnEl = stage.querySelector(".skip-replay-btn");
        if (skipBtnEl) skipBtnEl.remove();
        var reachedGoal = (pos.x === q.goal.x && pos.y === q.goal.y) && !hitWall;
        var isFinalAttempt = reachedGoal || state.attemptUsed;

        if (!reachedGoal && !isFinalAttempt) {
          setTimeout(function() {
            chosenRule = null;
            render_(q.start);
            ctx.onCheck(false);
          }, 500);
          return;
        }
        setTimeout(function() { ctx.onCheck(reachedGoal); }, 300);
      }

      prefixStep();
    }

    render_(q.start);
  }
};


RENDERERS.functionFactory = {
  mount: function(stage, q, ctx) {
    var DIRS = {
      up:    { dx:0,  dy:-1, arrow:"⬆️", word:"up"    },
      down:  { dx:0,  dy:1,  arrow:"⬇️", word:"down"  },
      left:  { dx:-1, dy:0,  arrow:"⬅️", word:"left"  },
      right: { dx:1,  dy:0,  arrow:"➡️", word:"right" }
    };

    var fnSteps  = q.fnSteps || [];
    var suffix   = q.suffix  || [];
    var maxCalls = q.callCount;

    // UI state machine
    var phase         = "watch";   // "watch" | "count" | "run"
    var watchDone     = false;
    var chosenCalls   = null;
    var animRunning   = false;

    ctx.hintText = "Watch the trick first, then pick how many times the robot should do it!";
    ctx.correctAnswer = "Reached the star!";

    // ----------------------------------------------------------------
    // Grid builder
    // ----------------------------------------------------------------
    function cellSize() {
      return Math.min(Math.floor((Math.min(window.innerWidth, 400) - 32) / q.gridSize), 54);
    }

    function buildGrid(robotPos, trailCells, goalReached) {
      var cs = cellSize();
      var wallSet = {};
      (q.walls || []).forEach(function(w){ wallSet[w.x + "," + w.y] = true; });
      var trailSet = {};
      (trailCells || []).forEach(function(c){ trailSet[c.x + "," + c.y] = true; });

      var html = '<div class="robot-grid" style="grid-template-columns:repeat(' + q.gridSize + ',' + cs + 'px);grid-template-rows:repeat(' + q.gridSize + ',' + cs + 'px);">';
      for (var row = 0; row < q.gridSize; row++) {
        for (var col = 0; col < q.gridSize; col++) {
          var isRobot  = robotPos && robotPos.x === col && robotPos.y === row;
          var isGoal   = q.goal.x === col && q.goal.y === row;
          var isWall   = !!wallSet[col + "," + row];
          var isTrail  = !!trailSet[col + "," + row];
          var bg = isWall  ? "background:rgba(100,100,120,.25);"
                 : isTrail ? "background:rgba(201,168,245,.35);"
                 : "";
          var inner = isRobot  ? '<span class="robot-emoji">' + (goalReached ? "🥳" : "🤖") + '</span>'
                    : isGoal   ? '<span class="goal-emoji">⭐</span>'
                    : isTrail  ? '<span style="font-size:' + Math.round(cs * .35) + 'px;opacity:.7;">✨</span>'
                    : '';
          html += '<div class="robot-cell" style="width:' + cs + 'px;height:' + cs + 'px;' + bg + '">' + inner + '</div>';
        }
      }
      html += '</div>';
      return html;
    }

    // ----------------------------------------------------------------
    // PHASE RENDERERS
    // ----------------------------------------------------------------
    function renderWatch() {
      var html = '<div class="eq-card" style="padding:14px 12px;text-align:center;">';
      html += '<div style="font-size:13px;font-weight:800;color:var(--violet);margin-bottom:4px;">🏭 Function Factory</div>';
      html += '<h2 style="margin-bottom:4px;font-size:17px;">The robot knows a trick! 🤖</h2>';
      html += '<p style="font-size:13px;color:var(--ink-soft);margin-bottom:10px;">Its trick is called <strong>SPIN</strong>. See what it does:</p>';

      // BIG clear trick card
      html += '<div style="background:linear-gradient(135deg,#F0F4FF,#F8F0FF);border:2px solid var(--violet);' +
        'border-radius:16px;padding:12px 16px;margin-bottom:12px;display:inline-block;min-width:200px;">';
      html += '<div style="font-size:12px;font-weight:900;color:var(--violet);margin-bottom:8px;letter-spacing:.06em;">🔁 SPIN = </div>';
      html += '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">';
      fnSteps.forEach(function(s, i) {
        html += '<div style="width:44px;height:44px;background:var(--violet);color:#fff;border-radius:12px;' +
          'display:flex;align-items:center;justify-content:center;font-size:22px;' +
          'box-shadow:0 3px 8px rgba(122,111,203,.35);">' + DIRS[s].arrow + '</div>';
      });
      html += '</div>';
      html += '<div style="font-size:11px;color:var(--ink-soft);margin-top:6px;font-weight:700;">Every time the robot does SPIN,<br>it takes ' + fnSteps.length + ' step' + (fnSteps.length > 1 ? 's' : '') + '</div>';
      html += '</div>';

      // Grid
      html += '<div class="ff-grid-wrap" id="ffGrid">' + buildGrid(q.start, [], false) + '</div>';

      if (!watchDone) {
        html += '<button class="btn btn-primary" id="ffWatchBtn" style="margin-top:12px;width:100%;max-width:260px;">👀 Watch the robot do SPIN!</button>';
      } else {
        html += '<div style="background:#E8F8F0;border-radius:12px;padding:10px 14px;margin-top:10px;' +
          'font-size:13px;font-weight:800;color:var(--success);">✅ You saw the trick! Now help it reach ⭐</div>';
        html += '<button class="btn btn-primary" id="ffNextBtn" style="margin-top:10px;width:100%;max-width:260px;">How many times? ➡️</button>';
      }
      html += '</div>';
      stage.innerHTML = html;

      if (!watchDone) {
        document.getElementById("ffWatchBtn").onclick = function() { animateWatch(); };
      } else {
        document.getElementById("ffNextBtn").onclick = function() { phase = "count"; render_(); };
      }
    }

    function animateWatch() {
      var btn = document.getElementById("ffWatchBtn");
      if (btn) { btn.disabled = true; btn.textContent = "🏃 Watch..."; }

      var pos   = { x: q.start.x, y: q.start.y };
      var trail = [];
      var i = 0;

      function step() {
        if (i >= fnSteps.length) {
          setTimeout(function() { watchDone = true; renderWatch(); }, 700);
          return;
        }
        var d = DIRS[fnSteps[i]];
        var nx = pos.x + d.dx, ny = pos.y + d.dy;
        var wallSet = {};
        (q.walls || []).forEach(function(w){ wallSet[w.x + "," + w.y] = true; });
        if (nx >= 0 && nx < q.gridSize && ny >= 0 && ny < q.gridSize && !wallSet[nx + "," + ny]) {
          trail.push({ x: pos.x, y: pos.y });
          pos = { x: nx, y: ny };
        }
        var gridEl = stage.querySelector("#ffGrid");
        if (gridEl) gridEl.innerHTML = buildGrid(pos, trail, false);
        i++;
        setTimeout(step, 420);
      }
      step();
    }

    function renderCount() {
      var minChoice = Math.max(1, maxCalls - 1);
      var maxChoice = maxCalls + 2;
      var choices = [];
      for (var n = minChoice; n <= maxChoice; n++) choices.push(n);

      var html = '<div class="eq-card" style="padding:14px 12px;text-align:center;">';
      html += '<div style="font-size:13px;font-weight:800;color:var(--violet);margin-bottom:4px;">🏭 Function Factory</div>';
      html += '<h2 style="margin-bottom:6px;font-size:17px;">How many times? 🤔</h2>';

      // Grid + goal visible
      html += '<div class="ff-grid-wrap">' + buildGrid(q.start, [], false) + '</div>';

      // Trick reminder — compact
      html += '<div style="display:flex;align-items:center;justify-content:center;gap:6px;' +
        'margin:10px 0 4px;background:#F0F4FF;border-radius:10px;padding:6px 12px;flex-wrap:wrap;">';
      html += '<span style="font-size:12px;font-weight:800;color:var(--violet);">🔁 SPIN =</span>';
      fnSteps.forEach(function(s) { html += '<span style="font-size:20px;">' + DIRS[s].arrow + '</span>'; });
      html += '</div>';

      html += '<p style="font-size:13px;font-weight:700;color:var(--ink);margin:8px 0 12px;">' +
        'How many times should the robot do SPIN to reach ⭐?</p>';

      // Big clear number buttons — always show all choices in a row
      html += '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;">';
      choices.forEach(function(n) {
        var isChosen = chosenCalls === n;
        html += '<button data-count="' + n + '" style="' +
          'width:60px;height:60px;border-radius:16px;font-family:var(--font-display);font-weight:900;font-size:26px;' +
          'border:3px solid ' + (isChosen ? 'var(--violet)' : 'var(--line)') + ';' +
          'background:' + (isChosen ? 'var(--violet)' : '#fff') + ';' +
          'color:' + (isChosen ? '#fff' : 'var(--ink)') + ';' +
          'box-shadow:var(--shadow-soft);transition:all .15s ease;' +
          (isChosen ? 'transform:scale(1.12);' : '') + '">' + n + '</button>';
      });
      html += '</div>';

      // Watch again link
      html += '<button style="background:none;border:none;font-size:12px;color:var(--violet);font-weight:700;' +
        'text-decoration:underline;margin-bottom:10px;" id="ffRewatchBtn">👀 Watch the trick again</button><br>';

      html += '<button class="btn btn-primary" id="ffGoBtn" style="width:100%;max-width:240px;"' +
        (chosenCalls !== null ? '' : ' disabled') + '>▶ Let\'s go!</button>';
      html += '</div>';
      stage.innerHTML = html;

      stage.querySelectorAll("[data-count]").forEach(function(btn) {
        btn.onclick = function() {
          chosenCalls = parseInt(this.getAttribute("data-count"));
          renderCount();
        };
      });

      document.getElementById("ffRewatchBtn").onclick = function() {
        watchDone = false;
        phase = "watch";
        render_();
      };

      var goBtn = document.getElementById("ffGoBtn");
      if (goBtn) goBtn.onclick = function() {
        if (chosenCalls === null) return;
        phase = "run";
        render_();
      };
    }

    function renderRun() {
      var html = '<div class="eq-card" style="padding:14px 12px;text-align:center;">';
      html += '<div style="font-size:13px;font-weight:800;color:var(--violet);margin-bottom:4px;">🏭 Function Factory</div>';
      html += '<h2 style="margin-bottom:4px;font-size:17px;">Watch the robot go! 🚀</h2>';

      // Show chosen number big and clear
      html += '<div style="background:linear-gradient(135deg,var(--violet),#9B8BD5);color:#fff;' +
        'border-radius:16px;padding:10px 20px;display:inline-block;margin-bottom:10px;">';
      html += '<span style="font-size:13px;font-weight:700;opacity:.85;">Robot will do SPIN</span><br>';
      html += '<span style="font-size:32px;font-weight:900;font-family:var(--font-display);">' + chosenCalls + '</span>';
      html += '<span style="font-size:14px;font-weight:700;"> time' + (chosenCalls > 1 ? 's' : '') + '</span>';
      html += '</div>';

      html += '<div class="ff-grid-wrap" id="ffGrid">' + buildGrid(q.start, [], false) + '</div>';

      if (!animRunning) {
        html += '<button class="btn btn-primary" id="ffRunBtn" style="margin-top:12px;width:100%;max-width:240px;">🤖 Go robot go!</button>';
        html += '<br><button style="background:none;border:none;font-size:12px;color:var(--ink-soft);' +
          'font-weight:700;text-decoration:underline;margin-top:6px;" id="ffBackBtn">← Change my answer</button>';
      } else {
        html += '<div style="text-align:center;margin-top:12px;font-size:15px;font-weight:800;color:var(--violet);">🏃 SPIN × ' + chosenCalls + '...</div>';
      }
      html += '</div>';
      stage.innerHTML = html;

      var runBtn = document.getElementById("ffRunBtn");
      if (runBtn) runBtn.onclick = function() {
        runBtn.disabled = true;
        animRunning = true;
        renderRun(); // re-render to show "running" state
        runAnimation();
      };

      var backBtn = document.getElementById("ffBackBtn");
      if (backBtn) backBtn.onclick = function() {
        chosenCalls = null;
        phase = "count";
        render_();
      };
    }

    function runAnimation() {
      var pos  = { x: q.start.x, y: q.start.y };
      var trail = [];
      var wallSet = {};
      (q.walls || []).forEach(function(w){ wallSet[w.x + "," + w.y] = true; });

      // Build full step list: chosen calls × fnSteps + suffix
      var allSteps = [];
      for (var c = 0; c < chosenCalls; c++) {
        fnSteps.forEach(function(s){ allSteps.push(s); });
      }
      suffix.forEach(function(s){ allSteps.push(s); });

      var hitWall = false;
      var i = 0;
      function step() {
        if (i >= allSteps.length) {
          finish();
          return;
        }
        var d  = DIRS[allSteps[i]];
        var nx = pos.x + d.dx;
        var ny = pos.y + d.dy;
        var blocked = nx < 0 || nx >= q.gridSize || ny < 0 || ny >= q.gridSize || !!wallSet[nx + "," + ny];
        if (!blocked) {
          trail.push({ x: pos.x, y: pos.y });
          pos = { x: nx, y: ny };
        } else {
          hitWall = true;
        }
        var gridEl = stage.querySelector("#ffGrid");
        if (gridEl) gridEl.innerHTML = buildGrid(pos, trail, false);
        i++;
        setTimeout(step, 300);
      }
      step();

      function finish() {
        animRunning = false;
        var reached = pos.x === q.goal.x && pos.y === q.goal.y && !hitWall;
        // Show happy/sad robot for a moment before judging
        var gridEl = stage.querySelector("#ffGrid");
        if (gridEl) gridEl.innerHTML = buildGrid(pos, trail, reached);

        if (!reached) {
          // Wrong number — let them try again from count step.
          // ctx.onCheck(false) lets the engine track the miss, update the
          // coin multiplier, show the retry hint, and update the dot status.
          setTimeout(function() {
            chosenCalls = null;
            phase = "count";
            render_();
            ctx.onCheck(false);
          }, 1200);
        } else {
          ctx.correctAnswer = "Reached the star!";
          setTimeout(function(){ ctx.onCheck(true); }, 900);
        }
      }
    }

    function render_() {
      if      (phase === "watch") renderWatch();
      else if (phase === "count") renderCount();
      else if (phase === "run")   renderRun();
    }

    render_();
  }
};

// ====================================================================
// RENDERER: sortItOut
// Tap two bars to swap them. Sort all bars into the target order.
// Teaches comparison and algorithmic thinking visually.
// ====================================================================

RENDERERS.sortItOut = {
  mount: function(stage, q, ctx) {
    var BAR_COLORS = ["#FF6B5B","#F4A828","#1FA391","#7A6FCB","#FFB3D9","#A8D8F5","#A8EBD0","#FFE49C"];
    var values = q.values.slice(); // mutable working copy
    var originalValues = q.values.slice();
    var selectedIdx = null;
    var swapCount = 0;
    var isDesc = q.targetOrder === "desc";

    var targetSorted = originalValues.slice().sort(function(a,b){ return isDesc ? b-a : a-b; });
    ctx.correctAnswer = targetSorted.join(isDesc?" > ":" < ");
    ctx.hintText = "Tap a bar, then tap another bar to swap them. Get them " + (isDesc?"tallest to shortest":"shortest to tallest") + "!";

    function isSorted() {
      for (var i = 0; i < values.length-1; i++) {
        if (isDesc ? values[i] < values[i+1] : values[i] > values[i+1]) return false;
      }
      return true;
    }

    function render_() {
      var maxVal = Math.max.apply(null, values);
      var maxH = 120;
      var html = '<div class="eq-card" style="padding:14px 10px;">';
      html += '<h2 style="margin-bottom:2px;">Sort It Out 📊</h2>';
      html += '<p class="si-instruction">Tap two bars to swap them · get them ' + (isDesc?'tallest → shortest':'shortest → tallest') + '</p>';
      if (swapCount > 0) html += '<p class="si-swap-counter">Swaps made: ' + swapCount + '</p>';

      // Bar stage
      html += '<div class="si-stage" id="siStage">';
      values.forEach(function(v, i) {
        var h = Math.round((v / maxVal) * maxH);
        var col = BAR_COLORS[i % BAR_COLORS.length];
        var isSelected = selectedIdx === i;
        html += '<div class="si-bar-wrap' + (isSelected?' si-selected':'') + '" data-baridx="' + i + '">' +
          '<div class="si-bar" style="height:' + h + 'px;background:' + col + ';width:clamp(28px,8vw,44px);border-radius:8px 8px 0 0;' +
            (isSelected?'outline:3px solid '+col+';box-shadow:0 0 0 3px #fff,0 0 0 6px '+col+';':'') +
          '"></div>' +
          '<div class="si-bar-val">' + v + '</div>' +
        '</div>';
      });
      html += '</div>';

      // Target order hint
      html += '<div class="si-target-row">';
      html += '<span style="font-size:11px;color:var(--ink-soft);font-weight:700;">Goal:</span>';
      targetSorted.forEach(function(v) {
        html += '<span class="si-target-chip">' + v + '</span>';
      });
      html += '</div>';

      html += '<button class="btn btn-primary" id="siCheckBtn" style="margin-top:10px;width:100%;max-width:220px;"' + (isSorted()?'':' disabled') + '>✅ Check!</button>';
      html += '</div>';
      stage.innerHTML = html;

      stage.querySelectorAll('[data-baridx]').forEach(function(el) {
        el.onclick = function() {
          var idx = parseInt(this.getAttribute('data-baridx'));
          if (selectedIdx === null) {
            selectedIdx = idx;
          } else if (selectedIdx === idx) {
            selectedIdx = null;
          } else {
            // Swap
            var tmp = values[selectedIdx]; values[selectedIdx] = values[idx]; values[idx] = tmp;
            swapCount++;
            selectedIdx = null;
            SFX.coin();
          }
          render_();
        };
      });

      var checkBtn = document.getElementById('siCheckBtn');
      if (checkBtn) checkBtn.onclick = function() { ctx.onCheck(isSorted()); };
    }

    render_();
  }
};

// ====================================================================
// RENDERER: trueOrFalse (story edition)
// Real kid scenarios replace abstract A/B inputs.
// AND = both friends must say yes. OR = at least one. NOT = flip it.
// ====================================================================

RENDERERS.trueOrFalse = {
  mount: function(stage, q, ctx) {
    var inputs   = q.inputs;   // array of {emoji, label, name, value}
    var gate     = q.gate;
    var expected = q.expected;
    var selectedAnswer = null;

    // Compute correct output
    function computeOutput() {
      if (gate === "AND") return inputs.every(function(i){ return i.value; });
      if (gate === "OR")  return inputs.some(function(i){ return i.value; });
      if (gate === "NOT") return !inputs[0].value;
      return false;
    }

    ctx.correctAnswer = expected ? "YES ✅" : "NO ❌";
    ctx.hintText = gate === "AND"
      ? "AND means ALL of them must be ready! If even one says NO, the answer is NO."
      : gate === "OR"
      ? "OR means just ONE of them is enough! If at least one says YES, the answer is YES."
      : "NOT flips the answer! If it says YES, NOT makes it NO. If it says NO, NOT makes it YES!";

    function render_() {
      var gateColor = gate === "AND" ? "var(--teal)" : gate === "OR" ? "var(--violet)" : "var(--coral)";
      var gateDesc  = gate === "AND" ? "BOTH must be YES" : gate === "OR" ? "AT LEAST ONE must be YES" : "Flip it!";

      var html = '<div class="eq-card" style="padding:14px 10px;">';

      // Story header
      html += '<h2 style="margin-bottom:2px;font-size:16px;">' + escapeHTML(q.story) + '</h2>';
      html += '<p style="font-size:12px;color:var(--ink-soft);margin-bottom:12px;">' + escapeHTML(q.rule) + '</p>';

      // Input cards
      html += '<div style="display:flex;gap:10px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;">';
      inputs.forEach(function(inp) {
        var isYes = inp.value;
        var bg    = isYes ? "#E8F8F0" : "#FFF0F0";
        var border= isYes ? "var(--success)" : "var(--coral)";
        var badge = isYes ? q.trueLabel  || "YES" : q.falseLabel || "NO";
        var badgeColor = isYes ? "var(--success)" : "var(--coral)";
        html += '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;' +
          'background:' + bg + ';border:2.5px solid ' + border + ';border-radius:14px;padding:10px 14px;min-width:80px;">' +
          '<span style="font-size:32px;line-height:1;">' + inp.emoji + '</span>' +
          '<span style="font-size:12px;font-weight:700;color:var(--ink);">' + escapeHTML(inp.name) + '</span>' +
          '<span style="font-size:13px;font-weight:900;color:' + badgeColor + ';">' + badge + '</span>' +
        '</div>';
      });
      html += '</div>';

      // Gate pill
      html += '<div style="text-align:center;margin-bottom:12px;">';
      html += '<div style="display:inline-block;background:' + gateColor + ';color:#fff;' +
        'border-radius:999px;padding:6px 18px;font-family:var(--font-display);font-weight:900;font-size:15px;letter-spacing:.04em;">' +
        gate + '</div>';
      html += '<div style="font-size:11px;color:var(--ink-soft);font-weight:700;margin-top:4px;">' + gateDesc + '</div>';
      html += '</div>';

      // Arrow down
      html += '<div style="text-align:center;font-size:22px;margin-bottom:10px;">⬇️</div>';

      // Answer buttons
      html += '<p style="text-align:center;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px;">What is the answer?</p>';
      html += '<div style="display:flex;gap:12px;justify-content:center;margin-bottom:12px;">';

      var yesSelected = selectedAnswer === true;
      var noSelected  = selectedAnswer === false;
      html += '<button class="tf-option-btn' + (yesSelected ? ' tf-selected' : '') + '" data-ans="true" style="' +
        (yesSelected ? 'background:var(--success);border-color:var(--success);color:#fff;transform:scale(1.06);' : '') + '">' +
        '✅ YES</button>';
      html += '<button class="tf-option-btn' + (noSelected ? ' tf-selected' : '') + '" data-ans="false" style="' +
        (noSelected ? 'background:var(--coral);border-color:var(--coral);color:#fff;transform:scale(1.06);' : '') + '">' +
        '❌ NO</button>';
      html += '</div>';

      // Outcome preview when selected
      if (selectedAnswer !== null) {
        var outcomeText = selectedAnswer ? (q.outcomeTrue || "YES!") : (q.outcomeFalse || "NO!");
        html += '<div style="text-align:center;font-size:18px;font-weight:800;margin-bottom:10px;' +
          'color:' + (selectedAnswer ? 'var(--success)' : 'var(--coral)') + ';">' +
          escapeHTML(outcomeText) + '</div>';
      }

      html += '<button class="btn btn-primary" id="tfCheckBtn" style="width:100%;max-width:220px;"' +
        (selectedAnswer !== null ? '' : ' disabled') + '>Check!</button>';

      html += '</div>';
      stage.innerHTML = html;

      stage.querySelectorAll('[data-ans]').forEach(function(btn) {
        btn.onclick = function() {
          selectedAnswer = this.getAttribute('data-ans') === 'true';
          render_();
        };
      });

      var checkBtn = document.getElementById('tfCheckBtn');
      if (checkBtn) checkBtn.onclick = function() {
        ctx.onCheck(selectedAnswer === expected);
      };
    }

    render_();
  }
};

// ====================================================================
// RENDERER: missingNumber
// Shows equation with a highlighted blank, kids type the missing value.
// ====================================================================

RENDERERS.missingNumber = {
  mount: function(stage, q, ctx) {
    var answer = q.missing === "left"
      ? q.a
      : q.b;
    ctx.correctAnswer = String(answer);
    ctx.hintText = q.op === "+"
      ? "Think about what number you need to add to get the answer on the right!"
      : "Think about what number makes the subtraction work out!";

    var current = "";
    function updateDisplay() {
      var disp = document.getElementById("mnDisplay");
